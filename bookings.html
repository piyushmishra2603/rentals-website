<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Bookings</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
background:linear-gradient(135deg,#0f172a,#1e293b,#020617);
color:white;
font-family:Inter;
}
.glass{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
border-radius:16px;
border:1px solid rgba(255,255,255,0.1);
}
</style>

</head>

<body>

<div class="max-w-6xl mx-auto p-6">

<!-- HEADER -->
<div class="flex justify-between items-center mb-6">
<h1 class="text-3xl font-bold">📋 My Bookings</h1>
<a href="index.html" class="bg-gray-700 px-4 py-2 rounded">← Back</a>
</div>

<!-- TABS -->
<div class="flex gap-3 mb-6">

<button onclick="loadUserBookings()" 
class="bg-blue-600 px-4 py-2 rounded">
My Bookings
</button>

<button onclick="loadProviderBookings()" 
class="bg-purple-600 px-4 py-2 rounded">
Provider Panel
</button>

</div>

<!-- GRID -->
<div id="grid" class="grid md:grid-cols-3 gap-6"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"
import { 
getFirestore, 
collection, 
getDocs, 
query, 
where, 
updateDoc, 
doc, 
deleteDoc 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"

import { 
getAuth, 
onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"

/* CONFIG */
const firebaseConfig = {
apiKey:"AIzaSyCExyC1UlqWl-tTJWVtoQx6E-rppaYQgcU",
authDomain:"smart-property-portal.firebaseapp.com",
projectId:"smart-property-portal"
}

const app = initializeApp(firebaseConfig)
const db = getFirestore(app)
const auth = getAuth(app)

let currentUser = null

/* AUTH */
onAuthStateChanged(auth, user=>{
if(!user){
window.location.href="login.html"
return
}
currentUser = user
loadUserBookings()
})

/* USER BOOKINGS */
async function loadUserBookings(){

const q = query(
collection(db,"bookings"),
where("userId","==",currentUser.uid)
)

const snap = await getDocs(q)

renderBookings(snap,"user")
}

/* PROVIDER BOOKINGS */
async function loadProviderBookings(){

const q = query(
collection(db,"bookings"),
where("providerId","==",currentUser.uid)
)

const snap = await getDocs(q)

renderBookings(snap,"provider")
}

/* RENDER */
function renderBookings(snapshot,type){

grid.innerHTML=""

snapshot.forEach(docSnap=>{

const b = docSnap.data()

let statusColor = "bg-yellow-500"
if(b.status==="confirmed") statusColor="bg-green-600"
if(b.status==="rejected") statusColor="bg-red-600"

let actions = ""

/* USER ACTION */
if(type==="user"){
actions = `
<button onclick="cancelBooking('${docSnap.id}')" 
class="bg-red-500 px-3 py-1 rounded mt-2">
Cancel
</button>
`
}

/* PROVIDER ACTION */
if(type==="provider"){
actions = `
<div class="flex gap-2 mt-2">

<button onclick="updateStatus('${docSnap.id}','confirmed')" 
class="bg-green-600 px-3 py-1 rounded">
Accept
</button>

<button onclick="updateStatus('${docSnap.id}','rejected')" 
class="bg-red-600 px-3 py-1 rounded">
Reject
</button>

</div>
`
}

grid.innerHTML += `
<div class="glass p-4">

<h3 class="text-xl font-bold">${b.serviceName}</h3>

<p class="text-gray-400 text-sm">${b.address}</p>

<p class="text-green-400">₹${b.price}</p>

<p class="text-sm">${b.date} • ${b.time}</p>

<span class="${statusColor} px-2 py-1 text-xs rounded">
${b.status}
</span>

${actions}

</div>
`
})

}

/* UPDATE STATUS */
window.updateStatus = async function(id,status){

await updateDoc(doc(db,"bookings",id),{
status
})

loadProviderBookings()
}

/* CANCEL */
window.cancelBooking = async function(id){

await deleteDoc(doc(db,"bookings",id))

loadUserBookings()
}

</script>

</body>
</html>
