<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartRent AI — Chat</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root{
      --bg1:#0b1220;
      --bg2:#111f3a;
      --glass: rgba(255,255,255,0.06);
      --glass2: rgba(255,255,255,0.10);
      --border: rgba(255,255,255,0.12);
      --shadow: 0 20px 60px rgba(0,0,0,0.45);
      --sent:#4ade80;
      --received:#60a5fa;
    }

    body{
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Inter, Arial, sans-serif;
      background: radial-gradient(1200px 600px at 20% 10%, rgba(96,165,250,0.22), transparent 60%),
                  radial-gradient(900px 500px at 80% 20%, rgba(74,222,128,0.18), transparent 55%),
                  linear-gradient(120deg, var(--bg1), var(--bg2));
      color: white;
      overflow-x: hidden;
    }

    /* Glass panels */
    .glass{
      background: var(--glass);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    /* Subtle animated background shimmer */
    .bg-anim::before{
      content:"";
      position:fixed;
      inset:-40%;
      background: linear-gradient(120deg, transparent 40%, rgba(255,255,255,0.06), transparent 60%);
      transform: translateX(-25%);
      animation: shimmer 10s linear infinite;
      pointer-events:none;
      z-index:-1;
    }
    @keyframes shimmer{
      0%{ transform: translateX(-30%); }
      100%{ transform: translateX(30%); }
    }

    /* Message bubble animations */
    .bubble-pop{
      animation: popIn .22s ease-out;
    }
    @keyframes popIn{
      from{ transform: translateY(8px) scale(0.98); opacity:0; }
      to{ transform: translateY(0) scale(1); opacity:1; }
    }

    .bubble{
      transition: transform .15s ease, box-shadow .15s ease, background-color .15s ease;
    }
    .bubble:hover{
      transform: translateY(-1px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    /* Sent/received */
    .sent{
      background: rgba(74,222,128,0.92);
      color:#062014;
      border: 1px solid rgba(74,222,128,0.55);
      border-radius: 14px 14px 6px 14px;
    }
    .received{
      background: rgba(96,165,250,0.92);
      color:#071b2d;
      border: 1px solid rgba(96,165,250,0.55);
      border-radius: 14px 14px 14px 6px;
    }

    /* Typing indicator fade */
    .typing-dot{
      display:inline-flex;
      gap:4px;
      align-items:center;
    }
    .typing-dot span{
      width:6px; height:6px;
      border-radius:50%;
      background: rgba(255,255,255,0.8);
      opacity:.35;
      animation: bounce 1.1s infinite;
    }
    .typing-dot span:nth-child(2){ animation-delay: .12s; }
    .typing-dot span:nth-child(3){ animation-delay: .24s; }
    @keyframes bounce{
      0%, 80%, 100%{ transform: translateY(0); opacity:.35; }
      40%{ transform: translateY(-4px); opacity:.95; }
    }

    /* Smooth scrolling behavior */
    #chatBox{
      scroll-behavior: smooth;
    }
  </style>
</head>

<body class="bg-anim">
  <!-- HEADER -->
  <div class="glass p-4 sticky top-0 z-20 flex justify-between items-center gap-3">
    <div class="flex items-center gap-3">
      <div class="h-10 w-10 rounded-xl bg-white/10 border border-white/15 flex items-center justify-center">
        <span class="text-lg">💬</span>
      </div>
      <div>
        <h2 class="font-semibold text-lg tracking-wide">Chat</h2>
        <p class="text-xs text-white/60">SmartRent AI</p>
      </div>
    </div>

    <a href="index.html" class="bg-white/10 hover:bg-white/15 transition px-3 py-1 rounded-lg border border-white/15 text-sm">
      ← Back
    </a>
  </div>

  <!-- MAIN -->
  <div class="flex flex-col h-[calc(100vh-64px)]">
    <!-- MESSAGES -->
    <div id="chatBox" class="glass mx-3 my-3 flex-1 overflow-y-auto p-4 flex flex-col gap-2"></div>

    <!-- TYPING -->
    <div id="typing" class="px-6 pb-2 text-sm text-white/70"></div>

    <!-- INPUT -->
    <div class="glass mx-3 mb-3 p-3 flex gap-2 items-center">
      <div class="flex-1">
        <input
          id="msgInput"
          placeholder="Type a message..."
          class="w-full p-3 rounded-xl text-black outline-none bg-white/90 focus:ring-2 focus:ring-cyan-300/50"
          autocomplete="off"
        />
        <div class="mt-1 text-xs text-white/50">
          Tip: Press <span class="font-semibold">Enter</span> to send
        </div>
      </div>

      <!-- Hidden file input -->
      <input type="file" id="imgInput" class="hidden" accept="image/*" />

      <button
        onclick="sendImage()"
        class="bg-yellow-500 hover:bg-yellow-400 transition px-3 py-3 rounded-xl text-black font-semibold"
        title="Send image"
      >
        📷
      </button>

      <button
        onclick="sendMsg()"
        id="sendBtn"
        class="bg-emerald-500 hover:bg-emerald-400 transition px-4 py-3 rounded-xl text-black font-semibold disabled:opacity-60 disabled:cursor-not-allowed"
      >
        <span id="sendBtnText">Send</span>
      </button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      onSnapshot,
      query,
      orderBy,
      serverTimestamp,
      doc,
      setDoc
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    // CONFIG
    const firebaseConfig = {
      apiKey: "AIzaSyCExyC1UlqWl-tTJWVtoQx6E-rppaYQgcU",
      authDomain: "smart-property-portal.firebaseapp.com",
      projectId: "smart-property-portal"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const chatBox = document.getElementById("chatBox");
    const typingEl = document.getElementById("typing");
    const msgInput = document.getElementById("msgInput");
    const sendBtn = document.getElementById("sendBtn");
    const sendBtnText = document.getElementById("sendBtnText");

    // URL PARAMS
    const url = new URLSearchParams(window.location.search);
    const propertyId = url.get("property");
    const ownerId = url.get("owner");

    let userId = null;

    function getChatId(){
      return [propertyId, userId, ownerId].sort().join("_");
    }

    // Smart auto-scroll: only stick to bottom if user is already near it
    function isNearBottom(el, threshold = 120){
      return el.scrollHeight - el.scrollTop - el.clientHeight < threshold;
    }

    let shouldAutoScroll = true;

    chatBox.addEventListener("scroll", () => {
      shouldAutoScroll = isNearBottom(chatBox);
    });

    // TYPING (basic indicator)
    let typingTimer = null;
    async function setTypingState(isTyping){
      if(!userId) return;

      const chatId = getChatId();
      const typingRef = doc(db, "chats", chatId, "typing", userId);
      await setDoc(typingRef, {
        isTyping: !!isTyping,
        time: serverTimestamp()
      });
    }

    function startTyping(){
      setTypingState(true).catch(()=>{});
      if(typingTimer) clearTimeout(typingTimer);
      typingTimer = setTimeout(() => setTypingState(false).catch(()=>{}), 1200);
    }

    async function stopTyping(){
      if(typingTimer) clearTimeout(typingTimer);
      await setTypingState(false).catch(()=>{});
    }

    // Basic sanitization: we only put text via innerText, never innerHTML.
    function renderMsg(m){
      const div = document.createElement("div");
      div.className = "bubble msg w-fit max-w-[85%] bubble-pop " + (m.sender === userId ? "sent self-end" : "received self-start");

      // Text
      if(m.text){
        const p = document.createElement("div");
        p.className = "text-sm leading-relaxed";
        p.innerText = m.text;
        div.appendChild(p);
      }

      // Image
      if(m.image){
        const img = document.createElement("img");
        img.src = m.image;
        img.className = "mt-1 max-h-44 w-auto rounded-lg border border-black/10";
        div.appendChild(img);
      }

      chatBox.appendChild(div);
    }

    function showTyping(isTyping){
      // If typing true, show indicator; else clear
      if(isTyping){
        typingEl.innerHTML = `<div class="typing-dot"><span></span><span></span><span></span></div> <span class="ml-2">Someone is typing...</span>`;
      } else {
        typingEl.textContent = "";
      }
    }

    function compressImageToDataURL(file, {maxW=900, maxH=900, quality=0.78} = {}){
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onerror = reject;
        reader.onload = () => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");

            let { width, height } = img;
            const scale = Math.min(maxW / width, maxH / height, 1);
            width = Math.round(width * scale);
            height = Math.round(height * scale);

            canvas.width = width;
            canvas.height = height;
            ctx.drawImage(img, 0, 0, width, height);

            try{
              const out = canvas.toDataURL("image/jpeg", quality);
              resolve(out);
            } catch (e){
              // fallback
              resolve(reader.result);
            }
          };
          img.onerror = reject;
          img.src = reader.result;
        };
        reader.readAsDataURL(file);
      });
    }

    window.sendMsg = async function(){
      if(!userId) return;

      const text = msgInput.value.trim();
      if(!text) return;

      // UI loading state
      sendBtn.disabled = true;
      sendBtnText.textContent = "Sending...";

      try{
        await addDoc(collection(db, "chats", getChatId(), "messages"), {
          text,
          sender: userId,
          time: serverTimestamp()
        });
        msgInput.value = "";
        typingEl.textContent = "";
        stopTyping().catch(()=>{});
      } finally {
        sendBtn.disabled = false;
        sendBtnText.textContent = "Send";
      }
    };

    window.sendImage = function(){
      document.getElementById("imgInput").click();
    };

    document.getElementById("imgInput").addEventListener("change", async (e) => {
      if(!userId) return;

      const file = e.target.files[0];
      e.target.value = ""; // reset so same file can be selected again

      if(!file) return;
      if(!file.type.startsWith("image/")){
        alert("Please select an image file.");
        return;
      }

      sendBtn.disabled = true;
      sendBtnText.textContent = "Uploading...";

      try{
        // Resize/compress before upload (client-side)
        const dataUrl = await compressImageToDataURL(file);

        await addDoc(collection(db, "chats", getChatId(), "messages"), {
          image: dataUrl,
          sender: userId,
          time: serverTimestamp()
        });

      } finally {
        sendBtn.disabled = false;
        sendBtnText.textContent = "Send";
      }
    });

    // Enter to send
    msgInput.addEventListener("keydown", (e) => {
      if(e.key === "Enter" && !e.shiftKey){
        e.preventDefault();
        sendMsg();
      }
    });

    msgInput.addEventListener("input", () => startTyping());
    msgInput.addEventListener("blur", () => stopTyping().catch(()=>{}));

    function loadChat(){
      const chatId = getChatId();

      // Messages
      const q = query(
        collection(db, "chats", chatId, "messages"),
        orderBy("time")
      );

      onSnapshot(q, (snap) => {
        const atBottom = isNearBottom(chatBox);

        // Clear + re-render (simple approach). If you want, I can optimize to incremental DOM updates next.
        chatBox.innerHTML = "";
        snap.forEach(docSnap => {
          const m = docSnap.data();
          renderMsg(m);
        });

        if(shouldAutoScroll || atBottom){
          chatBox.scrollTop = chatBox.scrollHeight;
        }
      });

      // Typing indicator: listen to other users typing
      // (We’ll check all typing docs and show if any other user is typing.)
      onSnapshot(collection(db, "chats", chatId, "typing"), (snapTyping) => {
        let someoneTyping = false;

        snapTyping.forEach(d => {
          const v = d.data();
          if(v && v.isTyping && d.id !== userId){
            someoneTyping = true;
          }
        });

        showTyping(someoneTyping);
      });
    }

    onAuthStateChanged(auth, (user) => {
      if(!user){
        window.location.href = "login.html";
      }else{
        userId = user.uid;
        loadChat();
      }
    });
  </script>
</body>
</html>
