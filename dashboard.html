<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>User Dashboard</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
}

header{
background:white;
padding:15px 40px;
display:flex;
justify-content:space-between;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.logo{
font-size:22px;
font-weight:bold;
color:#1976d2;
}

.container{
padding:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:170px;
object-fit:cover;
}

.card-body{
padding:15px;
}

button{
padding:8px 14px;
background:red;
border:none;
color:white;
cursor:pointer;
margin-top:10px;
}

</style>

</head>

<body>

<header>

<div class="logo">User Dashboard</div>

<div>

<a href="index.html">Home</a>
<a href="post-property.html">Post Property</a>

</div>

</header>

<div class="container">

<h2>Your Properties</h2>

<div class="grid" id="propertyGrid"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"

import {
getFirestore,
collection,
query,
where,
getDocs,
deleteDoc,
doc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"


const firebaseConfig={

apiKey:"YOUR_API_KEY",
authDomain:"smart-property-portal.firebaseapp.com",
projectId:"smart-property-portal",
storageBucket:"smart-property-portal.firebasestorage.app",
messagingSenderId:"407241446660",
appId:"1:407241446660:web:1259fa8c93bce5fd8aec51"

}

const app=initializeApp(firebaseConfig)

const db=getFirestore(app)

const auth=getAuth(app)

const grid=document.getElementById("propertyGrid")

onAuthStateChanged(auth,async(user)=>{

if(!user){

window.location.href="login.html"
return

}

loadProperties(user)

})


async function loadProperties(user){

const q=query(collection(db,"properties"),where("ownerId","==",user.uid))

const snapshot=await getDocs(q)

grid.innerHTML=""

snapshot.forEach((docSnap)=>{

const p=docSnap.data()

grid.innerHTML+=`

<div class="card">

<img src="${p.image}">

<div class="card-body">

<h3>${p.title}</h3>

<p>${p.city}</p>

<p>${p.bhk}</p>

<p>₹${p.price}</p>

<button onclick="deleteProperty('${docSnap.id}')">Delete</button>

</div>

</div>

`

})

}

window.deleteProperty=async function(id){

await deleteDoc(doc(db,"properties",id))

alert("Property deleted")

location.reload()

}

</script>

</body>
</html>
