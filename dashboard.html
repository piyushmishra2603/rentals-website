<!DOCTYPE html>
<html>

<head>

<title>User Dashboard</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:40px;
}

h2{
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-body{
padding:15px;
}

.delete-btn{
margin-top:10px;
padding:8px 12px;
background:red;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<h2>My Properties</h2>

<div id="myProperties" class="grid"></div>

<h2 style="margin-top:40px;">Saved Properties</h2>

<div id="savedProperties" class="grid"></div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getFirestore, collection, getDocs, deleteDoc, doc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import { getAuth }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


const firebaseConfig = {
apiKey: "AIzaSyCExyC1UlqWl-tTJWVtoQx6E-rppaYQgcU",
authDomain: "smart-property-portal.firebaseapp.com",
projectId: "smart-property-portal",
storageBucket: "smart-property-portal.firebasestorage.app",
messagingSenderId: "407241446660",
appId: "1:407241446660:web:1259fa8c93bce5fd8aec51"
};

const app=initializeApp(firebaseConfig)

const db=getFirestore(app)

const auth=getAuth(app)


const myDiv=document.getElementById("myProperties")
const savedDiv=document.getElementById("savedProperties")


async function loadDashboard(){

const user=auth.currentUser

if(!user){

alert("Please login")

window.location="login.html"

return

}

/* MY PROPERTIES */

const querySnapshot=await getDocs(collection(db,"properties"))

querySnapshot.forEach((d)=>{

const p=d.data()

if(p.owner===user.email){

myDiv.innerHTML+=`

<div class="card">

<img src="${p.image}">

<div class="card-body">

<h3>${p.title}</h3>

<div>${p.city}</div>

<div>₹${p.price}</div>

<button class="delete-btn" onclick="deleteProperty('${d.id}')">Delete</button>

</div>

</div>

`

}

})

/* SAVED */

const favSnap=await getDocs(collection(db,"favorites"))

favSnap.forEach(async(f)=>{

const fav=f.data()

if(fav.user===user.email){

const ref=doc(db,"properties",fav.propertyId)

const pSnap=await getDoc(ref)

const p=pSnap.data()

savedDiv.innerHTML+=`

<div class="card">

<img src="${p.image}">

<div class="card-body">

<h3>${p.title}</h3>

<div>${p.city}</div>

<div>₹${p.price}</div>

</div>

</div>

`

}

})

}

loadDashboard()


window.deleteProperty=async function(id){

await deleteDoc(doc(db,"properties",id))

alert("Property Deleted")

location.reload()

}

</script>

</body>

</html>
