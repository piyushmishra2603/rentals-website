<!DOCTYPE html>
<html>

<head>

<title>Owner Dashboard</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
}

header{
background:#0f4c81;
color:white;
padding:20px;
text-align:center;
}

.container{
padding:20px;
}

.card{
background:white;
padding:15px;
margin:10px 0;
border-radius:6px;
}

.btn{
padding:8px 12px;
background:#0f4c81;
color:white;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<header>

<h2>Owner Dashboard</h2>

</header>

<div class="container">

<button class="btn" onclick="location.href='submit.html'">Add Property</button>

<h3>Your Properties</h3>

<div id="myProperties"></div>

</div>

<script>

const sheetURL="https://docs.google.com/spreadsheets/d/1BiyshMuZ8ex2zDtpIttlGgxnRrvBqV9oBq7-jyz0S0M/gviz/tq?tqx=out:csv"

let ownerEmail=localStorage.getItem("ownerEmail")

fetch(sheetURL)

.then(res=>res.text())

.then(data=>{

let rows=data.split("\n").slice(1)

let container=document.getElementById("myProperties")

rows.forEach(row=>{

let cols=row.split(",")

let title=cols[0]
let city=cols[1]
let price=cols[2]
let email=cols[5]

if(email===ownerEmail){

container.innerHTML+=`

<div class="card">

<h4>${title}</h4>

<p>${city}</p>

<p>₹${price}</p>

</div>

`

}

})

})

</script>

</body>

</html>
