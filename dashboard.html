<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SmartRent Owner Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: linear-gradient(to right, #0f172a, #1e293b);
}
.card:hover{
  transform: scale(1.03);
  transition: 0.3s;
}
</style>
</head>

<body class="text-white">

<div class="max-w-7xl mx-auto p-6">

<h1 class="text-3xl font-bold mb-6">🚀 Owner Dashboard</h1>

<!-- PROFILE -->
<div class="bg-white/10 p-4 rounded-xl mb-6">
  <h2 class="text-xl mb-2">👤 Profile</h2>
  <p id="userEmail"></p>
</div>

<!-- STATS -->
<div class="grid grid-cols-3 gap-4 mb-6">

<div class="bg-white/10 p-4 rounded-xl text-center">
<h2>Total Properties</h2>
<p id="totalProps" class="text-2xl font-bold">0</p>
</div>

<div class="bg-white/10 p-4 rounded-xl text-center">
<h2>Total Views</h2>
<p id="totalViews" class="text-2xl font-bold">0</p>
</div>

<div class="bg-white/10 p-4 rounded-xl text-center">
<h2>Total Chats</h2>
<p id="totalChats" class="text-2xl font-bold">0</p>
</div>

</div>

<!-- LISTINGS -->
<div>
  <h2 class="text-2xl mb-4">🏠 My Listings</h2>
  <div id="myProperties" class="grid md:grid-cols-3 gap-4"></div>
</div>

</div>

<!-- BOOST MODAL -->
<div id="boostModal" class="fixed inset-0 bg-black/70 hidden flex items-center justify-center z-50">

<div class="bg-gradient-to-r from-gray-800 to-gray-900 p-6 rounded-2xl w-11/12 max-w-lg text-center">

<h2 class="text-2xl font-bold mb-4">🚀 Boost Your Property</h2>

<p class="text-gray-300 mb-4">Increase visibility & get faster deals</p>

<div class="grid gap-3 mb-6">

<button onclick="selectPlan(49,1)" class="bg-blue-600 p-3 rounded">
🔥 1 Day – ₹49
</button>

<button onclick="selectPlan(149,3)" class="bg-purple-600 p-3 rounded">
⚡ 3 Days – ₹149
</button>

<button onclick="selectPlan(299,7)" class="bg-yellow-500 p-3 rounded text-black font-bold">
👑 7 Days – ₹299
</button>

</div>

<input id="upiId" placeholder="Enter UPI ID"
class="w-full p-2 rounded text-black mb-3">

<button onclick="payBoost()" class="bg-green-600 w-full p-3 rounded font-bold">
Pay & Boost 🚀
</button>

<button onclick="closeBoost()" class="mt-3 text-gray-400">
Cancel
</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  getDocs,
  query,
  where,
  deleteDoc,
  doc,
  setDoc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 ADD YOUR API KEY
const firebaseConfig = {
  apiKey: "AIzaSyCExyC1UlqWl-tTJWVtoQx6E-rppaYQgcU",
  authDomain: "smart-property-portal.firebaseapp.com",
  projectId: "smart-property-portal",
  storageBucket: "smart-property-portal.appspot.com",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

let currentUser = null;
let selectedProperty = null;
let selectedPlan = null;

// 🔐 AUTH
onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  currentUser = user;

  document.getElementById("userEmail").innerText = user.email;

  await setDoc(doc(db, "users", user.uid), {
    email: user.email,
    createdAt: Date.now()
  }, { merge: true });

  loadMyProperties();
});

// 🏠 LOAD PROPERTIES
async function loadMyProperties(){

  const q = query(
    collection(db, "properties"),
    where("ownerId", "==", currentUser.uid)
  );

  const snapshot = await getDocs(q);

  const container = document.getElementById("myProperties");
  container.innerHTML = "";

  let totalViews = 0;
  let totalChats = 0;
  let totalProps = 0;

  snapshot.forEach(async (docSnap) => {

    let p = docSnap.data();
    const id = docSnap.id;

    // AUTO FIX
    if(p.views === undefined){
      await updateDoc(doc(db,"properties",id),{
        views:0,
        chats:0,
        saves:0,
        boost:false
      });

      p = { ...p, views:0, chats:0, saves:0, boost:false };
    }

    totalViews += p.views || 0;
    totalChats += p.chats || 0;
    totalProps++;

    const div = document.createElement("div");
    div.className = "bg-white/10 p-4 rounded-xl card";

    const boosted = p.boost && p.boostExpiry > Date.now();

    let suggestion = "";
    if(p.views < 5){
      suggestion = "🚀 Boost recommended";
    }

    div.innerHTML = `
      <h3 class="text-xl font-bold">${p.title}</h3>
      <p>${p.city}</p>
      <p>₹${p.rent}</p>

      <p class="text-sm">👁 ${p.views} | 💬 ${p.chats}</p>

      ${boosted ? `<p class="text-yellow-400">⭐ Boosted</p>` : ""}

      <p class="text-xs text-gray-400">${suggestion}</p>

      <div class="flex gap-2 mt-3">

        <button onclick="deleteProperty('${id}')"
        class="bg-red-500 px-3 py-1 rounded">
        Delete
        </button>

        <button onclick="openBoost('${id}')"
        class="bg-yellow-500 px-3 py-1 rounded">
        Boost 🚀
        </button>

      </div>
    `;

    container.appendChild(div);
  });

  document.getElementById("totalViews").innerText = totalViews;
  document.getElementById("totalChats").innerText = totalChats;
  document.getElementById("totalProps").innerText = totalProps;
}

// 🗑 DELETE
window.deleteProperty = async function(id){
  await deleteDoc(doc(db,"properties",id));
  loadMyProperties();
};

// 🚀 BOOST SYSTEM
window.openBoost = (id)=>{
  selectedProperty = id;
  document.getElementById("boostModal").classList.remove("hidden");
};

window.closeBoost = ()=>{
  document.getElementById("boostModal").classList.add("hidden");
};

window.selectPlan = (price, days)=>{
  selectedPlan = {price, days};
  alert(`Selected ₹${price}`);
};

window.payBoost = async ()=>{

  if(!selectedPlan){
    alert("Select plan");
    return;
  }

  const upi = document.getElementById("upiId").value;

  if(!upi.includes("@")){
    alert("Invalid UPI");
    return;
  }

  alert("Payment Successful 🎉");

  const expiry = Date.now() + selectedPlan.days * 86400000;

  await updateDoc(doc(db,"properties",selectedProperty),{
    boost: true,
    boostExpiry: expiry
  });

  closeBoost();
  loadMyProperties();
};

</script>

</body>
</html>
