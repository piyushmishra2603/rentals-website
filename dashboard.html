<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Owner Dashboard</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f0f2f5;
}

header{
background:#0f4c81;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logout{
background:#ff4d4d;
border:none;
padding:8px 12px;
color:white;
border-radius:6px;
cursor:pointer;
}

.container{
padding:20px;
}

.stats{
display:flex;
gap:20px;
margin-bottom:20px;
}

.stat-box{
background:white;
padding:15px;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
flex:1;
text-align:center;
}

.properties{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
overflow:hidden;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-content{
padding:12px;
}

.price{
color:#0f9d58;
font-weight:bold;
}

.actions{
margin-top:10px;
display:flex;
gap:6px;
}

button{
border:none;
padding:6px 10px;
border-radius:5px;
cursor:pointer;
}

.edit{
background:#1e90ff;
color:white;
}

.delete{
background:#ff4d4d;
color:white;
}

.whatsapp{
background:#25D366;
color:white;
}

</style>

</head>

<body>

<header>

<h2>Owner Dashboard</h2>

<button class="logout" onclick="logout()">Logout</button>

</header>

<div class="container">

<div class="stats">

<div class="stat-box">
<h3 id="totalListings">0</h3>
<p>Total Listings</p>
</div>

<div class="stat-box">
<h3 id="avgPrice">₹0</h3>
<p>Average Price</p>
</div>

</div>

<h3>Your Properties</h3>

<div class="properties" id="properties"></div>

</div>

<script>

const csvURL =
"https://docs.google.com/spreadsheets/d/1BiyshMuZ8ex2zDtpIttlGgxnRrvBqV9oBq7-jyz0S0M/gviz/tq?tqx=out:csv"

let ownerEmail = localStorage.getItem("ownerEmail")

if(!ownerEmail){

alert("Please login first")

window.location="index.html"

}

fetch(csvURL)
.then(res=>res.text())
.then(data=>{

let rows=data.split("\n").slice(1)

let html=""
let count=0
let totalPrice=0

rows.forEach((row,i)=>{

let cols=row.split(",")

let title=cols[0]
let city=cols[1]
let bhk=cols[2]
let price=parseInt(cols[3])
let img=cols[4]
let email=cols[6]
let phone=cols[9]

if(email==ownerEmail){

count++
totalPrice+=price

html+=`

<div class="card">

<img src="${img}">

<div class="card-content">

<h3>${title}</h3>

<p>${city} • ${bhk} BHK</p>

<p class="price">₹${price}</p>

<div class="actions">

<button class="edit"
onclick="editProperty(${i})">
Edit
</button>

<button class="delete"
onclick="deleteProperty(${i})">
Delete
</button>

<button class="whatsapp"
onclick="contactOwner('${phone}')">
WhatsApp
</button>

</div>

</div>

</div>

`

}

})

document.getElementById("properties").innerHTML=html

document.getElementById("totalListings").innerHTML=count

if(count>0){

document.getElementById("avgPrice").innerHTML=
"₹"+Math.round(totalPrice/count)

}

})

function contactOwner(phone){

window.open(
"https://wa.me/"+phone,
"_blank"
)

}

function editProperty(id){

window.location="submit.html?edit="+id

}

function deleteProperty(id){

let confirmDelete=confirm("Delete this property?")

if(confirmDelete){

alert("Deletion must be handled via Apps Script backend")

}

}

function logout(){

localStorage.removeItem("ownerEmail")

window.location="index.html"

}

</script>

</body>
</html>
