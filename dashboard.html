<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <style>
    body { font-family: Arial; margin:20px; }
    table { border-collapse: collapse; width:100%; }
    th, td { border:1px solid #ccc; padding:8px; text-align:left; }
    th { background-color:#f2f2f2; }
    #whatsapp { position:fixed; bottom:20px; right:20px; background:#25D366; color:white; border-radius:50%; width:60px; height:60px; font-size:30px; text-align:center; line-height:60px; cursor:pointer; }
  </style>
</head>
<body>

<h2>Dashboard - Properties</h2>
<table id="propertyTable">
  <tr><th>Title</th><th>City</th><th>BHK</th><th>Price</th></tr>
</table>

<div id="whatsapp" onclick="openWhatsApp()">&#9990;</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwh-9c-O1jC7RAQrpcdXzFJZO7Yyf28CIdAmAjRVUywGYPMOszLPbYbQxP24f0PPTF80Q/exec";

function loadProperties() {
  fetch(WEB_APP_URL+"?action=getProperties")
  .then(res=>res.json())
  .then(properties=>{
    const table=document.getElementById("propertyTable");
    properties.forEach(p=>{
      const row=table.insertRow();
      row.insertCell(0).innerText=p.title;
      row.insertCell(1).innerText=p.city;
      row.insertCell(2).innerText=p.bhk;
      row.insertCell(3).innerText=p.price;
    });
  });
}

function openWhatsApp() {
  const number="YOUR_WHATSAPP_NUMBER"; // include country code
  window.open("https://wa.me/"+number, "_blank");
}

loadProperties();
</script>

</body>
</html>
