<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>User Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: linear-gradient(to right, #0f172a, #1e293b);
}
</style>
</head>

<body class="text-white">

<div class="max-w-6xl mx-auto p-6">

<h1 class="text-3xl font-bold mb-6">👤 Dashboard</h1>

<!-- PROFILE -->
<div class="bg-white/10 p-4 rounded-xl mb-6">
  <h2 class="text-xl mb-2">Your Profile</h2>
  <p id="userEmail"></p>
</div>

<!-- MY PROPERTIES -->
<div>
  <h2 class="text-2xl mb-4">🏠 My Listings</h2>
  <div id="myProperties" class="grid md:grid-cols-3 gap-4"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  getDocs,
  query,
  where,
  deleteDoc,
  doc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 ADD YOUR KEY HERE
const firebaseConfig = {
  apiKey: "AIzaSyCExyC1UlqWl-tTJWVtoQx6E-rppaYQgcU",
  authDomain: "smart-property-portal.firebaseapp.com",
  projectId: "smart-property-portal",
  storageBucket: "smart-property-portal.firebasestorage.app",
  messagingSenderId: "407241446660",
  appId: "1:407241446660:web:1259fa8c93bce5fd8aec51"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

let currentUser = null;

// 🔐 AUTH CHECK
onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  currentUser = user;

  document.getElementById("userEmail").innerText = user.email;

  // 👤 CREATE PROFILE (SAFE)
  await setDoc(doc(db, "users", user.uid), {
    email: user.email,
    createdAt: Date.now()
  }, { merge: true });

  loadMyProperties();
});

// 🏠 LOAD USER PROPERTIES
async function loadMyProperties(){

  const q = query(
    collection(db, "properties"),
    where("ownerId", "==", currentUser.uid)
  );

  const snapshot = await getDocs(q);

  const container = document.getElementById("myProperties");
  container.innerHTML = "";

  snapshot.forEach(docSnap => {
    const p = docSnap.data();

    const div = document.createElement("div");
    div.className = "bg-white/10 p-4 rounded-xl";

    div.innerHTML = `
      <h3 class="text-xl font-bold">${p.title}</h3>
      <p>${p.city}</p>
      <p>₹${p.rent}</p>

      <button onclick="deleteProperty('${docSnap.id}')"
        class="bg-red-500 px-3 py-1 rounded mt-2">
        Delete
      </button>
    `;

    container.appendChild(div);
  });
}

// 🗑 DELETE PROPERTY
window.deleteProperty = async function(id){
  await deleteDoc(doc(db,"properties",id));
  loadMyProperties();
};

</script>

</body>
</html>
