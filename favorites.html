<!DOCTYPE html>
<html>

<head>

<title>Saved Properties</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#0f4c81;
color:white;
padding:20px;
text-align:center;
}

.properties{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.price{
color:green;
font-weight:bold;
}

.btn{
display:inline-block;
margin-top:10px;
background:#0f4c81;
color:white;
padding:8px 12px;
border-radius:6px;
text-decoration:none;
}

</style>

</head>

<body>

<header>

<h2>Saved Properties</h2>

</header>

<div class="properties" id="favList"></div>

<script>

const sheetURL =
"https://docs.google.com/spreadsheets/d/1BiyshMuZ8ex2zDtpIttlGgxnRrvBqV9oBq7-jyz0S0M/gviz/tq?tqx=out:csv"

let favorites = JSON.parse(localStorage.getItem("favorites")) || []

fetch(sheetURL)

.then(res=>res.text())

.then(data=>{

let rows=data.split("\n").slice(1)

let container=document.getElementById("favList")

favorites.forEach(id=>{

let cols=rows[id].split(",")

let title=cols[0]
let city=cols[1]
let price=cols[3]
let image=cols[4]

let card=document.createElement("div")

card.className="card"

card.innerHTML=`

<img src="${image.split("|")[0]}">

<div class="card-content">

<h3>${title}</h3>

<p>${city}</p>

<p class="price">₹${price}/month</p>

<a class="btn" href="property.html?id=${id}">
View Details
</a>

</div>
`

container.appendChild(card)

})

})

</script>

</body>

</html>
