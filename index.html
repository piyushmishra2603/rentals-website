<!DOCTYPE html>
<html>

<head>

<title>Rental Property Finder</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#0f4c81;
color:white;
padding:20px;
text-align:center;
}

.filters{
background:white;
padding:15px;
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
}

.filters input,.filters select,.filters button{
padding:10px;
font-size:15px;
}

.properties{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
border-radius:8px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.price{
color:green;
font-weight:bold;
}

.btn{
display:inline-block;
margin-top:10px;
padding:8px 12px;
background:#0f4c81;
color:white;
text-decoration:none;
border-radius:5px;
cursor:pointer;
}

.favorite{
float:right;
cursor:pointer;
font-size:18px;
}

footer{
text-align:center;
padding:20px;
background:#eee;
}

</style>

</head>

<body>

<header>

<h1>Rental Property Finder</h1>

</header>

<!-- FILTERS -->

<div class="filters">

<input type="text" id="locationInput" placeholder="Location">

<select id="bhkFilter">
<option value="">BHK</option>
<option value="1">1 BHK</option>
<option value="2">2 BHK</option>
<option value="3">3 BHK</option>
</select>

<select id="priceFilter">
<option value="">Max Price</option>
<option value="10000">₹10,000</option>
<option value="15000">₹15,000</option>
<option value="20000">₹20,000</option>
<option value="30000">₹30,000</option>
</select>

<select id="sortPrice">
<option value="">Sort Price</option>
<option value="low">Low to High</option>
<option value="high">High to Low</option>
</select>

<button onclick="applyFilters()">Search</button>

</div>

<!-- PROPERTY LIST -->

<div class="properties" id="propertyList">

</div>

<footer>

<p>© 2026 Rental Property Finder</p>

</footer>


<script>

const sheetURL =
"https://docs.google.com/spreadsheets/d/1BiyshMuZ8ex2zDtpIttlGgxnRrvBqV9oBq7-jyz0S0M/gviz/tq?tqx=out:json"

let allProperties = []

fetch(sheetURL)

.then(res => res.text())

.then(data => {

let json = JSON.parse(data.substring(47).slice(0,-2))

let rows = json.table.rows

rows.forEach((r,index)=>{

let property={

id:index,
title:r.c[0]?.v || "",
city:r.c[1]?.v || "",
price:parseInt(r.c[2]?.v) || 0,
image:r.c[3]?.v || "",
description:r.c[4]?.v || "",
email:r.c[5]?.v || "",
bhk:r.c[6]?.v || ""

}

allProperties.push(property)

})

displayProperties(allProperties)

})

function displayProperties(list){

let container=document.getElementById("propertyList")

container.innerHTML=""

list.forEach(p=>{

let card=document.createElement("div")

card.className="card"

card.innerHTML=`

<img src="${p.image}">

<div class="card-content">

<span class="favorite" onclick="toggleFav(this)">♡</span>

<h3>${p.title}</h3>

<p>${p.city}</p>

<p class="price">₹${p.price}/month</p>

<a class="btn" href="property.html?id=${p.id}">View Details</a>

<br>

<a class="btn" target="_blank"
href="https://wa.me/?text=Check this property: ${location.href}property.html?id=${p.id}">
Share
</a>

</div>

`

container.appendChild(card)

})

}

function applyFilters(){

let location=document.getElementById("locationInput").value.toLowerCase()

let bhk=document.getElementById("bhkFilter").value

let price=document.getElementById("priceFilter").value

let sort=document.getElementById("sortPrice").value

let filtered=allProperties.filter(p=>{

let match=true

if(location && !p.city.toLowerCase().includes(location))
match=false

if(bhk && p.bhk!=bhk)
match=false

if(price && p.price>price)
match=false

return match

})

if(sort=="low") filtered.sort((a,b)=>a.price-b.price)

if(sort=="high") filtered.sort((a,b)=>b.price-a.price)

displayProperties(filtered)

}

function toggleFav(el){

if(el.innerHTML=="♡"){

el.innerHTML="❤️"

}else{

el.innerHTML="♡"

}

}

</script>

</body>

</html>
