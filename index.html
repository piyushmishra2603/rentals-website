<!DOCTYPE html>
<html>

<head>

<title>Rental Property Finder</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#0f4c81;
color:white;
padding:20px;
text-align:center;
}

.nav-buttons{
margin-top:10px;
}

.nav-buttons a{
background:white;
color:#0f4c81;
padding:8px 14px;
margin:5px;
border-radius:6px;
text-decoration:none;
font-weight:bold;
}

/* HERO */

.hero{
background:url("https://images.unsplash.com/photo-1560518883-ce09059eeffa");
background-size:cover;
background-position:center;
padding:80px 20px;
text-align:center;
color:white;
}

.hero h1{
font-size:36px;
margin-bottom:10px;
}

.search-box{
background:white;
padding:15px;
border-radius:10px;
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
max-width:800px;
margin:auto;
}

.search-box input,
.search-box select{
padding:10px;
font-size:15px;
border-radius:5px;
border:1px solid #ccc;
}

.search-box button{
background:#0f4c81;
color:white;
border:none;
padding:10px 20px;
border-radius:5px;
cursor:pointer;
}

/* AI ESTIMATOR */

.ai-box{
background:white;
padding:25px;
margin:30px auto;
max-width:650px;
text-align:center;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.ai-box input,
.ai-box select{
padding:10px;
margin:8px;
}

/* SORT */

.sort-box{
text-align:center;
margin-top:20px;
}

.sort-box select{
padding:10px;
}

/* PROPERTY GRID */

.properties{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;
padding:20px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.price{
color:green;
font-weight:bold;
font-size:18px;
}

.favorite{
float:right;
font-size:20px;
cursor:pointer;
}

.buttons{
margin-top:10px;
display:flex;
gap:8px;
flex-wrap:wrap;
}

.btn{
background:#0f4c81;
color:white;
padding:8px 12px;
border-radius:6px;
text-decoration:none;
font-size:14px;
}

.map-btn{
background:#2d9c5b;
}

footer{
text-align:center;
padding:20px;
background:#eee;
}

</style>

</head>

<body>

<header>

<h2>Rental Property Finder</h2>

<div class="nav-buttons">

<a href="signup.html">Owner Signup</a>

<a href="submit.html">Post Property</a>

<a href="favorites.html">Saved</a>

<a href="map.html">Map</a>

</div>

</header>

<!-- HERO -->

<div class="hero">

<h1>Find Your Perfect Rental Home</h1>

<div class="search-box">

<input type="text" id="locationInput" placeholder="City">

<select id="bhkFilter">
<option value="">BHK</option>
<option value="1">1 BHK</option>
<option value="2">2 BHK</option>
<option value="3">3 BHK</option>
</select>

<select id="priceFilter">
<option value="">Max Price</option>
<option value="10000">₹10k</option>
<option value="15000">₹15k</option>
<option value="20000">₹20k</option>
<option value="30000">₹30k</option>
</select>

<button onclick="filterProperties()">Search</button>

</div>

</div>

<!-- AI ESTIMATE -->

<div class="ai-box">

<h2>AI Rent Estimator</h2>

<input type="text" id="aiCity" placeholder="City">

<select id="aiBHK">
<option value="">BHK</option>
<option value="1">1 BHK</option>
<option value="2">2 BHK</option>
<option value="3">3 BHK</option>
</select>

<input type="number" id="aiArea" placeholder="Area (sq ft)">

<button onclick="estimatePrice()">Estimate Rent</button>

<h3 id="estimatedPrice"></h3>

</div>

<!-- PHOTO AI -->

<div class="ai-box">

<h2>AI Rent Estimate by Photo</h2>

<input type="file" id="photoInput" accept="image/*">

<input type="text" id="photoCity" placeholder="City">

<select id="photoBHK">
<option value="">BHK</option>
<option value="1">1 BHK</option>
<option value="2">2 BHK</option>
<option value="3">3 BHK</option>
</select>

<button onclick="estimatePhotoRent()">Estimate Rent</button>

<h3 id="photoResult"></h3>

</div>

<div class="sort-box">

<select id="sortPrice" onchange="sortProperties()">

<option value="">Sort Price</option>
<option value="low">Low → High</option>
<option value="high">High → Low</option>

</select>

</div>

<div class="properties" id="propertyList"></div>

<footer>

<p>© 2026 Rental Property Finder</p>

</footer>

<script>

const sheetURL="https://docs.google.com/spreadsheets/d/1BiyshMuZ8ex2zDtpIttlGgxnRrvBqV9oBq7-jyz0S0M/gviz/tq?tqx=out:csv"



function loadProperties(){

fetch(sheetURL)

.then(res=>res.text())

.then(data=>{

let rows=data.split("\n").slice(1)

let container=document.getElementById("propertyList")

container.innerHTML=""

rows.forEach((row,index)=>{

let cols=row.split(",")

let title=cols[0]
let city=cols[1]
let bhk=cols[2]
let price=cols[3]
let images=cols[4]

let image=images.split("|")[0]

let card=document.createElement("div")

card.className="card"

card.dataset.location=city.toLowerCase()
card.dataset.bhk=bhk
card.dataset.price=price

card.innerHTML=`

<img src="${image}">

<div class="card-content">

<span class="favorite" onclick="toggleFav(this,${index})">♡</span>

<h3>${title}</h3>

<p>${city}</p>

<p class="price">₹${price}/month</p>

<div class="buttons">

<a class="btn" href="property.html?id=${index}">View</a>

<a class="btn map-btn" target="_blank"
href="https://www.google.com/maps/search/?api=1&query=${city}">
Map
</a>

</div>

</div>
`

container.appendChild(card)

})

})

}



function filterProperties(){

let location=document.getElementById("locationInput").value.toLowerCase()
let bhk=document.getElementById("bhkFilter").value
let price=document.getElementById("priceFilter").value

let cards=document.querySelectorAll(".card")

cards.forEach(card=>{

let show=true

if(location && !card.dataset.location.includes(location)) show=false
if(bhk && card.dataset.bhk!==bhk) show=false
if(price && parseInt(card.dataset.price)>price) show=false

card.style.display=show ? "" : "none"

})

}



function sortProperties(){

let container=document.getElementById("propertyList")

let cards=[...container.querySelectorAll(".card")]

let sort=document.getElementById("sortPrice").value

cards.sort((a,b)=>{

let A=parseInt(a.dataset.price)
let B=parseInt(b.dataset.price)

if(sort=="low") return A-B
if(sort=="high") return B-A

})

cards.forEach(card=>container.appendChild(card))

}



/* FAVORITES */

function toggleFav(el,id){

let fav=JSON.parse(localStorage.getItem("favorites"))||[]

if(fav.includes(id)){
fav=fav.filter(x=>x!==id)
el.innerHTML="♡"
}else{
fav.push(id)
el.innerHTML="❤️"
}

localStorage.setItem("favorites",JSON.stringify(fav))

}



/* AI ESTIMATE */

function estimatePrice(){

let city=document.getElementById("aiCity").value.toLowerCase()
let bhk=document.getElementById("aiBHK").value
let area=document.getElementById("aiArea").value

fetch(sheetURL)

.then(res=>res.text())

.then(data=>{

let rows=data.split("\n").slice(1)

let total=0
let count=0

rows.forEach(row=>{

let cols=row.split(",")

let rCity=cols[1].toLowerCase()
let rBhk=cols[2]
let price=parseInt(cols[3])

if(rCity.includes(city) && rBhk==bhk){

total+=price
count++

}

})

if(count==0){

document.getElementById("estimatedPrice").innerHTML="No data available"
return

}

let avg=total/count

let estimate=Math.round(avg*(area/800))

document.getElementById("estimatedPrice").innerHTML="Estimated Rent: ₹"+estimate

})

}



/* PHOTO AI */

function estimatePhotoRent(){

let city=document.getElementById("photoCity").value.toLowerCase()
let bhk=document.getElementById("photoBHK").value
let file=document.getElementById("photoInput").files[0]

if(!file){
alert("Upload photo")
return
}

let img=new Image()

img.onload=function(){

let pixels=img.width*img.height
let quality="standard"

if(pixels<300000) quality="basic"
if(pixels>1000000) quality="luxury"

fetch(sheetURL)

.then(res=>res.text())

.then(data=>{

let rows=data.split("\n").slice(1)

let total=0
let count=0

rows.forEach(row=>{

let cols=row.split(",")

let rCity=cols[1].toLowerCase()
let rBhk=cols[2]
let price=parseInt(cols[3])

if(rCity.includes(city) && rBhk==bhk){

total+=price
count++

}

})

if(count==0){

document.getElementById("photoResult").innerHTML="No data available"
return

}

let avg=total/count

let multiplier=1

if(quality=="basic") multiplier=0.8
if(quality=="luxury") multiplier=1.4

let estimate=Math.round(avg*multiplier)

document.getElementById("photoResult").innerHTML=

"Quality: "+quality+"<br>Estimated Rent: ₹"+estimate

})

}

img.src=URL.createObjectURL(file)

}



loadProperties()

setInterval(loadProperties,15000)

</script>

</body>
</html>
