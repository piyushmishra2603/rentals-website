<!DOCTYPE html>
<html>

<head>

<title>Rental Property Finder</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#0f4c81;
color:white;
padding:20px;
text-align:center;
}

.hero{
background:url("https://images.unsplash.com/photo-1560518883-ce09059eeffa");
background-size:cover;
padding:70px 20px;
color:white;
text-align:center;
}

.search-box{
background:white;
padding:15px;
border-radius:10px;
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
max-width:900px;
margin:auto;
}

.search-box input,
.search-box select{
padding:10px;
border-radius:5px;
border:1px solid #ccc;
}

.search-box button{
background:#0f4c81;
color:white;
border:none;
padding:10px 20px;
border-radius:5px;
cursor:pointer;
}

.ai-box{
background:white;
padding:25px;
margin:30px auto;
max-width:700px;
text-align:center;
border-radius:10px;
}

.properties{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.price{
color:green;
font-weight:bold;
}

.favorite{
float:right;
font-size:22px;
cursor:pointer;
}

.btn{
background:#0f4c81;
color:white;
padding:8px 12px;
border-radius:6px;
text-decoration:none;
}

footer{
text-align:center;
padding:20px;
background:#eee;
}

/* Chatbot */

#chatbotBtn{
position:fixed;
bottom:20px;
right:20px;
background:#0f4c81;
color:white;
border:none;
padding:14px;
border-radius:50px;
cursor:pointer;
}

#chatbox{
position:fixed;
bottom:80px;
right:20px;
width:320px;
background:white;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
display:none;
flex-direction:column;
}

#chatHeader{
background:#0f4c81;
color:white;
padding:10px;
}

#chatMessages{
height:300px;
overflow-y:auto;
padding:10px;
font-size:14px;
}

#chatInput{
display:flex;
border-top:1px solid #ddd;
}

#chatInput input{
flex:1;
border:none;
padding:10px;
}

#chatInput button{
background:#0f4c81;
color:white;
border:none;
padding:10px;
}

</style>

</head>

<body>

<header>
<h2>Rental Property Finder</h2>
</header>

<div class="hero">

<h1>Find Your Perfect Rental Home</h1>

<div class="search-box">

<input type="text" id="locationInput" placeholder="City">

<select id="bhkFilter">
<option value="">BHK</option>
<option value="1">1 BHK</option>
<option value="2">2 BHK</option>
<option value="3">3 BHK</option>
</select>

<select id="priceFilter">
<option value="">Max Price</option>
<option value="10000">₹10k</option>
<option value="15000">₹15k</option>
<option value="20000">₹20k</option>
</select>

<select id="sortPrice">
<option value="">Sort</option>
<option value="low">Price Low-High</option>
<option value="high">Price High-Low</option>
</select>

<button onclick="filterProperties()">Search</button>

</div>

</div>

<div class="ai-box">

<h2>AI Property Assistant</h2>

<input type="text" id="aiSearch" placeholder="Example: 2BHK under 15000 in Delhi">

<button onclick="aiSearch()">Find Properties</button>

</div>

<div class="properties" id="propertyList"></div>

<footer>
<p>© 2026 Rental Property Finder</p>
</footer>

<!-- Chatbot -->

<button id="chatbotBtn" onclick="toggleChat()">AI Chat</button>

<div id="chatbox">

<div id="chatHeader">
AI Property Assistant
</div>

<div id="chatMessages"></div>

<div id="chatInput">
<input id="chatText" placeholder="Ask about rentals...">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script>

const sheetURL="https://docs.google.com/spreadsheets/d/1BiyshMuZ8ex2zDtpIttlGgxnRrvBqV9oBq7-jyz0S0M/gviz/tq?tqx=out:csv"

function loadProperties(){

fetch(sheetURL)
.then(res=>res.text())
.then(data=>{

let rows=data.split("\n").slice(1)

let container=document.getElementById("propertyList")
container.innerHTML=""

rows.forEach((row,index)=>{

let cols=row.split(",")

let title=cols[0]
let city=cols[1]
let bhk=cols[2]
let price=cols[3]
let image=cols[4]

let card=document.createElement("div")
card.className="card"

card.dataset.location=city.toLowerCase()
card.dataset.bhk=bhk
card.dataset.price=price

card.innerHTML=`

<img src="${image}">

<div class="card-content">

<span class="favorite" onclick="toggleFav(this,${index})">♡</span>

<h3>${title}</h3>
<p>${city}</p>
<p class="price">₹${price}/month</p>

<a class="btn" href="property.html?id=${index}">View Details</a>

</div>
`

container.appendChild(card)

})

})

}

function toggleFav(el,id){

let fav=JSON.parse(localStorage.getItem("favorites"))||[]

if(fav.includes(id)){
fav=fav.filter(x=>x!==id)
el.innerHTML="♡"
}else{
fav.push(id)
el.innerHTML="❤️"
}

localStorage.setItem("favorites",JSON.stringify(fav))

}

function filterProperties(){

let location=document.getElementById("locationInput").value.toLowerCase()
let bhk=document.getElementById("bhkFilter").value
let price=document.getElementById("priceFilter").value

let cards=document.querySelectorAll(".card")

cards.forEach(card=>{

let show=true

if(location && !card.dataset.location.includes(location)) show=false
if(bhk && card.dataset.bhk!==bhk) show=false
if(price && parseInt(card.dataset.price)>price) show=false

card.style.display=show?"":"none"

})

sortProperties()

}

function sortProperties(){

let sort=document.getElementById("sortPrice").value

let container=document.getElementById("propertyList")

let cards=[...container.querySelectorAll(".card")]

cards.sort((a,b)=>{

let priceA=parseInt(a.dataset.price)
let priceB=parseInt(b.dataset.price)

if(sort=="low") return priceA-priceB
if(sort=="high") return priceB-priceA

})

cards.forEach(card=>container.appendChild(card))

}

function aiSearch(){

let query=document.getElementById("aiSearch").value.toLowerCase()

if(query.includes("1bhk")) document.getElementById("bhkFilter").value="1"
if(query.includes("2bhk")) document.getElementById("bhkFilter").value="2"
if(query.includes("3bhk")) document.getElementById("bhkFilter").value="3"

let price=query.match(/\d+/)
if(price) document.getElementById("priceFilter").value=price[0]

let words=query.split(" ")
document.getElementById("locationInput").value=words[words.length-1]

filterProperties()

}

/* Chatbot */

function toggleChat(){

let box=document.getElementById("chatbox")

box.style.display = box.style.display=="flex" ? "none" : "flex"

}

function sendMessage(){

let input=document.getElementById("chatText")

let text=input.value.toLowerCase()

if(!text) return

let messages=document.getElementById("chatMessages")

messages.innerHTML += `<div style="text-align:right">${text}</div>`

let reply=""

if(text.includes("cheap")) reply="Try filtering properties under ₹10000."

else if(text.includes("1bhk")) reply="You can search using the 1BHK filter."

else if(text.includes("2bhk")) reply="Use the 2BHK filter to see those properties."

else if(text.includes("pg")) reply="Student cities like Kota have many PG options."

else reply="Use city, BHK and price filters to find properties."

messages.innerHTML += `<div>${reply}</div>`

input.value=""

messages.scrollTop = messages.scrollHeight

}

loadProperties()

</script>

</body>
</html>
