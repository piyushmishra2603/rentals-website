<!DOCTYPE html>
<html>
<head>
<title>Rental Property Finder</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#0f4c81;
color:white;
padding:20px;
text-align:center;
}

.filters{
background:white;
padding:15px;
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
}

.filters input,.filters select,.filters button{
padding:10px;
font-size:15px;
}

.properties{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
border-radius:8px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.price{
color:green;
font-weight:bold;
}

.btn{
display:inline-block;
margin-top:10px;
padding:8px 12px;
background:#0f4c81;
color:white;
text-decoration:none;
border-radius:5px;
cursor:pointer;
}

.favorite{
float:right;
cursor:pointer;
font-size:18px;
}

.add-section{
background:white;
padding:20px;
margin:20px;
border-radius:8px;
}

.add-section input{
padding:10px;
margin:5px;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:20px;
width:400px;
border-radius:8px;
}

footer{
text-align:center;
padding:20px;
background:#eee;
}

</style>
</head>

<body>

<header>
<h1>Rental Property Finder</h1>
</header>

<!-- FILTERS -->

<div class="filters">

<input type="text" id="locationInput" placeholder="Location">

<select id="bhkFilter">
<option value="">BHK</option>
<option value="1">1 BHK</option>
<option value="2">2 BHK</option>
<option value="3">3 BHK</option>
</select>

<select id="priceFilter">
<option value="">Max Price</option>
<option value="10000">₹10,000</option>
<option value="15000">₹15,000</option>
<option value="20000">₹20,000</option>
</select>

<select id="sortPrice" onchange="sortProperties()">
<option value="">Sort Price</option>
<option value="low">Low to High</option>
<option value="high">High to Low</option>
</select>

<button onclick="filterProperties()">Search</button>

</div>

<!-- PROPERTY LIST -->

<div class="properties" id="propertyList">

<div class="card" data-location="hyderabad" data-bhk="1" data-price="12000">

<img src="https://via.placeholder.com/400x250">

<div class="card-content">

<span class="favorite" onclick="toggleFav(this)">♡</span>

<h3>1BHK Apartment</h3>
<p>Hyderabad</p>
<p class="price">₹12,000/month</p>

<button class="btn" onclick="openDetails('1BHK Apartment','Hyderabad','12000')">View Details</button>

</div>
</div>

<div class="card" data-location="kota" data-bhk="1" data-price="8000">

<img src="https://via.placeholder.com/400x250">

<div class="card-content">

<span class="favorite" onclick="toggleFav(this)">♡</span>

<h3>PG for Students</h3>
<p>Kota</p>
<p class="price">₹8,000/month</p>

<button class="btn" onclick="openDetails('PG for Students','Kota','8000')">View Details</button>

</div>
</div>

<div class="card" data-location="delhi" data-bhk="2" data-price="18000">

<img src="https://via.placeholder.com/400x250">

<div class="card-content">

<span class="favorite" onclick="toggleFav(this)">♡</span>

<h3>2BHK Apartment</h3>
<p>Delhi</p>
<p class="price">₹18,000/month</p>

<button class="btn" onclick="openDetails('2BHK Apartment','Delhi','18000')">View Details</button>

</div>
</div>

</div>

<!-- ADD PROPERTY -->

<div class="add-section">

<h2>Add Property</h2>

<input id="title" placeholder="Property Title">

<input id="city" placeholder="City">

<input id="bhk" placeholder="BHK">

<input id="price" placeholder="Price">

<input id="image" placeholder="Image URL">

<button class="btn" onclick="addProperty()">Add Property</button>

</div>

<!-- PROPERTY MODAL -->

<div class="modal" id="propertyModal">

<div class="modal-content">

<h2 id="modalTitle"></h2>

<p id="modalCity"></p>

<p id="modalPrice"></p>

<a class="btn" href="mailto:owner@email.com">Contact Owner</a>

<br><br>

<button onclick="closeModal()">Close</button>

</div>

</div>

<footer>

<p>© 2026 Rental Property Finder</p>

</footer>

<script>

function filterProperties(){

let location=document.getElementById("locationInput").value.toLowerCase()
let bhk=document.getElementById("bhkFilter").value
let price=document.getElementById("priceFilter").value

let cards=document.querySelectorAll(".card")

cards.forEach(card=>{

let cardLocation=card.getAttribute("data-location")
let cardBhk=card.getAttribute("data-bhk")
let cardPrice=card.getAttribute("data-price")

let show=true

if(location && !cardLocation.includes(location)) show=false
if(bhk && cardBhk!==bhk) show=false
if(price && parseInt(cardPrice)>parseInt(price)) show=false

card.style.display=show ? "" : "none"

})

}

function sortProperties(){

let container=document.getElementById("propertyList")
let cards=[...container.querySelectorAll(".card")]
let sort=document.getElementById("sortPrice").value

cards.sort((a,b)=>{

let priceA=parseInt(a.getAttribute("data-price"))
let priceB=parseInt(b.getAttribute("data-price"))

if(sort=="low") return priceA-priceB
if(sort=="high") return priceB-priceA

})

cards.forEach(card=>container.appendChild(card))

}

function toggleFav(el){

if(el.innerHTML=="♡"){
el.innerHTML="❤️"
}else{
el.innerHTML="♡"
}

}

function openDetails(title,city,price){

document.getElementById("modalTitle").innerText=title
document.getElementById("modalCity").innerText="Location: "+city
document.getElementById("modalPrice").innerText="Rent: ₹"+price

document.getElementById("propertyModal").style.display="flex"

}

function closeModal(){

document.getElementById("propertyModal").style.display="none"

}

function addProperty(){

let title=document.getElementById("title").value
let city=document.getElementById("city").value
let bhk=document.getElementById("bhk").value
let price=document.getElementById("price").value
let image=document.getElementById("image").value

let container=document.getElementById("propertyList")

let card=document.createElement("div")

card.className="card"

card.setAttribute("data-location",city.toLowerCase())
card.setAttribute("data-bhk",bhk)
card.setAttribute("data-price",price)

card.innerHTML=`

<img src="${image}">

<div class="card-content">

<span class="favorite" onclick="toggleFav(this)">♡</span>

<h3>${title}</h3>

<p>${city}</p>

<p class="price">₹${price}/month</p>

<button class="btn" onclick="openDetails('${title}','${city}','${price}')">View Details</button>

</div>
`

container.appendChild(card)

}

</script>

</body>
</html>
