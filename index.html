<!DOCTYPE html>
<html>

<head>

<title>Rental Property Finder</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<meta name="description" content="Find rental houses, apartments and PG accommodation easily">

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

/* HEADER */

header{
background:#0f4c81;
color:white;
padding:20px;
text-align:center;
}

.nav-buttons{
margin-top:10px;
}

.nav-buttons a{
background:white;
color:#0f4c81;
padding:8px 14px;
margin:5px;
border-radius:6px;
text-decoration:none;
font-weight:bold;
}

/* HERO */

.hero{
background:url("https://images.unsplash.com/photo-1560518883-ce09059eeffa");
background-size:cover;
background-position:center;
padding:80px 20px;
text-align:center;
color:white;
}

.hero h1{
font-size:38px;
margin-bottom:10px;
}

.search-box{
background:white;
padding:15px;
border-radius:10px;
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
max-width:800px;
margin:auto;
}

.search-box input,
.search-box select{
padding:10px;
font-size:15px;
border-radius:5px;
border:1px solid #ccc;
}

.search-box button{
background:#0f4c81;
color:white;
border:none;
padding:10px 20px;
border-radius:5px;
cursor:pointer;
}

/* SORT */

.sort-box{
text-align:center;
margin-top:20px;
}

/* PROPERTY GRID */

.properties{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;
padding:20px;
}

/* PROPERTY CARD */

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.price{
color:green;
font-weight:bold;
font-size:18px;
}

.favorite{
float:right;
font-size:20px;
cursor:pointer;
}

.buttons{
margin-top:10px;
display:flex;
gap:8px;
}

.btn{
background:#0f4c81;
color:white;
padding:8px 12px;
border-radius:6px;
text-decoration:none;
font-size:14px;
}

.map-btn{
background:#2d9c5b;
}

footer{
text-align:center;
padding:20px;
background:#eee;
}

</style>

</head>

<body>

<header>

<h2>Rental Property Finder</h2>

<div class="nav-buttons">

<a href="signup.html">Owner Signup</a>

<a href="submit.html">Post Property</a>

<a href="favorites.html">Saved Properties</a>

</div>

</header>

<!-- HERO SEARCH -->

<div class="hero">

<h1>Find Your Perfect Rental Home</h1>

<div class="search-box">

<input type="text" id="locationInput" placeholder="City">

<select id="bhkFilter">
<option value="">BHK</option>
<option value="1">1 BHK</option>
<option value="2">2 BHK</option>
<option value="3">3 BHK</option>
</select>

<select id="priceFilter">
<option value="">Max Price</option>
<option value="10000">₹10,000</option>
<option value="15000">₹15,000</option>
<option value="20000">₹20,000</option>
<option value="30000">₹30,000</option>
</select>

<button onclick="filterProperties()">Search</button>

</div>

</div>

<div class="sort-box">

<select id="sortPrice" onchange="sortProperties()">
<option value="">Sort Price</option>
<option value="low">Low → High</option>
<option value="high">High → Low</option>
</select>

</div>

<!-- PROPERTY LIST -->

<div class="properties" id="propertyList"></div>

<footer>

<p>© 2026 Rental Property Finder</p>

</footer>

<script>

const sheetURL =
"https://docs.google.com/spreadsheets/d/1BiyshMuZ8ex2zDtpIttlGgxnRrvBqV9oBq7-jyz0S0M/gviz/tq?tqx=out:csv"



/* LOAD PROPERTIES */

function loadProperties(){

fetch(sheetURL)

.then(res=>res.text())

.then(data=>{

let rows=data.split("\n").slice(1)

let container=document.getElementById("propertyList")

container.innerHTML=""

rows.forEach((row,index)=>{

let cols=row.split(",")

let title=cols[0]
let city=cols[1]
let bhk=cols[2]
let price=cols[3]
let image=cols[4]

createCard(index,title,city,bhk,price,image)

})

})

}



/* CREATE PROPERTY CARD */

function createCard(id,title,city,bhk,price,image){

let container=document.getElementById("propertyList")

let favorites = JSON.parse(localStorage.getItem("favorites")) || []

let favIcon = favorites.includes(id) ? "❤️" : "♡"

let card=document.createElement("div")

card.className="card"

card.setAttribute("data-location",city.toLowerCase())
card.setAttribute("data-bhk",bhk)
card.setAttribute("data-price",price)

card.innerHTML=`

<img src="${image.split("|")[0]}">

<div class="card-content">

<span class="favorite" onclick="toggleFav(this,${id})">${favIcon}</span>

<h3>${title}</h3>

<p>${city}</p>

<p class="price">₹${price}/month</p>

<div class="buttons">

<a class="btn" href="property.html?id=${id}">
View Details
</a>

<a class="btn map-btn"
target="_blank"
href="https://www.google.com/maps/search/?api=1&query=${city}">
Map
</a>

</div>

</div>
`

container.appendChild(card)

}



/* FAVORITES SYSTEM */

function toggleFav(el,id){

let favorites = JSON.parse(localStorage.getItem("favorites")) || []

if(favorites.includes(id)){

favorites = favorites.filter(f => f !== id)

el.innerHTML="♡"

}else{

favorites.push(id)

el.innerHTML="❤️"

}

localStorage.setItem("favorites",JSON.stringify(favorites))

}



/* FILTER */

function filterProperties(){

let location=document.getElementById("locationInput").value.toLowerCase()

let bhk=document.getElementById("bhkFilter").value

let price=document.getElementById("priceFilter").value

let cards=document.querySelectorAll(".card")

cards.forEach(card=>{

let cardLocation=card.dataset.location

let cardBhk=card.dataset.bhk

let cardPrice=card.dataset.price

let show=true

if(location && !cardLocation.includes(location)) show=false

if(bhk && cardBhk!==bhk) show=false

if(price && parseInt(cardPrice)>parseInt(price)) show=false

card.style.display=show ? "" : "none"

})

sortProperties()

}



/* SORT */

function sortProperties(){

let container=document.getElementById("propertyList")

let cards=[...container.querySelectorAll(".card")]

let sort=document.getElementById("sortPrice").value

cards.sort((a,b)=>{

let priceA=parseInt(a.dataset.price)

let priceB=parseInt(b.dataset.price)

if(sort=="low") return priceA-priceB

if(sort=="high") return priceB-priceA

return 0

})

cards.forEach(card=>container.appendChild(card))

}



loadProperties()

setInterval(loadProperties,15000)

</script>

</body>

</html>
