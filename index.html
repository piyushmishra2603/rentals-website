<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Smart Property Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
background:#f4f6f9;
}

/* NAVBAR */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 60px;
background:white;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.logo{
font-size:22px;
font-weight:600;
color:#1976d2;
}

nav{
display:flex;
gap:20px;
align-items:center;
}

nav a{
text-decoration:none;
color:#333;
font-size:14px;
}

.btn{
padding:8px 18px;
border-radius:20px;
border:2px solid #1976d2;
color:#1976d2;
transition:0.3s;
}

.btn:hover{
background:#1976d2;
color:white;
}

.signup{
background:#1976d2;
color:white;
}

/* HERO */

.hero{
height:420px;
background:linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),
url("https://images.unsplash.com/photo-1560518883-ce09059eeffa");
background-size:cover;
background-position:center;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
text-align:center;
}

.hero h1{
font-size:40px;
margin-bottom:15px;
}

.hero p{
font-size:18px;
margin-bottom:25px;
}

.search{
background:white;
padding:12px;
border-radius:30px;
display:flex;
gap:10px;
width:450px;
}

.search input{
flex:1;
border:none;
outline:none;
padding:8px;
}

.search button{
background:#1976d2;
color:white;
border:none;
padding:8px 20px;
border-radius:20px;
cursor:pointer;
}

/* FEATURES */

.features{
display:flex;
justify-content:center;
gap:40px;
padding:50px;
}

.feature{
background:white;
padding:30px;
border-radius:10px;
text-align:center;
width:220px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
transition:0.3s;
}

.feature:hover{
transform:translateY(-5px);
}

/* PROPERTY SECTION */

.container{
padding:50px 60px;
}

.container h2{
margin-bottom:25px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-body{
padding:15px;
}

.price{
color:#1976d2;
font-weight:600;
margin-top:5px;
}

/* FOOTER */

footer{
background:#222;
color:white;
padding:40px;
text-align:center;
margin-top:50px;
}

</style>

</head>

<body>

<header>

<div class="logo">SmartProperty</div>

<nav>

<a href="#">Home</a>

<a href="post-property.html">Post Property</a>

<a href="dashboard.html">Dashboard</a>

<a href="login.html" id="loginBtn" class="btn">Login</a>

<a href="signup.html" id="signupBtn" class="btn signup">Signup</a>

<a href="admin.html" id="adminBtn" style="display:none;">Admin</a>

<a href="#" id="logoutBtn" style="display:none;">Logout</a>

</nav>

</header>


<section class="hero">

<h1>Find Your Dream Home</h1>

<p>Buy • Rent • Sell properties easily</p>

<div class="search">

<input placeholder="Search city">

<button>Search</button>

</div>

</section>


<section class="features">

<div class="feature">
<h3>Buy Property</h3>
<p>Find verified homes</p>
</div>

<div class="feature">
<h3>Rent Property</h3>
<p>Affordable rentals</p>
</div>

<div class="feature">
<h3>Sell Property</h3>
<p>List your property</p>
</div>

</section>


<section class="container">

<h2>Latest Properties</h2>

<div id="grid" class="grid"></div>

</section>


<footer>

<p>© 2026 Smart Property Portal</p>

</footer>



<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"

import {
getFirestore,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"

import {
getAuth,
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"


const firebaseConfig={
apiKey:"AIzaSyCExyC1UlqWl-tTJWVtoQx6E-rppaYQgcU",
authDomain:"smart-property-portal.firebaseapp.com",
projectId:"smart-property-portal",
storageBucket:"smart-property-portal.firebasestorage.app",
messagingSenderId:"407241446660",
appId:"1:407241446660:web:1259fa8c93bce5fd8aec51"
}

const ADMIN_EMAIL="piyushmishra1903@gmail.com"

const app=initializeApp(firebaseConfig)

const db=getFirestore(app)

const auth=getAuth(app)

const grid=document.getElementById("grid")


async function loadProperties(){

const snap=await getDocs(collection(db,"properties"))

snap.forEach((doc)=>{

const p=doc.data()

grid.innerHTML+=`

<div class="card">

<img src="${p.image}">

<div class="card-body">

<h3>${p.title}</h3>

<div>${p.city}</div>

<div>${p.bhk}</div>

<div class="price">₹${p.price}</div>

</div>

</div>

`

})

}

loadProperties()


const loginBtn=document.getElementById("loginBtn")
const signupBtn=document.getElementById("signupBtn")
const logoutBtn=document.getElementById("logoutBtn")
const adminBtn=document.getElementById("adminBtn")


onAuthStateChanged(auth,(user)=>{

if(user){

loginBtn.style.display="none"
signupBtn.style.display="none"
logoutBtn.style.display="inline"

if(user.email===ADMIN_EMAIL){

adminBtn.style.display="inline"

}

}

})


logoutBtn.onclick=()=>{

signOut(auth)

location.reload()

}

</script>

</body>
</html>
