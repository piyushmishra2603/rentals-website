<!DOCTYPE html>
<html>
<head>

<title>Rental Property Finder</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f3f4f6;
}

/* HEADER */

header{
background:#0f4c81;
color:white;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

header h2{
margin:0;
}

nav a{
color:white;
margin:5px;
padding:8px 12px;
background:#062b4f;
border-radius:6px;
text-decoration:none;
}

/* HERO */

.hero{
background:#0f4c81;
padding:70px 20px;
color:white;
text-align:center;
}

.search-box{
background:white;
margin:auto;
margin-top:20px;
padding:15px;
border-radius:10px;
max-width:900px;
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
}

.search-box input,
.search-box select{
padding:10px;
border-radius:5px;
border:1px solid #ccc;
}

.search-box button{
background:#0f4c81;
color:white;
border:none;
padding:10px 20px;
border-radius:6px;
cursor:pointer;
}

/* TRENDING */

.trending{
padding:20px;
}

.gallery{
display:flex;
overflow:auto;
gap:10px;
}

.gallery img{
width:160px;
border-radius:8px;
}

/* PROPERTY GRID */

.properties{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
overflow:hidden;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.price{
color:green;
font-weight:bold;
}

.favorite{
float:right;
font-size:22px;
cursor:pointer;
}

.btn{
background:#0f4c81;
color:white;
padding:8px 12px;
border-radius:6px;
text-decoration:none;
}

/* MAP */

#map{
height:450px;
margin:20px;
border-radius:10px;
}

/* AI BOX */

.ai-box{
background:white;
margin:20px;
padding:20px;
border-radius:10px;
text-align:center;
}

/* CHATBOT */

#chatbotBtn{
position:fixed;
bottom:20px;
right:20px;
background:#0f4c81;
color:white;
padding:15px;
border:none;
border-radius:50px;
cursor:pointer;
}

#chatbox{
position:fixed;
bottom:80px;
right:20px;
width:300px;
background:white;
border-radius:10px;
display:none;
flex-direction:column;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

#chatHeader{
background:#0f4c81;
color:white;
padding:10px;
}

#chatMessages{
height:250px;
overflow:auto;
padding:10px;
}

#chatInput{
display:flex;
border-top:1px solid #ddd;
}

#chatInput input{
flex:1;
border:none;
padding:10px;
}

#chatInput button{
background:#0f4c81;
color:white;
border:none;
padding:10px;
}

/* FOOTER */

footer{
background:#0f4c81;
color:white;
text-align:center;
padding:20px;
}

</style>

</head>

<body>

<header>

<h2>Rental Property Finder</h2>

<nav>

<a href="signup.html">Owner Signup</a>
<a href="submit.html">Post Property</a>
<a href="#" onclick="showFavorites()">Favorites</a>

</nav>

</header>

<div class="hero">

<h1>Find Your Perfect Rental Home</h1>

<div class="search-box">

<input id="searchCity" placeholder="City">

<select id="bhk">

<option value="">BHK</option>
<option>1</option>
<option>2</option>
<option>3</option>

</select>

<select id="sortPrice">

<option value="">Sort Price</option>
<option value="low">Low → High</option>
<option value="high">High → Low</option>

</select>

<button onclick="loadProperties()">Search</button>

</div>

</div>

<div class="trending">

<h2>Trending Properties</h2>

<div class="gallery" id="trendingGallery"></div>

</div>

<div class="ai-box">

<h3>AI Rent Estimator</h3>

<input id="size" placeholder="Area (sq ft)">
<input id="cityRent" placeholder="City">

<button onclick="estimateRent()">Estimate</button>

<p id="rentResult"></p>

</div>

<div class="ai-box">

<h3>AI Rent Estimate by Photo</h3>

<input type="file" id="photoUpload">

<button onclick="photoEstimate()">Estimate</button>

<p id="photoResult"></p>

</div>

<div id="map"></div>

<div class="properties" id="properties"></div>

<footer>

<p>© 2026 Rental Finder</p>

</footer>

<button id="chatbotBtn" onclick="toggleChat()">AI Help</button>

<div id="chatbox">

<div id="chatHeader">Property AI Assistant</div>

<div id="chatMessages"></div>

<div id="chatInput">

<input id="chatText" placeholder="Ask something">

<button onclick="sendChat()">Send</button>

</div>

</div>

<script>

/* GOOGLE SHEETS CSV */

const csvURL="PASTE YOUR GOOGLE SHEETS CSV HERE"

/* MAP */

let map=L.map('map').setView([20.5937,78.9629],5)

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map)

/* LOAD PROPERTIES */

function loadProperties(){

fetch(csvURL)
.then(res=>res.text())
.then(data=>{

let rows=data.split("\n").slice(1)

let html=""
let gallery=""

rows.forEach((row,i)=>{

let cols=row.split(",")

let title=cols[0]
let city=cols[1]
let bhk=cols[2]
let price=cols[3]
let img=cols[4]
let lat=cols[7]
let lng=cols[8]

gallery+=`<img src="${img}">`

html+=`

<div class="card">

<img src="${img}">

<div class="card-content">

<span class="favorite" onclick="toggleFav(${i})">♡</span>

<h3>${title}</h3>

<p>${city} • ${bhk} BHK</p>

<p class="price">₹${price}</p>

<a class="btn" href="property.html?id=${i}">View</a>

</div>

</div>

`

if(lat && lng){

L.marker([lat,lng]).addTo(map).bindPopup(title)

}

})

document.getElementById("properties").innerHTML=html
document.getElementById("trendingGallery").innerHTML=gallery

})

}

/* AUTO REFRESH */

loadProperties()

setInterval(loadProperties,20000)

/* FAVORITES */

function toggleFav(id){

let fav=JSON.parse(localStorage.getItem("fav"))||[]

if(fav.includes(id)){
fav=fav.filter(f=>f!==id)
}else{
fav.push(id)
}

localStorage.setItem("fav",JSON.stringify(fav))

}

function showFavorites(){

let fav=JSON.parse(localStorage.getItem("fav"))||[]

let cards=document.querySelectorAll(".card")

cards.forEach((card,i)=>{

card.style.display=fav.includes(i)?"":"none"

})

}

/* RENT ESTIMATION */

function estimateRent(){

let size=document.getElementById("size").value

let rent=size*22

document.getElementById("rentResult").innerText="Estimated Rent ₹"+rent

}

/* PHOTO ESTIMATE */

function photoEstimate(){

document.getElementById("photoResult").innerText="Estimated Rent ₹15000"

}

/* CHATBOT */

function toggleChat(){

let box=document.getElementById("chatbox")

box.style.display=box.style.display==="flex"?"none":"flex"

}

function sendChat(){

let input=document.getElementById("chatText")

let msg=input.value

let chat=document.getElementById("chatMessages")

chat.innerHTML+=`<p><b>You:</b> ${msg}</p>`
chat.innerHTML+=`<p><b>AI:</b> Try searching by city, BHK, or price.</p>`

input.value=""

}

</script>

</body>
</html>
