<!DOCTYPE html>
<html>
<head>

<title>Rental Property Finder</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#0f4c81;
color:white;
padding:20px;
text-align:center;
}

.header-btn a{
background:white;
color:#0f4c81;
padding:10px 15px;
text-decoration:none;
border-radius:6px;
font-weight:bold;
}

.filters{
background:white;
padding:15px;
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
}

.filters input,.filters select,.filters button{
padding:10px;
font-size:15px;
}

.properties{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
border-radius:8px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.price{
color:green;
font-weight:bold;
}

.btn{
display:inline-block;
margin-top:10px;
padding:8px 12px;
background:#0f4c81;
color:white;
text-decoration:none;
border-radius:5px;
cursor:pointer;
}

footer{
text-align:center;
padding:20px;
background:#eee;
}

</style>

</head>

<body>

<header>

<h1>Rental Property Finder</h1>

<br>

<a href="submit.html" class="btn">Post Property</a>

</header>

<div class="filters">

<input type="text" id="locationInput" placeholder="Location">

<select id="priceFilter">
<option value="">Max Price</option>
<option value="10000">₹10,000</option>
<option value="15000">₹15,000</option>
<option value="20000">₹20,000</option>
</select>

<button onclick="filterProperties()">Search</button>

</div>

<div class="properties" id="propertyList">

</div>

<footer>

<p>© 2026 Rental Property Finder</p>

</footer>

<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/1BiyshMuZ8ex2zDtpIttlGgxnRrvBqV9oBq7-jyz0S0M/gviz/tq?tqx=out:csv";

fetch(sheetURL)
.then(response => response.text())
.then(data => {

let rows = data.split("\n").slice(1);

let container = document.getElementById("propertyList");

rows.forEach(row => {

let cols = row.split(",");

let title = cols[0];
let city = cols[1];
let price = cols[2];
let image = cols[3];
let description = cols[4];

let card = document.createElement("div");

card.className="card";
card.setAttribute("data-location",city.toLowerCase());
card.setAttribute("data-price",price);

card.innerHTML=`

<img src="${image}">

<div class="card-content">

<h3>${title}</h3>

<p>${city}</p>

<p class="price">₹${price}/month</p>

<button class="btn" onclick="alert('${description}')">View Details</button>

</div>

`;

container.appendChild(card);

});

});

function filterProperties(){

let location=document.getElementById("locationInput").value.toLowerCase()
let price=document.getElementById("priceFilter").value

let cards=document.querySelectorAll(".card")

cards.forEach(card=>{

let cardLocation=card.getAttribute("data-location")
let cardPrice=card.getAttribute("data-price")

let show=true

if(location && !cardLocation.includes(location)) show=false
if(price && parseInt(cardPrice)>parseInt(price)) show=false

card.style.display=show ? "" : "none"

})

}

</script>

</body>
</html>
