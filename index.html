<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Property Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Roboto', sans-serif; margin:0; padding:20px; background:#f0f2f5; }
  h2 { margin-top:30px; color:#333; }
  input, button, textarea { margin:10px 0; padding:10px; width:100%; max-width:400px; border-radius:5px; border:1px solid #ccc; }
  button { background: linear-gradient(90deg,#4CAF50,#45a049); color:#fff; font-weight:bold; border:none; cursor:pointer; transition:0.3s; }
  button:hover { opacity:0.85; }
  #dashboard { margin-top:40px; display:flex; flex-wrap:wrap; gap:20px; }
  .property { background:#fff; border-radius:10px; box-shadow:0 4px 8px rgba(0,0,0,0.1); padding:15px; width:300px; }
  .property img { width:100%; height:150px; object-fit:cover; border-radius:5px; margin-bottom:5px; }
  .carousel { display:flex; overflow-x:auto; gap:5px; }
  .carousel img { width:90px; height:90px; flex-shrink:0; }
  #whatsapp { position:fixed; bottom:20px; right:20px; }
  #propertyForm { background:#fff; padding:20px; border-radius:10px; max-width:420px; margin-top:30px; box-shadow:0 4px 8px rgba(0,0,0,0.1);}
</style>
</head>
<body>

<h2>Owner Signup</h2>
<input type="text" id="signup_name" placeholder="Full Name">
<input type="email" id="signup_email" placeholder="Email">
<input type="text" id="signup_phone" placeholder="Phone">
<input type="password" id="signup_password" placeholder="Password">
<button onclick="signup()">Sign Up</button>

<h2>Owner Login</h2>
<input type="email" id="login_email" placeholder="Email">
<input type="password" id="login_password" placeholder="Password">
<button onclick="login()">Login</button>

<div id="dashboard"></div>

<h2>Submit Property</h2>
<div id="propertyForm">
  <input type="text" id="prop_title" placeholder="Property Title">
  <input type="text" id="prop_city" placeholder="City">
  <input type="text" id="prop_bhk" placeholder="BHK (e.g., 2BHK)">
  <input type="text" id="prop_price" placeholder="Price">
  <input type="text" id="prop_image1" placeholder="Image URL 1">
  <input type="text" id="prop_image2" placeholder="Image URL 2">
  <input type="text" id="prop_image3" placeholder="Image URL 3">
  <input type="text" id="prop_image4" placeholder="Image URL 4">
  <textarea id="prop_description" placeholder="Property description"></textarea>
  <input type="text" id="prop_lat" placeholder="Latitude">
  <input type="text" id="prop_lng" placeholder="Longitude">
  <button onclick="submitProperty()">Submit Property</button>
</div>

<a id="whatsapp" href="https://wa.me/1234567890" target="_blank">
  <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="50">
</a>

<!-- Free client-side AI summarizer -->
<script src="https://unpkg.com/compromise"></script>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwh-9c-O1jC7RAQrpcdXzFJZO7Yyf28CIdAmAjRVUywGYPMOszLPbYbQxP24f0PPTF80Q/exec";

// ---------------- SIGNUP ----------------
function signup(){
  const name = document.getElementById("signup_name").value.trim();
  const email = document.getElementById("signup_email").value.trim();
  const phone = document.getElementById("signup_phone").value.trim();
  const password = document.getElementById("signup_password").value.trim();
  if(!name||!email||!phone||!password){ alert("Fill all fields!"); return; }

  fetch(WEB_APP_URL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({action:"signupOwner", name,email,phone,password})
  }).then(res=>res.text()).then(resp=>alert(resp)).catch(err=>alert("Signup Error:"+err.message));
}

// ---------------- LOGIN ----------------
function login(){
  const email=document.getElementById("login_email").value.trim();
  const password=document.getElementById("login_password").value.trim();
  if(!email||!password){ alert("Fill all fields!"); return; }

  fetch(WEB_APP_URL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({action:"ownerLogin", email, password})
  }).then(res=>res.json()).then(resp=>{
    if(resp.status==="success"){ alert("Welcome "+resp.name); loadDashboard(); }
    else alert("Login failed");
  }).catch(err=>alert("Login Error:"+err.message));
}

// ---------------- DASHBOARD ----------------
function loadDashboard(){
  fetch(WEB_APP_URL+"?action=getProperties")
    .then(res=>res.json())
    .then(data=>{
      const dash=document.getElementById("dashboard");
      dash.innerHTML="<h2>Approved Properties</h2>";
      if(data.length===0){ dash.innerHTML+="<p>No approved properties yet.</p>"; return; }
      data.forEach(p=>{
        const div=document.createElement("div");
        div.className="property";
        const images=[p.images[0],p.images[1],p.images[2],p.images[3]].filter(Boolean);
        const summary=nlp(p.description).sentences().toShortText();
        div.innerHTML=`
          <h3>${p.title} (${p.bhk})</h3>
          <p>City: ${p.city} | Price: ${p.price}</p>
          <div class="carousel">${images.map(i=>`<img src="${i}">`).join('')}</div>
          <p>${summary}</p>
          <p>Contact: ${p.phone} | ${p.email}</p>
        `;
        dash.appendChild(div);
      });
    }).catch(err=>alert("Dashboard Error:"+err.message));
}

// ---------------- SUBMIT PROPERTY ----------------
function submitProperty(){
  const data={
    action:"submitProperty",
    title:document.getElementById("prop_title").value.trim(),
    city:document.getElementById("prop_city").value.trim(),
    bhk:document.getElementById("prop_bhk").value.trim(),
    price:document.getElementById("prop_price").value.trim(),
    image1:document.getElementById("prop_image1").value.trim(),
    image2:document.getElementById("prop_image2").value.trim(),
    image3:document.getElementById("prop_image3").value.trim(),
    image4:document.getElementById("prop_image4").value.trim(),
    description:document.getElementById("prop_description").value.trim(),
    lat:document.getElementById("prop_lat").value.trim(),
    lng:document.getElementById("prop_lng").value.trim()
  };

  if(!data.title||!data.city||!data.bhk||!data.price){ alert("Fill required fields!"); return; }

  // Use free AI client-side to summarize description
  if(data.description) data.description = nlp(data.description).sentences().toShortText();

  fetch(WEB_APP_URL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  }).then(res=>res.text()).then(resp=>alert(resp)).catch(err=>alert("Property Submission Error:"+err.message));
}
</script>

</body>
</html>
