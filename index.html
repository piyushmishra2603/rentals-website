<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SmartRent AI</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
font-family: 'Inter', sans-serif;
background: linear-gradient(to right,#0f2027,#203a43,#2c5364);
color:white;
}

.glass{
background: rgba(255,255,255,0.1);
backdrop-filter: blur(10px);
border-radius: 15px;
}

.card:hover{
transform: scale(1.03);
transition: 0.3s;
}

.hero{
background:url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab') no-repeat center/cover;
height:40vh;
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
font-weight:bold;
}
</style>

</head>

<body>

<!-- HERO -->
<div class="hero">SmartRent AI 🏙️</div>

<!-- NAV -->
<div class="flex justify-between p-4">
<div class="text-xl font-bold">SmartRent</div>

<div class="flex gap-2">
<a href="login.html" class="bg-blue-600 px-4 py-2 rounded">Login</a>
<a href="signup.html" class="bg-green-600 px-4 py-2 rounded">Signup</a>
<a href="post.html" class="bg-purple-600 px-4 py-2 rounded">Post</a>
<button onclick="logoutUser()" class="bg-red-600 px-4 py-2 rounded">Logout</button>
</div>
</div>

<!-- FILTER -->
<div class="max-w-6xl mx-auto p-4 flex gap-3 flex-wrap">

<input id="cityFilter" placeholder="City" class="px-3 py-2 rounded text-black">

<input id="rentFilter" type="number" placeholder="Max Rent" class="px-3 py-2 rounded text-black">

<select id="bhkFilter" class="px-3 py-2 rounded text-black">
<option value="">All</option>
<option>1 BHK</option>
<option>2 BHK</option>
<option>3 BHK</option>
</select>

<button onclick="applyFilter()" class="bg-blue-600 px-4 py-2 rounded">
Apply
</button>

</div>

<!-- AI -->
<div class="max-w-6xl mx-auto p-4">
<div class="glass p-4">
<h2>🤖 AI Insight</h2>
<p id="aiInsight">Loading AI...</p>
</div>
</div>

<!-- GRID -->
<div id="grid" class="max-w-6xl mx-auto grid md:grid-cols-3 gap-6 p-4"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"

/* 🔐 CONFIG — ADD YOUR API KEY */
const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "smart-property-portal.firebaseapp.com",
projectId: "smart-property-portal",
storageBucket: "smart-property-portal.firebasestorage.app",
messagingSenderId: "407241446660",
appId: "1:407241446660:web:1259fa8c93bce5fd8aec51"
}

const app = initializeApp(firebaseConfig)
const db = getFirestore(app)
const auth = getAuth(app)

const grid = document.getElementById("grid")

let allProperties = []
let saved = JSON.parse(localStorage.getItem("saved")) || []

/* 🔐 AUTH CHECK */
onAuthStateChanged(auth, async (user) => {

if (!user) {
window.location.href = "login.html"
return
}

await load()

})

/* DEMO LISTINGS */
const demoProperties = [
{title:"Luxury 2BHK",city:"Mumbai",bhk:"2 BHK",rent:28000,image:"https://images.unsplash.com/photo-1507089947368-19c1da9775ae",phone:"9999999999",ownerId:"demo",demo:true},
{title:"Budget 1BHK",city:"Delhi",bhk:"1 BHK",rent:12000,image:"https://images.unsplash.com/photo-1560448204-e02f11c3d0e2",phone:"9999999999",ownerId:"demo",demo:true}
]

/* LOAD DATA */
async function load(){

grid.innerHTML = "Loading properties..."

try {

const snap = await getDocs(collection(db,"properties"))

allProperties = []

snap.forEach(doc=>{
let d = doc.data()
allProperties.push({...d, id: doc.id})
})

allProperties = [...allProperties, ...demoProperties]

render(allProperties)
generateAI()

} catch(err){
grid.innerHTML = "Error loading data"
console.error(err)
}

}

/* AI INSIGHT */
function generateAI(){

if(allProperties.length === 0){
document.getElementById("aiInsight").innerText = "No data available"
return
}

let avg = allProperties.reduce((s,x)=>s+x.rent,0)/allProperties.length

document.getElementById("aiInsight").innerText =
`Avg rent ₹${Math.floor(avg)}. Lower = better deal.`

}

/* SMART SORT */
function smartSort(arr){

if(arr.length === 0) return arr

let avg = arr.reduce((s,x)=>s+x.rent,0)/arr.length

return arr.sort((a,b)=>{
let s1 = (avg - a.rent) + Math.random()*50
let s2 = (avg - b.rent) + Math.random()*50
return s2 - s1
})

}

/* FILTER */
window.applyFilter = function(){

let city = cityFilter.value.toLowerCase()
let rent = rentFilter.value
let bhk = bhkFilter.value

let filtered = allProperties.filter(p =>
(!city || p.city.toLowerCase().includes(city)) &&
(!rent || p.rent <= rent) &&
(!bhk || p.bhk === bhk)
)

render(filtered)

}

/* SAVE PROPERTY */
window.toggleSave = function(id){

if(saved.includes(id)){
saved = saved.filter(x => x !== id)
}else{
saved.push(id)
}

localStorage.setItem("saved", JSON.stringify(saved))
render(allProperties)

}

/* RENDER GRID */
function render(list){

grid.innerHTML = ""

if(list.length === 0){
grid.innerHTML = "<p>No properties found</p>"
return
}

smartSort(list).forEach(p=>{
grid.innerHTML += card(p, p.id || Math.random())
})

}

/* PROPERTY CARD */
function card(p,id){

let avg = allProperties.length
? allProperties.reduce((s,x)=>s+x.rent,0)/allProperties.length
: 0

let tag = p.rent < avg*0.9 ? "💚 Deal"
: p.rent > avg*1.2 ? "⚠️ High"
: "👍 Fair"

return `
<div class="glass card p-3">

<img src="${p.image}" class="h-40 w-full rounded object-cover">

<h3 class="mt-2">${p.title}</h3>

<p class="text-sm">${p.city} • ${p.bhk}</p>

<p class="text-green-400 font-bold">₹${p.rent}</p>

<p class="text-xs">${tag}</p>

<div class="flex gap-2 mt-3">

<a href="property.html?id=${id}" class="bg-blue-600 px-2 py-1 rounded text-sm">View</a>

${p.demo ? `<span class="text-gray-400 text-sm">Demo</span>` : `
<a href="chat.html?property=${id}&owner=${p.ownerId}" class="bg-purple-600 px-2 py-1 rounded text-sm">Chat</a>
<a href="tel:${p.phone}" class="bg-green-600 px-2 py-1 rounded text-sm">Call</a>
`}

<button onclick="toggleSave('${id}')" class="text-red-500">
${saved.includes(id)?"❤️":"🤍"}
</button>

</div>
</div>
`
}

/* LOGOUT */
window.logoutUser = async function(){
await signOut(auth)
window.location.href = "login.html"
}

</script>

</body>
</html>
