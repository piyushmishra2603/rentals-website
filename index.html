<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SmartRent Ultra</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
.glass{backdrop-filter:blur(12px);background:rgba(255,255,255,0.7);}
.dark{background:#0f172a;color:white;}
.skyline{
position:fixed;bottom:0;width:200%;height:120px;
background:url('https://i.ibb.co/7k0KZ0n/city-skyline.png') repeat-x;
background-size:contain;
animation:move 30s linear infinite;
opacity:0.4;z-index:-1;
}
@keyframes move{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
.parallax{background-attachment:fixed;}
#toast{
position:fixed;bottom:20px;right:20px;
background:#333;color:#fff;padding:12px 18px;
border-radius:8px;display:none;
}
</style>

</head>

<body class="bg-gray-100 relative" id="body">

<div class="skyline"></div>

<!-- NAVBAR -->
<header class="glass fixed w-full z-50 shadow">
<div class="max-w-7xl mx-auto flex justify-between items-center p-4">
<h1 class="text-2xl font-bold text-blue-600">SmartRent</h1>

<nav class="space-x-6">
<a href="index.html">Home</a>
<a href="post-property.html">Post</a>
<a href="dashboard.html">Dashboard</a>
<a href="login.html">Login</a>

<button onclick="toggleMode()" class="bg-gray-800 text-white px-3 py-1 rounded">
🌙
</button>
</nav>
</div>
</header>


<!-- HERO VIDEO -->
<section class="pt-20 relative">
<div class="h-[420px] relative overflow-hidden">

<video autoplay muted loop class="w-full h-full object-cover">
<source src="https://cdn.coverr.co/videos/coverr-city-traffic-5176/1080p.mp4">
</video>

<div class="absolute inset-0 bg-black/60"></div>

<div class="absolute inset-0 flex items-center justify-center">
<div class="text-center text-white">

<h2 class="text-4xl font-bold mb-6">
Find Luxury Rental Homes
</h2>

<div class="bg-white/90 backdrop-blur p-4 rounded-xl shadow-lg flex flex-wrap gap-3 justify-center">

<input id="city" placeholder="City" class="border p-2 rounded w-40">

<select id="bhk" class="border p-2 rounded">
<option value="">Any BHK</option>
<option>1 BHK</option>
<option>2 BHK</option>
<option>3 BHK</option>
</select>

<select id="rent" class="border p-2 rounded">
<option value="">Budget</option>
<option value="10000">Under ₹10k</option>
<option value="20000">Under ₹20k</option>
<option value="30000">Under ₹30k</option>
</select>

<button onclick="search()" class="bg-blue-600 text-white px-5 rounded">
Search
</button>

</div>

</div>
</div>

</div>
</section>


<!-- PARALLAX -->
<section class="parallax h-64 flex items-center justify-center text-white text-2xl font-bold"
style="background-image:url('https://images.unsplash.com/photo-1494526585095-c41746248156'); background-size:cover;">
Explore Premium Living
</section>


<!-- PROPERTIES -->
<section class="max-w-7xl mx-auto p-6">

<h2 class="text-2xl font-semibold mb-6">Premium Rentals</h2>

<div id="grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

</section>


<!-- AI RECOMMEND -->
<section class="max-w-7xl mx-auto p-6">

<h2 class="text-2xl font-semibold mb-6">Recommended For You 🤖</h2>

<div id="recommendGrid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

</section>


<div id="toast"></div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"

const firebaseConfig = {
apiKey:"AIzaSyCExyC1UlqWl-tTJWVtoQx6E-rppaYQgcU",
authDomain:"smart-property-portal.firebaseapp.com",
projectId:"smart-property-portal"
}

const app = initializeApp(firebaseConfig)
const db = getFirestore(app)
const auth = getAuth(app)

const grid = document.getElementById("grid")
let allProperties = []

/* DARK MODE */
window.toggleMode = function(){
document.getElementById("body").classList.toggle("dark")
}

/* TOAST */
function showToast(msg){
const t=document.getElementById("toast")
t.innerText=msg
t.style.display="block"
setTimeout(()=>t.style.display="none",2000)
}

/* LOGIN */
onAuthStateChanged(auth,(user)=>{
if(!user){
window.location.href="login.html"
}else{
load()
}
})

/* LOAD */
async function load(){

grid.innerHTML="Loading..."

const snapshot = await getDocs(collection(db,"properties"))

grid.innerHTML=""
allProperties=[]

snapshot.forEach(doc=>{
const data=doc.data()
allProperties.push({...data,id:doc.id})
grid.innerHTML+=card(data,doc.id)
})

recommend()
}

/* CARD */
function card(p,id){

return `
<div class="bg-white/90 backdrop-blur rounded-xl shadow hover:shadow-2xl transition overflow-hidden">

<img src="${p.image}" class="h-52 w-full object-cover">

<div class="p-4">

<h3 class="font-semibold text-lg">${p.title}</h3>
<p>${p.city} • ${p.bhk}</p>

<p class="text-green-600 font-bold">
₹${p.rent}/month
</p>

<div class="flex flex-wrap gap-2 mt-3">

<a href="property.html?id=${id}" class="bg-blue-600 text-white px-3 py-1 rounded text-sm">
View
</a>

<button onclick="showPhone('${p.phone || ''}')" class="bg-gray-800 text-white px-3 py-1 rounded text-sm">
Show Number
</button>

<a href="tel:${p.phone || ''}" class="bg-green-600 text-white px-3 py-1 rounded text-sm">
Call
</a>

<a href="https://wa.me/${p.phone || ''}" class="bg-green-500 text-white px-3 py-1 rounded text-sm">
WhatsApp
</a>

<button onclick="saveProperty()" class="text-red-500 text-lg">
❤️
</button>

</div>

</div>
</div>
`
}

/* AI RECOMMEND */
function recommend(){

const recommendGrid = document.getElementById("recommendGrid")

if(allProperties.length===0) return

const base = allProperties[Math.floor(Math.random()*allProperties.length)]

let filtered = allProperties.filter(p =>
p.city===base.city &&
Math.abs(p.rent-base.rent)<10000 &&
p.bhk===base.bhk
)

if(filtered.length<3){
filtered = allProperties.slice(0,3)
}

recommendGrid.innerHTML=""

filtered.forEach(p=>{
recommendGrid.innerHTML+=card(p,p.id)
})
}

/* SEARCH */
window.search = async function(){

const city=document.getElementById("city").value.toLowerCase()
const bhk=document.getElementById("bhk").value
const rent=document.getElementById("rent").value

const snapshot = await getDocs(collection(db,"properties"))

grid.innerHTML=""

snapshot.forEach(doc=>{

const p=doc.data()

if(
p.city.toLowerCase().includes(city) &&
(bhk=="" || p.bhk==bhk) &&
(rent=="" || p.rent<=rent)
){
grid.innerHTML+=card(p,doc.id)
}

})

}

/* SAVE */
window.saveProperty=function(){
showToast("Saved ❤️")
}

/* PHONE */
window.showPhone=function(phone){
if(!phone){showToast("No number available");return}
showToast("Owner: "+phone)
}

</script>

</body>
</html>
