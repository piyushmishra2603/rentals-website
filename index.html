<!DOCTYPE html>
<html>

<head>

<title>Rental Property Finder</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#0f4c81;
color:white;
padding:20px;
text-align:center;
}

.filters{
background:white;
padding:15px;
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
}

.filters input,.filters select,.filters button{
padding:10px;
font-size:15px;
}

.properties{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;
padding:20px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 6px 15px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 12px 25px rgba(0,0,0,0.15);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.card-content h3{
margin:0;
font-size:18px;
}

.price{
color:#1a7f37;
font-size:18px;
font-weight:bold;
margin-top:5px;
}

.buttons{
margin-top:10px;
display:flex;
gap:8px;
flex-wrap:wrap;
}

.btn{
background:#0f4c81;
color:white;
padding:8px 12px;
border-radius:6px;
text-decoration:none;
font-size:14px;
cursor:pointer;
}

.map-btn{
background:#2d9c5b;
}

.favorite{
float:right;
font-size:20px;
cursor:pointer;
}

footer{
text-align:center;
padding:20px;
background:#eee;
}

</style>

</head>

<body>

<header>

<h1>Rental Property Finder</h1>

</header>

<div class="filters">

<input type="text" id="locationInput" placeholder="Location">

<select id="bhkFilter">
<option value="">BHK</option>
<option value="1">1 BHK</option>
<option value="2">2 BHK</option>
<option value="3">3 BHK</option>
</select>

<select id="priceFilter">
<option value="">Max Price</option>
<option value="10000">₹10,000</option>
<option value="15000">₹15,000</option>
<option value="20000">₹20,000</option>
<option value="30000">₹30,000</option>
</select>

<select id="sortPrice">
<option value="">Sort Price</option>
<option value="low">Low to High</option>
<option value="high">High to Low</option>
</select>

<button onclick="filterProperties()">Search</button>

</div>

<div class="properties" id="propertyList">

</div>

<footer>

<p>© 2026 Rental Property Finder</p>

</footer>

<script>

/* ==============================
GOOGLE SHEETS CSV LINK
============================== */

const sheetURL =
"https://docs.google.com/spreadsheets/d/1BiyshMuZ8ex2zDtpIttlGgxnRrvBqV9oBq7-jyz0S0M/gviz/tq?tqx=out:csv"



/* ==============================
LOAD PROPERTIES FROM SHEET
============================== */

fetch(sheetURL)
.then(res => res.text())
.then(data => {

let rows = data.split("\n").slice(1)

rows.forEach((row,index)=>{

let cols=row.split(",")

let title=cols[0]
let city=cols[1]
let bhk=cols[2]
let price=cols[3]
let image=cols[4]
let description=cols[5]

createCard(index,title,city,bhk,price,image)

})

})



function createCard(id,title,city,bhk,price,image){

let container=document.getElementById("propertyList")

let card=document.createElement("div")

card.className="card"

card.setAttribute("data-location",city.toLowerCase())
card.setAttribute("data-bhk",bhk)
card.setAttribute("data-price",price)

card.innerHTML=`

<img src="${image}">

<div class="card-content">

<span class="favorite" onclick="toggleFav(this)">♡</span>

<h3>${title}</h3>

<p>${city}</p>

<p class="price">₹${price}/month</p>

<div class="buttons">

<a class="btn" href="property.html?id=${id}">
View Details
</a>

<a class="btn map-btn" target="_blank"
href="https://www.google.com/maps/search/?api=1&query=${city}">
View Map
</a>

</div>

</div>
`

container.appendChild(card)

}



/* ==============================
FILTER PROPERTIES
============================== */

function filterProperties(){

let location=document.getElementById("locationInput").value.toLowerCase()
let bhk=document.getElementById("bhkFilter").value
let price=document.getElementById("priceFilter").value

let cards=document.querySelectorAll(".card")

cards.forEach(card=>{

let cardLocation=card.getAttribute("data-location")
let cardBhk=card.getAttribute("data-bhk")
let cardPrice=card.getAttribute("data-price")

let show=true

if(location && !cardLocation.includes(location)) show=false
if(bhk && cardBhk!==bhk) show=false
if(price && parseInt(cardPrice)>parseInt(price)) show=false

card.style.display=show ? "" : "none"

})

sortProperties()

}



/* ==============================
SORT PROPERTIES
============================== */

function sortProperties(){

let container=document.getElementById("propertyList")
let cards=[...container.querySelectorAll(".card")]
let sort=document.getElementById("sortPrice").value

cards.sort((a,b)=>{

let priceA=parseInt(a.getAttribute("data-price"))
let priceB=parseInt(b.getAttribute("data-price"))

if(sort=="low") return priceA-priceB
if(sort=="high") return priceB-priceA
return 0

})

cards.forEach(card=>container.appendChild(card))

}



/* ==============================
FAVORITE BUTTON
============================== */

function toggleFav(el){

if(el.innerHTML=="♡"){
el.innerHTML="❤️"
}else{
el.innerHTML="♡"
}

}

</script>

</body>

</html>
