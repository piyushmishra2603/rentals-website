<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SmartRent AI</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
font-family:'Inter',sans-serif;
background:linear-gradient(to right,#0f2027,#203a43,#2c5364);
color:white;
}

.glass{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
border-radius:15px;
}

.card:hover{
transform:scale(1.03);
transition:0.3s;
}

.hero{
background:url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab') no-repeat center/cover;
height:40vh;
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
font-weight:bold;
}
</style>

</head>

<body>

<!-- ADDICTIVE FLOATING BUTTON -->
<div style="position:fixed; top:20px; right:20px; z-index:999;">

<a href="plans.html"
class="px-6 py-2 rounded-full font-bold text-white
bg-gradient-to-r from-purple-600 via-pink-500 to-red-500
shadow-xl flex items-center gap-2 transition duration-300">

💎 Plans

</a>

</div>

<style>
/* Pulse Glow */
a[href="plans.html"]{
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{box-shadow:0 0 10px rgba(255,0,150,0.5);}
50%{box-shadow:0 0 25px rgba(255,0,150,1);}
100%{box-shadow:0 0 10px rgba(255,0,150,0.5);}
}
</style>

<!-- HERO -->
<div class="hero">SmartRent AI 🏙️</div>

<!-- NAV -->
<div class="flex justify-between p-4">
<div class="text-xl font-bold">SmartRent</div>

<div class="flex gap-2">
<a href="post.html" class="bg-purple-600 px-4 py-2 rounded">Post</a>
<button onclick="logout()" class="bg-red-600 px-4 py-2 rounded">Logout</button>
</div>
</div>

<!-- SAVED -->
<div class="max-w-6xl mx-auto p-4">
<div class="glass p-3 flex justify-between">
<div>
<h3>❤️ Saved Properties</h3>
<p class="text-sm text-gray-300">Your favorites</p>
</div>
<button onclick="showSaved()" class="bg-pink-600 px-3 py-1 rounded">View</button>
</div>
</div>

<!-- FILTER -->
<div class="max-w-6xl mx-auto p-4 flex gap-3 flex-wrap">

<input id="cityFilter" placeholder="City" class="px-3 py-2 rounded text-black">
<input id="rentFilter" type="number" placeholder="Max Rent" class="px-3 py-2 rounded text-black">

<select id="bhkFilter" class="px-3 py-2 rounded text-black">
<option value="">All</option>
<option>1 BHK</option>
<option>2 BHK</option>
<option>3 BHK</option>
</select>

<button onclick="applyFilter()" class="bg-blue-600 px-4 py-2 rounded">Apply</button>

</div>

<!-- MAP -->
<div class="max-w-6xl mx-auto p-4">
<div class="glass p-4">
<h2>🗺️ Map View</h2>
<iframe width="100%" height="250" style="border:0;border-radius:10px"
src="https://maps.google.com/maps?q=india&output=embed"></iframe>
</div>
</div>

<!-- AI INSIGHT -->
<div class="max-w-6xl mx-auto p-4">
<div class="glass p-4">
<h2>🤖 AI Insight</h2>
<p id="aiInsight"></p>
</div>
</div>

<!-- AI PICKS -->
<div class="max-w-6xl mx-auto p-4">
<div class="glass p-4">
<h2>🔥 Smart Picks</h2>
<div id="aiGrid" class="grid md:grid-cols-3 gap-4"></div>
</div>
</div>

<!-- GRID -->
<div id="grid" class="max-w-6xl mx-auto grid md:grid-cols-3 gap-6 p-4"></div>

<!-- AI BUTTON -->
<button onclick="alert('AI Assistant coming soon 🤖')" 
class="fixed bottom-5 right-5 bg-blue-600 p-4 rounded-full">
🤖
</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"

/* CONFIG */
const firebaseConfig = {
apiKey:"AIzaSyCExyC1UlqWl-tTJWVtoQx6E-rppaYQgcU",
authDomain:"smart-property-portal.firebaseapp.com",
projectId:"smart-property-portal"
}

const app = initializeApp(firebaseConfig)
const db = getFirestore(app)
const auth = getAuth(app)

const grid = document.getElementById("grid")

let allProperties=[]
let saved = JSON.parse(localStorage.getItem("saved")) || []

/* AUTH */
onAuthStateChanged(auth,(user)=>{
if(!user){
window.location.href="login.html"
}else{
load()
}
})

/* DEMO DATA */
const demoProperties=[
{title:"Luxury 2BHK",city:"Mumbai",bhk:"2 BHK",rent:28000,image:"https://images.unsplash.com/photo-1507089947368-19c1da9775ae",phone:"9999999999",ownerId:"demo",demo:true},
{title:"Budget 1BHK",city:"Delhi",bhk:"1 BHK",rent:12000,image:"https://images.unsplash.com/photo-1560448204-e02f11c3d0e2",phone:"9999999999",ownerId:"demo",demo:true}
]

/* LOAD */
async function load(){

grid.innerHTML="Loading..."

const snap = await getDocs(collection(db,"properties"))

allProperties=[]

snap.forEach(doc=>{
let d=doc.data()
allProperties.push({...d,id:doc.id})
})

allProperties=[...allProperties,...demoProperties]

render(allProperties)
renderAI()
generateAI()

}

/* AI INSIGHT */
function generateAI(){
let avg = allProperties.reduce((s,x)=>s+x.rent,0)/allProperties.length
document.getElementById("aiInsight").innerText =
`Average rent ₹${Math.floor(avg)}`
}

/* AI PICKS */
function renderAI(){
let sorted=[...allProperties].sort((a,b)=>a.rent-b.rent).slice(0,3)

document.getElementById("aiGrid").innerHTML = sorted.map(p=>`
<div class="glass p-3">
<img src="${p.image}" class="h-32 w-full rounded object-cover">
<h3>${p.title}</h3>
<p>₹${p.rent}</p>
</div>
`).join("")
}

/* FILTER */
window.applyFilter = function(){
let city = cityFilter.value.toLowerCase()
let rent = rentFilter.value
let bhk = bhkFilter.value

let f = allProperties.filter(p=>
(!city||p.city.toLowerCase().includes(city)) &&
(!rent||p.rent<=rent) &&
(!bhk||p.bhk===bhk)
)

render(f)
}

/* SAVE */
window.toggleSave=function(id){
if(saved.includes(id)){
saved=saved.filter(x=>x!==id)
}else{
saved.push(id)
}
localStorage.setItem("saved",JSON.stringify(saved))
render(allProperties)
}

/* SHOW SAVED */
window.showSaved=function(){
let f=allProperties.filter(p=>saved.includes(p.id))
render(f)
}

/* LOGOUT */
window.logout=function(){
signOut(auth)
}

/* RENDER */
function render(list){

grid.innerHTML=""

list.forEach(p=>{

let avg = allProperties.reduce((s,x)=>s+x.rent,0)/allProperties.length
let score = Math.floor(Math.random()*3)+7

grid.innerHTML+=`
<div class="glass card p-3">

<img src="${p.image}" class="h-40 w-full rounded object-cover">

<h3>${p.title} ${!p.demo?'<span class="text-green-400 text-xs">✔</span>':''}</h3>

<p>${p.city} • ${p.bhk}</p>

<p class="text-green-400 font-bold">₹${p.rent}</p>

<p class="text-yellow-400 text-sm">⭐ ${score}/10</p>

<div class="flex gap-2 mt-3">

<a href="property.html?id=${p.id}" class="bg-blue-600 px-2 py-1 rounded text-sm">View</a>

${p.demo ? `<span class="text-gray-400 text-sm">Demo</span>` : `
<a href="chat.html?property=${p.id}&owner=${p.ownerId}" class="bg-purple-600 px-2 py-1 rounded text-sm">Chat</a>
<a href="tel:${p.phone}" class="bg-green-600 px-2 py-1 rounded text-sm">Call</a>
<button class="bg-yellow-500 px-2 py-1 rounded text-sm">Visit</button>
`}

<button onclick="toggleSave('${p.id}')" class="text-red-500">
${saved.includes(p.id)?"❤️":"🤍"}
</button>

</div>
</div>
`

})

}

</script>

  <!-- AI OFFER POPUP -->
<div id="offerPopup" 
class="hidden fixed bottom-5 right-5 bg-black bg-opacity-80 p-5 rounded-xl shadow-xl max-w-sm">

<h3 class="text-lg font-bold text-yellow-400">
🔥 Limited Offer
</h3>

<p class="text-sm mt-2">
Upgrade now & boost your property visibility by 3x 🚀
</p>

<button onclick="goPlans()" 
class="mt-3 w-full py-2 rounded bg-gradient-to-r from-yellow-400 to-orange-500 text-black font-bold">
Upgrade Now
</button>

<button onclick="closePopup()" 
class="text-gray-400 text-xs mt-2 w-full">
Maybe Later
</button>

</div>

<script>
function goPlans(){
window.location.href="plans.html"
}

function closePopup(){
offerPopup.style.display="none"
}

/* SHOW AFTER 5s */
setTimeout(()=>{
offerPopup.style.display="block"
},5000)

/* SHOW AGAIN AFTER SCROLL */
window.addEventListener("scroll",()=>{
if(window.scrollY>300){
offerPopup.style.display="block"
}
})
</script>
  
</body>
</html>
