<!DOCTYPE html>
<html>
<head>
<title>Rental Property Finder</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#0f4c81;
color:white;
padding:20px;
text-align:center;
}

.filters{
background:white;
padding:15px;
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
}

.filters input,.filters select,.filters button{
padding:10px;
font-size:15px;
}

.properties{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
border-radius:8px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.price{
color:green;
font-weight:bold;
}

.btn{
display:inline-block;
margin-top:10px;
padding:8px 12px;
background:#0f4c81;
color:white;
text-decoration:none;
border-radius:5px;
cursor:pointer;
border:none;
}

.favorite{
float:right;
cursor:pointer;
font-size:18px;
}

.add-section{
background:white;
padding:20px;
margin:20px;
border-radius:8px;
}

.add-section input{
padding:10px;
margin:5px;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:20px;
width:90%;
max-width:400px;
border-radius:8px;
}

footer{
text-align:center;
padding:20px;
background:#eee;
}

</style>
</head>

<body>

<header>
<h1>Rental Property Finder</h1>
</header>

<div class="filters">

<input type="text" id="locationInput" placeholder="Location">

<select id="bhkFilter">
<option value="">BHK</option>
<option value="1">1 BHK</option>
<option value="2">2 BHK</option>
<option value="3">3 BHK</option>
</select>

<select id="priceFilter">
<option value="">Max Price</option>
<option value="10000">₹10,000</option>
<option value="15000">₹15,000</option>
<option value="20000">₹20,000</option>
</select>
