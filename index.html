<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SmartProperty</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">


<!-- NAVBAR -->

<header class="bg-white shadow-md">

<div class="max-w-7xl mx-auto flex justify-between items-center p-4">

<h1 class="text-2xl font-bold text-blue-600">SmartProperty</h1>

<nav class="space-x-6">

<a href="index.html" class="hover:text-blue-600">Home</a>
<a href="post-property.html" class="hover:text-blue-600">Post Property</a>
<a href="dashboard.html" class="hover:text-blue-600">Dashboard</a>
<a href="login.html" class="hover:text-blue-600">Login</a>

</nav>

</div>

</header>



<!-- HERO SECTION -->

<section class="relative">

<img 
src="https://images.unsplash.com/photo-1560185127-6ed189bf02f4"
class="w-full h-[420px] object-cover">

<div class="absolute inset-0 bg-black/40 flex items-center justify-center">

<div class="text-center text-white">

<h2 class="text-4xl font-bold mb-6">
Find Your Dream Rental Home
</h2>


<!-- SEARCH BAR -->

<div class="bg-white p-4 rounded-lg shadow-lg flex gap-3 w-[600px] mx-auto">

<input
id="citySearch"
placeholder="Search City"
class="border p-2 flex-1 rounded">

<select
id="bhkSearch"
class="border p-2 rounded">

<option value="">Any BHK</option>
<option>1 BHK</option>
<option>2 BHK</option>
<option>3 BHK</option>

</select>

<button
onclick="searchProperties()"
class="bg-blue-600 text-white px-6 rounded">

Search

</button>

</div>

</div>

</div>

</section>



<!-- PROPERTY LIST -->

<section class="max-w-7xl mx-auto p-6">

<h2 class="text-2xl font-semibold mb-6">
Available Properties
</h2>

<div
id="propertyGrid"
class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

</div>

</section>



<!-- FOOTER -->

<footer class="bg-gray-900 text-white text-center p-6 mt-10">

<p>© 2026 SmartProperty Portal</p>

</footer>



<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"

import {
getFirestore,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"



const firebaseConfig = {

apiKey:"AIzaSyCExyC1UlqWl-tTJWVtoQx6E-rppaYQgcU",
authDomain:"smart-property-portal.firebaseapp.com",
projectId:"smart-property-portal",
storageBucket:"smart-property-portal.firebasestorage.app",
messagingSenderId:"407241446660",
appId:"1:407241446660:web:1259fa8c93bce5fd8aec51"

}


const app = initializeApp(firebaseConfig)

const db = getFirestore(app)

const auth = getAuth(app)

const grid = document.getElementById("propertyGrid")



/* LOGIN CHECK */

onAuthStateChanged(auth,(user)=>{

if(!user){

window.location.href="login.html"

}else{

loadProperties()

}

})



/* LOAD PROPERTIES */

async function loadProperties(){

const snapshot = await getDocs(collection(db,"properties"))

grid.innerHTML=""

snapshot.forEach(doc=>{

const p = doc.data()

grid.innerHTML += `

<div class="bg-white rounded-lg shadow hover:shadow-xl transition">

<img src="${p.image}" class="h-52 w-full object-cover rounded-t">

<div class="p-4">

<h3 class="font-semibold text-lg">
${p.title}
</h3>

<p class="text-gray-500">
${p.city}
</p>

<p class="text-blue-600 font-bold mt-2">
₹${p.price}/month
</p>

<a
href="property.html?id=${doc.id}"
class="inline-block mt-3 bg-blue-600 text-white px-4 py-2 rounded">

View Details

</a>

</div>

</div>

`

})

}



/* SEARCH */

window.searchProperties = async function(){

const city=document.getElementById("citySearch").value.toLowerCase()
const bhk=document.getElementById("bhkSearch").value

const snapshot = await getDocs(collection(db,"properties"))

grid.innerHTML=""

snapshot.forEach(doc=>{

const p = doc.data()

if(
p.city.toLowerCase().includes(city) &&
(bhk=="" || p.bhk==bhk)
){

grid.innerHTML += `

<div class="bg-white rounded-lg shadow hover:shadow-xl transition">

<img src="${p.image}" class="h-52 w-full object-cover rounded-t">

<div class="p-4">

<h3 class="font-semibold text-lg">
${p.title}
</h3>

<p class="text-gray-500">
${p.city}
</p>

<p class="text-blue-600 font-bold mt-2">
₹${p.price}/month
</p>

<a
href="property.html?id=${doc.id}"
class="inline-block mt-3 bg-blue-600 text-white px-4 py-2 rounded">

View Details

</a>

</div>

</div>

`

}

})

}

</script>

</body>
</html>
