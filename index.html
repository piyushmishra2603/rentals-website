<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SmartRent Premium</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

/* Glass navbar */
.glass{
backdrop-filter: blur(10px);
background: rgba(255,255,255,0.7);
}

/* Toast */
#toast{
position:fixed;
bottom:20px;
right:20px;
background:#333;
color:#fff;
padding:12px 18px;
border-radius:8px;
display:none;
}

</style>

</head>

<body class="bg-gray-100">


<!-- NAVBAR -->

<header class="glass fixed w-full z-50 shadow">

<div class="max-w-7xl mx-auto flex justify-between items-center p-4">

<h1 class="text-2xl font-bold text-blue-600 cursor-pointer" id="logo">
SmartRent
</h1>

<nav class="space-x-6">

<a href="index.html">Home</a>
<a href="post-property.html">Post</a>
<a href="dashboard.html">Dashboard</a>
<a href="login.html">Login</a>

</nav>

</div>

</header>



<!-- HERO -->

<section class="pt-20 relative">

<div class="h-[420px] bg-gradient-to-r from-blue-600 to-indigo-700 flex items-center justify-center">

<div class="text-center text-white">

<h2 class="text-4xl font-bold mb-6">
Find Premium Rental Homes
</h2>

<div class="bg-white p-4 rounded-xl shadow-lg flex flex-wrap gap-3 justify-center">

<input id="city" placeholder="City"
class="border p-2 rounded w-40">

<select id="bhk" class="border p-2 rounded">
<option value="">Any BHK</option>
<option>1 BHK</option>
<option>2 BHK</option>
<option>3 BHK</option>
</select>

<select id="rent" class="border p-2 rounded">
<option value="">Budget</option>
<option value="10000">Under ₹10k</option>
<option value="20000">Under ₹20k</option>
<option value="30000">Under ₹30k</option>
</select>

<button onclick="search()"
class="bg-blue-600 text-white px-5 rounded">
Search
</button>

</div>

</div>

</div>

</section>



<!-- PROPERTY GRID -->

<section class="max-w-7xl mx-auto p-6">

<h2 class="text-2xl font-semibold mb-6">
Premium Rentals
</h2>

<div id="grid"
class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
</div>

</section>



<div id="toast"></div>



<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"

import {
getFirestore,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"



const firebaseConfig = {
apiKey:"AIzaSyCExyC1UlqWl-tTJWVtoQx6E-rppaYQgcU",
authDomain:"smart-property-portal.firebaseapp.com",
projectId:"smart-property-portal"
}


const app = initializeApp(firebaseConfig)
const db = getFirestore(app)
const auth = getAuth(app)

const grid = document.getElementById("grid")



/* TOAST */

function showToast(msg){
const t=document.getElementById("toast")
t.innerText=msg
t.style.display="block"
setTimeout(()=>t.style.display="none",2000)
}



/* LOGIN */

onAuthStateChanged(auth,(user)=>{
if(!user){
window.location.href="login.html"
}else{
load()
}
})



/* LOAD */

async function load(){

grid.innerHTML = skeleton()

const snapshot = await getDocs(collection(db,"properties"))

grid.innerHTML=""

snapshot.forEach(doc=>{

grid.innerHTML += card(doc.data(),doc.id)

})

}



/* CARD */

function card(p,id){

return `

<div class="bg-white rounded-xl shadow hover:shadow-2xl transition overflow-hidden relative">

<!-- Badge -->
<div class="absolute top-2 left-2 bg-yellow-400 text-xs px-2 py-1 rounded">
Featured
</div>

<img src="${p.image}" class="h-52 w-full object-cover">

<div class="p-4">

<h3 class="font-semibold text-lg">${p.title}</h3>

<p class="text-gray-500">${p.city} • ${p.bhk}</p>

<p class="text-green-600 font-bold mt-2">
₹${p.rent}/month
</p>

<div class="flex justify-between items-center mt-3">

<a href="property.html?id=${id}"
class="bg-blue-600 text-white px-3 py-1 rounded text-sm">
View
</a>

<button onclick="saveProperty('${id}')"
class="text-red-500 text-lg">
❤️
</button>

</div>

</div>

</div>

`

}



/* SKELETON */

function skeleton(){
let s=""
for(let i=0;i<6;i++){
s+=`<div class="bg-gray-200 h-64 rounded animate-pulse"></div>`
}
return s
}



/* SAVE */

window.saveProperty = function(id){

showToast("Saved to wishlist ❤️")

}



/* SEARCH */

window.search = async function(){

const city=document.getElementById("city").value.toLowerCase()
const bhk=document.getElementById("bhk").value
const rent=document.getElementById("rent").value

const snapshot = await getDocs(collection(db,"properties"))

grid.innerHTML=""

snapshot.forEach(doc=>{

const p=doc.data()

if(
p.city.toLowerCase().includes(city) &&
(bhk=="" || p.bhk==bhk) &&
(rent=="" || p.rent <= rent)
){
grid.innerHTML += card(p,doc.id)
}

})

}

</script>

</body>
</html>
