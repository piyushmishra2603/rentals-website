<!DOCTYPE html>
<html>
<head>
<title>Rental Property Finder</title>

<style>

body{
font-family: Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#0f4c81;
color:white;
padding:20px;
text-align:center;
}

.filters{
background:white;
padding:20px;
display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
}

.filters input,
.filters select,
.filters button{
padding:10px;
font-size:16px;
}

.properties{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
border-radius:8px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.price{
color:green;
font-weight:bold;
}

.btn{
display:inline-block;
margin-top:10px;
padding:8px 12px;
background:#0f4c81;
color:white;
text-decoration:none;
border-radius:5px;
}

footer{
text-align:center;
padding:20px;
background:#eee;
margin-top:30px;
}

</style>
</head>

<body>

<header>
<h1>Rental Property Finder</h1>
</header>

<!-- FILTER SECTION -->

<div class="filters">

<input type="text" id="locationInput" placeholder="Location">

<select id="bhkFilter">
<option value="">BHK</option>
<option value="1">1 BHK</option>
<option value="2">2 BHK</option>
<option value="3">3 BHK</option>
</select>

<select id="priceFilter">
<option value="">Max Price</option>
<option value="10000">₹10,000</option>
<option value="15000">₹15,000</option>
<option value="20000">₹20,000</option>
</select>

<select id="sortPrice" onchange="sortProperties()">
<option value="">Sort Price</option>
<option value="low">Low to High</option>
<option value="high">High to Low</option>
</select>

<button onclick="filterProperties()">Search</button>

</div>

<!-- PROPERTY LIST -->

<div class="properties" id="propertyList">

<div class="card" data-location="hyderabad" data-bhk="1" data-price="12000">

<img src="https://via.placeholder.com/400x250">

<div class="card-content">

<h3>1BHK Apartment</h3>
<p>Hyderabad</p>
<p class="price">₹12,000/month</p>

<a class="btn" href="property.html?id=1">View Details</a>

</div>
</div>


<div class="card" data-location="kota" data-bhk="1" data-price="8000">

<img src="https://via.placeholder.com/400x250">

<div class="card-content">

<h3>PG for Students</h3>
<p>Kota</p>
<p class="price">₹8,000/month</p>

<a class="btn" href="property.html?id=2">View Details</a>

</div>
</div>


<div class="card" data-location="delhi" data-bhk="2" data-price="18000">

<img src="https://via.placeholder.com/400x250">

<div class="card-content">

<h3>2BHK Apartment</h3>
<p>Delhi</p>
<p class="price">₹18,000/month</p>

<a class="btn" href="property.html?id=3">View Details</a>

</div>
</div>

</div>

<footer>
<p>© 2026 Rental Property Finder</p>
</footer>

<script>

function filterProperties(){

let location=document.getElementById("locationInput").value.toLowerCase()
let bhk=document.getElementById("bhkFilter").value
let price=document.getElementById("priceFilter").value

let cards=document.querySelectorAll(".card")

cards.forEach(card=>{

let cardLocation=card.getAttribute("data-location")
let cardBhk=card.getAttribute("data-bhk")
let cardPrice=card.getAttribute("data-price")

let show=true

if(location && !cardLocation.includes(location)){
show=false
}

if(bhk && cardBhk!==bhk){
show=false
}

if(price && parseInt(cardPrice)>parseInt(price)){
show=false
}

card.style.display=show ? "" : "none"

})

}

function sortProperties(){

let container=document.getElementById("propertyList")

let cards=[...container.querySelectorAll(".card")]

let sort=document.getElementById("sortPrice").value

cards.sort((a,b)=>{

let priceA=parseInt(a.getAttribute("data-price"))
let priceB=parseInt(b.getAttribute("data-price"))

if(sort=="low") return priceA-priceB
if(sort=="high") return priceB-priceA

})

cards.forEach(card=>container.appendChild(card))

}

</script>

</body>
</html>
