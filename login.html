<!DOCTYPE html>
<html>
<head>
  <title>Owner Login</title>
  <style>
    body { font-family: Arial; margin: 50px; }
    input { display: block; margin: 10px 0; padding: 8px; width: 250px; }
    button { padding: 10px 20px; cursor: pointer; }
  </style>
</head>
<body>

<h2>Owner Login</h2>

<input type="email" id="email" placeholder="Email" required>
<input type="password" id="password" placeholder="Password" required>
<button onclick="login()">Login</button>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbznG-GmZj4sHzqd4XLQzXmAhzAXvqLHJDr5IcpnofWmuexOYsncz7DhfkKL0c5dNcjqOw/exec";

function login() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if(!email || !password) {
    alert("Please fill all fields!");
    return;
  }

  fetch(WEB_APP_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      action: "ownerLogin",
      email: email,
      password: password
    })
  })
  .then(res => res.json())
  .then(response => {
    if(response.status === "success") {
      alert("Login successful!");
      // Save email locally to fetch properties later
      localStorage.setItem("ownerEmail", response.email);
      localStorage.setItem("ownerName", response.name);
      window.location.href = "dashboard.html";
    } else {
      alert("Login failed: " + response.message);
    }
  })
  .catch(err => console.error(err));
}
</script>

</body>
</html>
