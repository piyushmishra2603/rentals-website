<!DOCTYPE html>
<html>
<head>
  <title>Owner Login</title>
  <style>
    body { font-family: Arial; margin:50px; }
    input, button { display:block; margin:10px 0; padding:10px; width:300px; }
    button { cursor:pointer; background-color:#2196F3; color:white; border:none; font-weight:bold; }
    button:hover { background-color:#0b7dda; }
  </style>
</head>
<body>

<h2>Owner Login</h2>

<input type="email" id="email" placeholder="Email" required>
<input type="password" id="password" placeholder="Password" required>
<button onclick="login()">Login</button>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwh-9c-O1jC7RAQrpcdXzFJZO7Yyf28CIdAmAjRVUywGYPMOszLPbYbQxP24f0PPTF80Q/exec";

function login() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if(!email || !password) { alert("Fill all fields!"); return; }

  fetch(WEB_APP_URL,{
    method:"POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({action:"ownerLogin", email, password})
  })
  .then(res=>res.json())
  .then(resp=>{
    if(resp.status==="success") {
      localStorage.setItem("ownerEmail", resp.email);
      localStorage.setItem("ownerName", resp.name);
      window.location.href="dashboard.html";
    } else {
      alert("Login failed: "+resp.message);
    }
  })
  .catch(err=>{console.error(err); alert("Error during login");});
}
</script>
</body>
</html>
