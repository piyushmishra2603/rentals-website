<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - SmartRent AI</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
font-family:'Inter',sans-serif;
background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#1c92d2);
background-size:400% 400%;
animation:gradient 10s ease infinite;
color:white;
}

@keyframes gradient{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.glass{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
border-radius:15px;
}

input{
color:black;
}

.spinner{
border:4px solid rgba(255,255,255,0.2);
border-top:4px solid white;
border-radius:50%;
width:20px;
height:20px;
animation:spin 1s linear infinite;
display:inline-block;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}
</style>

</head>

<body class="flex items-center justify-center min-h-screen">

<div class="grid md:grid-cols-2 w-full max-w-5xl glass shadow-lg overflow-hidden">

<!-- LEFT PANEL -->
<div class="hidden md:flex flex-col justify-center items-center bg-cover bg-center p-6"
style="background-image:url('https://images.unsplash.com/photo-1505693416388-ac5ce068fe85')">

<h1 class="text-3xl font-bold">Welcome Back 🏙️</h1>
<p class="mt-2 text-center">Smart AI-powered rentals</p>

</div>

<!-- RIGHT PANEL -->
<div class="p-8">

<h2 class="text-2xl font-bold mb-6 text-center">Login</h2>

<input id="email" type="email" placeholder="Email"
class="w-full p-3 mb-3 rounded">

<div class="relative">
<input id="password" type="password" placeholder="Password"
class="w-full p-3 mb-3 rounded">
<button onclick="togglePass()" 
class="absolute right-2 top-2 text-black">👁</button>
</div>

<!-- OPTIONS -->
<div class="flex justify-between text-sm mb-3">
<label>
<input type="checkbox" id="remember"> Remember me
</label>
<button onclick="forgotPassword()" class="text-blue-300 underline">
Forgot?
</button>
</div>

<!-- LOGIN -->
<button onclick="login()" id="loginBtn"
class="w-full bg-blue-600 p-3 rounded mb-3 flex justify-center items-center gap-2">
<span id="btnText">Login</span>
</button>

<!-- GOOGLE -->
<button onclick="googleLogin()" 
class="w-full bg-red-600 p-3 rounded mb-3">
Login with Google
</button>

<!-- BIOMETRIC -->
<button onclick="biometricLogin()" 
class="w-full bg-purple-600 p-3 rounded mb-3">
🔐 Login with Biometrics
</button>

<p class="text-center">
No account?
<a href="signup.html" class="text-green-400">Signup</a>
</p>

<p id="msg" class="text-center mt-3 text-red-400"></p>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"
import { 
getAuth, 
signInWithEmailAndPassword, 
onAuthStateChanged,
GoogleAuthProvider,
signInWithPopup,
sendPasswordResetEmail,
setPersistence,
browserLocalPersistence,
browserSessionPersistence
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"

/* 🔐 CONFIG */
const firebaseConfig = {
apiKey:"AIzaSyCExyC1UlqWl-tTJWVtoQx6E-rppaYQgcU",
authDomain:"smart-property-portal.firebaseapp.com",
projectId:"smart-property-portal",
storageBucket:"smart-property-portal.firebasestorage.app",
messagingSenderId:"407241446660",
appId:"1:407241446660:web:1259fa8c93bce5fd8aec51"
}

const app = initializeApp(firebaseConfig)
const auth = getAuth(app)
const provider = new GoogleAuthProvider()

/* AUTO REDIRECT */
onAuthStateChanged(auth,(user)=>{
if(user){
window.location.href="index.html"
}
})

/* LOGIN */
window.login = async function(){

const email = document.getElementById("email").value
const password = document.getElementById("password").value
const remember = document.getElementById("remember").checked
const msg = document.getElementById("msg")
const btnText = document.getElementById("btnText")

msg.innerText=""
btnText.innerHTML = '<span class="spinner"></span>'

try{

await setPersistence(auth, remember ? browserLocalPersistence : browserSessionPersistence)

await signInWithEmailAndPassword(auth,email,password)

window.location.href="index.html"

}catch(err){
msg.innerText = err.message
btnText.innerText = "Login"
}

}

/* GOOGLE LOGIN */
window.googleLogin = async function(){

try{
await signInWithPopup(auth,provider)
window.location.href="index.html"
}catch(err){
document.getElementById("msg").innerText=err.message
}

}

/* FORGOT PASSWORD */
window.forgotPassword = async function(){

const email = document.getElementById("email").value

if(!email){
alert("Enter email first")
return
}

try{
await sendPasswordResetEmail(auth,email)
alert("Reset email sent")
}catch(err){
alert(err.message)
}

}

/* BIOMETRIC LOGIN */
window.biometricLogin = async function(){

const msg = document.getElementById("msg")
msg.innerText=""

try{

if(!window.PublicKeyCredential){
alert("Biometric not supported")
return
}

const challenge = new Uint8Array(32)
window.crypto.getRandomValues(challenge)

await navigator.credentials.get({
publicKey:{
challenge:challenge,
timeout:60000,
userVerification:"preferred"
}
})

alert("Biometric verified ✅")

const user = auth.currentUser

if(user){
window.location.href="index.html"
}else{
alert("Login once with password first")
}

}catch(err){
msg.innerText="Biometric cancelled or failed"
}

}

/* SHOW PASSWORD */
window.togglePass = function(){
const pass = document.getElementById("password")
pass.type = pass.type === "password" ? "text" : "password"
}

/* ENTER KEY */
document.addEventListener("keypress",(e)=>{
if(e.key==="Enter"){
login()
}
})

</script>

</body>
</html>
