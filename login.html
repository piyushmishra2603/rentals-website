<!DOCTYPE html>
<html>

<head>

<title>Owner Login</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:30px;
border-radius:10px;
width:300px;
text-align:center;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
width:100%;
padding:10px;
background:#0f4c81;
color:white;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<h2>Owner Login</h2>

<input id="email" placeholder="Email">

<button onclick="login()">Login</button>

</div>

<script>

function login(){

let email=document.getElementById("email").value

localStorage.setItem("ownerEmail",email)

window.location="dashboard.html"

}

</script>

</body>

</html>
