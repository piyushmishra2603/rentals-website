<!DOCTYPE html>
<html>
<head>
  <title>Owner Login</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #f4f4f4; }
    input, button { display: block; margin: 10px 0; padding: 10px; width: 300px; }
    button { cursor: pointer; background: #2196F3; color: white; border: none; }
  </style>
</head>
<body>
  <h2>Owner Login</h2>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Login</button>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzRvyjppF8C-MWeOOEPuqxBpfxo_QA3_OXs-lp7JpK1DEzOQQ2kIHB6rnAoTS-5FL2liQ/exec";

    function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      fetch(WEB_APP_URL, {
        method: "POST",
        body: JSON.stringify({ action: "ownerLogin", email, password })
      })
      .then(res => res.json())
      .then(data => {
        if(data.status === "success"){
          localStorage.setItem("ownerEmail", data.email);
          localStorage.setItem("ownerName", data.name);
          alert("Login successful! Redirecting...");
          window.location.href = "dashboard.html";
        } else {
          alert("Login failed!");
        }
      })
      .catch(err => console.error(err));
    }
  </script>
</body>
</html>
