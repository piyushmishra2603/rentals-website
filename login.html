<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - SmartRent AI</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
font-family:'Inter',sans-serif;
background:linear-gradient(to right,#141e30,#243b55);
color:white;
}

.glass{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
border-radius:15px;
}

input{
color:black;
}
</style>

</head>

<body class="flex items-center justify-center h-screen">

<div class="glass p-8 w-96 shadow-lg">

<h2 class="text-2xl font-bold text-center mb-6">🔐 SmartRent Login</h2>

<input id="email" type="email" placeholder="Email"
class="w-full p-3 mb-3 rounded">

<div class="relative">
<input id="password" type="password" placeholder="Password"
class="w-full p-3 mb-3 rounded">
<button onclick="togglePass()" 
class="absolute right-2 top-2 text-black">👁</button>
</div>

<button onclick="login()" 
class="w-full bg-blue-600 p-3 rounded mb-3">
Login
</button>

<button onclick="googleLogin()" 
class="w-full bg-red-600 p-3 rounded mb-3">
Login with Google
</button>

<button onclick="forgotPassword()" 
class="text-sm text-blue-300 underline">
Forgot Password?
</button>

<p class="mt-4 text-center">
Don't have an account?
<a href="signup.html" class="text-green-400">Signup</a>
</p>

<p id="msg" class="text-center mt-3 text-red-400"></p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"
import { 
getAuth, 
signInWithEmailAndPassword, 
onAuthStateChanged,
GoogleAuthProvider,
signInWithPopup,
sendPasswordResetEmail
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"

/* 🔐 CONFIG */
const firebaseConfig = {
apiKey:"AIzaSyCExyC1UlqWl-tTJWVtoQx6E-rppaYQgcU",
authDomain:"smart-property-portal.firebaseapp.com",
projectId:"smart-property-portal",
storageBucket:"smart-property-portal.firebasestorage.app",
messagingSenderId:"407241446660",
appId:"1:407241446660:web:1259fa8c93bce5fd8aec51"
}

const app = initializeApp(firebaseConfig)
const auth = getAuth(app)
const provider = new GoogleAuthProvider()

/* AUTO REDIRECT IF LOGGED IN */
onAuthStateChanged(auth,(user)=>{
if(user){
window.location.href="index.html"
}
})

/* LOGIN */
window.login = async function(){

const email = document.getElementById("email").value
const password = document.getElementById("password").value
const msg = document.getElementById("msg")

msg.innerText=""

try{
await signInWithEmailAndPassword(auth,email,password)
window.location.href="index.html"
}catch(err){
msg.innerText=err.message
}

}

/* GOOGLE LOGIN */
window.googleLogin = async function(){

try{
await signInWithPopup(auth,provider)
window.location.href="index.html"
}catch(err){
document.getElementById("msg").innerText=err.message
}

}

/* FORGOT PASSWORD */
window.forgotPassword = async function(){

const email = document.getElementById("email").value

if(!email){
alert("Enter email first")
return
}

try{
await sendPasswordResetEmail(auth,email)
alert("Password reset email sent")
}catch(err){
alert(err.message)
}

}

/* SHOW/HIDE PASSWORD */
window.togglePass = function(){

const pass = document.getElementById("password")

pass.type = pass.type === "password" ? "text" : "password"

}

</script>

</body>
</html>
