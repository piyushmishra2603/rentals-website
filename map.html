<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Map Property Search</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
}

header{
background:#0f4c81;
color:white;
padding:12px;
text-align:center;
}

#map{
height:90vh;
width:100%;
}

.controls{
position:absolute;
top:70px;
left:10px;
z-index:1000;
background:white;
padding:10px;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

button{
padding:8px 12px;
margin:4px;
border:none;
border-radius:6px;
background:#1e90ff;
color:white;
cursor:pointer;
}

button:hover{
background:#0c6cd4;
}

</style>

</head>

<body>

<header>
<h2>Find Homes Near You</h2>
</header>

<div class="controls">

<button onclick="findNearby()">Find Homes Near Me</button>

<button onclick="resetMap()">Reset Map</button>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const csvURL =
"https://docs.google.com/spreadsheets/d/1BiyshMuZ8ex2zDtpIttlGgxnRrvBqV9oBq7-jyz0S0M/gviz/tq?tqx=out:csv"

let map = L.map("map").setView([20.5937,78.9629],5)

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{
attribution:"Map data © OpenStreetMap contributors"
}
).addTo(map)

let markers=[]

fetch(csvURL)
.then(res=>res.text())
.then(data=>{

let rows=data.split("\n").slice(1)

rows.forEach((row,i)=>{

let cols=row.split(",")

let title=cols[0]
let city=cols[1]
let bhk=cols[2]
let price=cols[3]
let img=cols[4]
let lat=cols[7]
let lng=cols[8]

if(lat && lng){

let marker=L.marker([lat,lng]).addTo(map)

marker.bindPopup(
`
<b>${title}</b><br>
${city} • ${bhk} BHK<br>
Price: ₹${price}<br>
<img src="${img}" width="200"><br>
<a href="property.html?id=${i}">
View Details
</a>
`
)

markers.push(marker)

}

})

})

function findNearby(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(pos=>{

let lat=pos.coords.latitude
let lng=pos.coords.longitude

map.setView([lat,lng],13)

let userMarker=L.marker([lat,lng])
.addTo(map)
.bindPopup("You are here")
.openPopup()

})

}else{

alert("Geolocation not supported")

}

}

function resetMap(){

map.setView([20.5937,78.9629],5)

}

</script>

</body>
</html>
