<!DOCTYPE html>
<html>

<head>

<title>Property Map</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
}

header{
background:#0f4c81;
color:white;
padding:15px;
text-align:center;
}

#map{
height:90vh;
}

.popup-card img{
width:100%;
height:120px;
object-fit:cover;
border-radius:5px;
}

.popup-card h4{
margin:5px 0;
}

.btn{
display:inline-block;
background:#0f4c81;
color:white;
padding:6px 10px;
border-radius:5px;
text-decoration:none;
font-size:13px;
margin-top:5px;
}

</style>

</head>

<body>

<header>

<h2>Property Map</h2>

</header>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const sheetURL =
"https://docs.google.com/spreadsheets/d/1BiyshMuZ8ex2zDtpIttlGgxnRrvBqV9oBq7-jyz0S0M/gviz/tq?tqx=out:csv"


/* INITIAL MAP */

var map = L.map('map').setView([20.5937,78.9629],5)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:18
}).addTo(map)



/* LOAD PROPERTIES */

fetch(sheetURL)

.then(res=>res.text())

.then(data=>{

let rows=data.split("\n").slice(1)

rows.forEach((row,index)=>{

let cols=row.split(",")

let title=cols[0]
let city=cols[1]
let price=cols[3]
let image=cols[4]

let imageUrl=image.split("|")[0]

/* CONVERT CITY TO LOCATION */

fetch("https://nominatim.openstreetmap.org/search?format=json&q="+city)

.then(res=>res.json())

.then(loc=>{

if(loc.length>0){

let lat=loc[0].lat
let lon=loc[0].lon

let popupHTML=`

<div class="popup-card">

<img src="${imageUrl}">

<h4>${title}</h4>

<p>₹${price}/month</p>

<a class="btn" href="property.html?id=${index}">
View
</a>

</div>

`

L.marker([lat,lon])

.addTo(map)

.bindPopup(popupHTML)

}

})

})

})

</script>

</body>

</html>
