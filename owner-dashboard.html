<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Owner Dashboard — SmartProperty</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --bg-deep: #040810;
    --bg-mid: #080f1e;
    --bg-card: rgba(10, 20, 40, 0.7);
    --border: rgba(56, 130, 255, 0.15);
    --border-hover: rgba(56, 130, 255, 0.4);
    --accent: #3882ff;
    --accent-glow: rgba(56, 130, 255, 0.3);
    --cyan: #00d4ff;
    --green: #00e5a0;
    --yellow: #ffc940;
    --red: #ff4d6d;
    --text-primary: #e8f0ff;
    --text-secondary: rgba(180, 200, 240, 0.6);
    --font-display: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg-deep);
    color: var(--text-primary);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Ambient background blobs */
  body::before {
    content: '';
    position: fixed;
    top: -200px; left: -200px;
    width: 700px; height: 700px;
    background: radial-gradient(circle, rgba(56,130,255,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -200px; right: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(0,212,255,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* HEADER */
  header {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 32px;
    height: 64px;
    background: rgba(4, 8, 16, 0.85);
    backdrop-filter: blur(24px);
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.5px;
    display: flex; align-items: center; gap: 10px;
    color: var(--text-primary);
  }

  .logo-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--cyan));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }

  .header-right {
    display: flex; align-items: center; gap: 12px;
  }

  .search-wrap {
    position: relative;
    display: flex; align-items: center;
  }
  .search-wrap svg {
    position: absolute; left: 10px;
    color: var(--text-secondary);
    pointer-events: none;
  }
  .search-wrap input {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text-primary);
    font-family: var(--font-body);
    font-size: 13px;
    padding: 7px 14px 7px 34px;
    outline: none;
    width: 220px;
    transition: 0.2s;
  }
  .search-wrap input::placeholder { color: var(--text-secondary); }
  .search-wrap input:focus {
    border-color: var(--border-hover);
    background: rgba(56,130,255,0.07);
    width: 260px;
  }

  select.ctrl {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text-primary);
    font-family: var(--font-body);
    font-size: 13px;
    padding: 7px 12px;
    outline: none;
    cursor: pointer;
    transition: 0.2s;
  }
  select.ctrl:focus { border-color: var(--border-hover); }
  select.ctrl option { background: #0d1b2e; }

  .btn-home {
    background: rgba(56,130,255,0.12);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--accent);
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    padding: 7px 16px;
    cursor: pointer;
    text-decoration: none;
    transition: 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .btn-home:hover {
    background: rgba(56,130,255,0.22);
    border-color: var(--border-hover);
  }

  /* SECTION TITLE */
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 28px 32px 16px;
  }
  .section-title {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-secondary);
  }

  /* STATS GRID */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    padding: 0 32px 24px;
  }

  @media(max-width:900px){ .stats-grid { grid-template-columns: repeat(2,1fr); } }
  @media(max-width:540px){ .stats-grid { grid-template-columns: 1fr; } }

  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.25s, transform 0.25s;
    backdrop-filter: blur(12px);
  }
  .stat-card::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.03), transparent);
    pointer-events: none;
  }
  .stat-card:hover {
    border-color: var(--border-hover);
    transform: translateY(-3px);
  }

  .stat-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 6px;
  }

  .stat-value {
    font-family: var(--font-display);
    font-size: 32px;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -1px;
  }

  .stat-sub {
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 8px;
  }

  .stat-icon {
    position: absolute;
    right: 18px; top: 18px;
    width: 38px; height: 38px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  /* COLOUR VARIANTS */
  .accent-blue .stat-value { color: var(--accent); }
  .accent-blue .stat-icon { background: rgba(56,130,255,0.12); }
  .accent-green .stat-value { color: var(--green); }
  .accent-green .stat-icon { background: rgba(0,229,160,0.12); }
  .accent-yellow .stat-value { color: var(--yellow); }
  .accent-yellow .stat-icon { background: rgba(255,201,64,0.12); }
  .accent-cyan .stat-value { color: var(--cyan); }
  .accent-cyan .stat-icon { background: rgba(0,212,255,0.12); }

  /* FILTER TABS */
  .filter-tabs {
    display: flex; gap: 8px;
    padding: 0 32px 20px;
    flex-wrap: wrap;
  }
  .tab-btn {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-secondary);
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 500;
    padding: 6px 14px;
    cursor: pointer;
    transition: 0.2s;
  }
  .tab-btn:hover { color: var(--text-primary); border-color: var(--border-hover); }
  .tab-btn.active {
    background: rgba(56,130,255,0.15);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* BOOKING GRID */
  .booking-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    padding: 0 32px 48px;
  }
  @media(max-width:1000px){ .booking-grid { grid-template-columns: repeat(2,1fr); } }
  @media(max-width:640px){ .booking-grid { grid-template-columns: 1fr; } }

  /* BOOKING CARD */
  .booking-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 22px;
    position: relative;
    overflow: hidden;
    backdrop-filter: blur(12px);
    transition: border-color 0.25s, transform 0.25s, box-shadow 0.25s;
    animation: fadeUp 0.4s ease both;
  }
  .booking-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 18px 18px 0 0;
  }
  .booking-card.pending::before { background: linear-gradient(90deg, var(--yellow), transparent); }
  .booking-card.confirmed::before { background: linear-gradient(90deg, var(--green), transparent); }
  .booking-card.cancelled::before { background: linear-gradient(90deg, var(--red), transparent); }

  .booking-card:hover {
    border-color: var(--border-hover);
    transform: translateY(-4px);
    box-shadow: 0 16px 48px rgba(0,0,0,0.4);
  }

  .card-top {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 14px;
  }

  .property-name {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1.3;
    max-width: 180px;
  }

  .status-badge {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .status-badge.pending { background: rgba(255,201,64,0.15); color: var(--yellow); border: 1px solid rgba(255,201,64,0.3); }
  .status-badge.confirmed { background: rgba(0,229,160,0.12); color: var(--green); border: 1px solid rgba(0,229,160,0.3); }
  .status-badge.cancelled { background: rgba(255,77,109,0.12); color: var(--red); border: 1px solid rgba(255,77,109,0.3); }

  .card-detail {
    display: flex; align-items: center; gap: 7px;
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }
  .card-detail svg { flex-shrink: 0; }

  .card-divider {
    height: 1px;
    background: var(--border);
    margin: 14px 0;
  }

  .card-amount {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 800;
    color: var(--text-primary);
    letter-spacing: -0.5px;
  }

  .card-actions {
    display: flex; gap: 8px; margin-top: 14px;
  }

  .btn-accept, .btn-reject {
    flex: 1;
    border: none;
    border-radius: 10px;
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 600;
    padding: 9px 0;
    cursor: pointer;
    transition: 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 5px;
  }
  .btn-accept {
    background: rgba(0,229,160,0.15);
    color: var(--green);
    border: 1px solid rgba(0,229,160,0.25);
  }
  .btn-accept:hover { background: rgba(0,229,160,0.28); }
  .btn-reject {
    background: rgba(255,77,109,0.12);
    color: var(--red);
    border: 1px solid rgba(255,77,109,0.22);
  }
  .btn-reject:hover { background: rgba(255,77,109,0.24); }

  /* EMPTY STATE */
  .empty-state {
    grid-column: 1/-1;
    display: flex; flex-direction: column; align-items: center;
    padding: 80px 20px;
    color: var(--text-secondary);
    gap: 12px;
    text-align: center;
  }
  .empty-icon {
    font-size: 48px;
    opacity: 0.3;
    margin-bottom: 8px;
  }

  /* CHART SECTION */
  .chart-section {
    padding: 0 32px 32px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  @media(max-width:800px){ .chart-section { grid-template-columns: 1fr; } }

  .chart-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 22px;
    backdrop-filter: blur(12px);
  }
  .chart-title {
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 18px;
    color: var(--text-primary);
  }

  /* Mini bar chart */
  .bar-chart { display: flex; align-items: flex-end; gap: 8px; height: 80px; }
  .bar-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
  .bar {
    width: 100%;
    border-radius: 4px 4px 0 0;
    transition: height 0.8s cubic-bezier(0.22,1,0.36,1);
  }
  .bar-label { font-size: 9px; color: var(--text-secondary); }

  /* Donut */
  .donut-wrap { display: flex; align-items: center; gap: 20px; }
  .donut-legend { display: flex; flex-direction: column; gap: 8px; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-secondary); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 28px; right: 28px;
    padding: 14px 22px;
    border-radius: 12px;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    z-index: 9999;
    display: flex; align-items: center; gap: 10px;
    backdrop-filter: blur(16px);
    transition: opacity 0.3s, transform 0.3s;
    opacity: 0;
    transform: translateY(12px);
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.success { background: rgba(0,229,160,0.15); border: 1px solid rgba(0,229,160,0.35); color: var(--green); }
  .toast.error { background: rgba(255,77,109,0.15); border: 1px solid rgba(255,77,109,0.35); color: var(--red); }

  /* LOADING SKELETON */
  .skeleton {
    border-radius: 18px;
    background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.6s infinite;
    height: 180px;
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* QUICK ACTIONS */
  .quick-actions {
    display: flex; gap: 10px;
    padding: 0 32px 24px;
    flex-wrap: wrap;
  }
  .quick-btn {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text-secondary);
    font-family: var(--font-body);
    font-size: 12px;
    padding: 8px 16px;
    cursor: pointer;
    transition: 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .quick-btn:hover {
    background: rgba(56,130,255,0.1);
    border-color: var(--border-hover);
    color: var(--text-primary);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(56,130,255,0.25); border-radius: 3px; }

  .pulse-dot {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 2s infinite;
    margin-right: 4px;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-icon">🏠</div>
    SmartProperty
    <span style="font-size:11px;color:var(--text-secondary);font-weight:400;margin-left:4px">/ Owner</span>
  </div>
  <div class="header-right">
    <div class="search-wrap">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
      </svg>
      <input id="search" placeholder="Search properties…" />
    </div>
    <select id="sort" class="ctrl">
      <option value="latest">Latest first</option>
      <option value="earnings">Highest earning</option>
      <option value="checkin">Check-in date</option>
    </select>
    <a href="index.html" class="btn-home">
      <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l9-9 9 9M5 10v9a1 1 0 001 1h4v-5h4v5h4a1 1 0 001-1v-9"/>
      </svg>
      Home
    </a>
  </div>
</header>

<!-- STATS -->
<div class="section-header">
  <span class="section-title">Overview</span>
  <span style="font-size:11px;color:var(--text-secondary)"><span class="pulse-dot"></span>Live data</span>
</div>

<div class="stats-grid">
  <div class="stat-card accent-blue">
    <div class="stat-icon">📋</div>
    <div class="stat-label">Total Bookings</div>
    <div class="stat-value" id="totalBookings">—</div>
    <div class="stat-sub">All time requests</div>
  </div>
  <div class="stat-card accent-green">
    <div class="stat-icon">💰</div>
    <div class="stat-label">Total Earnings</div>
    <div class="stat-value" id="totalEarnings">—</div>
    <div class="stat-sub">From confirmed bookings</div>
  </div>
  <div class="stat-card accent-yellow">
    <div class="stat-icon">⏳</div>
    <div class="stat-label">Pending</div>
    <div class="stat-value" id="pendingBookings">—</div>
    <div class="stat-sub">Awaiting your action</div>
  </div>
  <div class="stat-card accent-cyan">
    <div class="stat-icon">✅</div>
    <div class="stat-label">Confirmed</div>
    <div class="stat-value" id="confirmedBookings">—</div>
    <div class="stat-sub">Active bookings</div>
  </div>
</div>

<!-- CHARTS -->
<div class="chart-section">
  <div class="chart-card">
    <div class="chart-title">Bookings by Status</div>
    <div class="donut-wrap">
      <canvas id="donutCanvas" width="100" height="100"></canvas>
      <div class="donut-legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div><span>Confirmed — <span id="lg-confirmed">0</span></span></div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--yellow)"></div><span>Pending — <span id="lg-pending">0</span></span></div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div><span>Cancelled — <span id="lg-cancelled">0</span></span></div>
      </div>
    </div>
  </div>
  <div class="chart-card">
    <div class="chart-title">Earnings (Last 6 months)</div>
    <div class="bar-chart" id="earningsBar"></div>
  </div>
</div>

<!-- FILTER TABS -->
<div class="filter-tabs" id="filterTabs">
  <button class="tab-btn active" data-filter="all">All</button>
  <button class="tab-btn" data-filter="pending">⏳ Pending</button>
  <button class="tab-btn" data-filter="confirmed">✅ Confirmed</button>
  <button class="tab-btn" data-filter="cancelled">❌ Cancelled</button>
</div>

<!-- QUICK ACTIONS -->
<div class="quick-actions">
  <button class="quick-btn" onclick="exportCSV()">
    <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
    Export CSV
  </button>
  <button class="quick-btn" onclick="acceptAll()">
    <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
    Accept All Pending
  </button>
  <button class="quick-btn" onclick="toggleDarkStats()">
    <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7"/></svg>
    Summary View
  </button>
</div>

<!-- SECTION HEADER FOR BOOKINGS -->
<div class="section-header">
  <span class="section-title" id="bookingCountLabel">Bookings</span>
</div>

<!-- BOOKING LIST -->
<div class="booking-grid" id="bookingList">
  <!-- Skeleton loaders -->
  <div class="skeleton"></div>
  <div class="skeleton"></div>
  <div class="skeleton"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, where, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCExyC1UlqWl-tTJWVtoQx6E-rppaYQgcU",
  authDomain: "smart-property-portal.firebaseapp.com",
  projectId: "smart-property-portal"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore();
const auth = getAuth();

let currentUser = null;
let bookings = [];
let ownerProperties = [];
let propertiesMap = {};
let currentFilter = 'all';

/* AUTH */
onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = "login.html"; return; }
  currentUser = user;
  await loadOwnerProperties();
  listenBookings();
});

/* LOAD PROPERTIES */
async function loadOwnerProperties() {
  return new Promise(resolve => {
    onSnapshot(
      query(collection(db, "properties"), where("ownerId", "==", currentUser.uid)),
      (snap) => {
        ownerProperties = [];
        propertiesMap = {};
        snap.forEach(docSnap => {
          ownerProperties.push(docSnap.id);
          propertiesMap[docSnap.id] = docSnap.data().title;
        });
        resolve();
      }
    );
  });
}

/* REALTIME BOOKINGS */
function listenBookings() {
  onSnapshot(collection(db, "bookings"), (snap) => {
    bookings = [];
    snap.forEach(docSnap => {
      const data = docSnap.data();
      if (ownerProperties.includes(data.propertyId)) {
        bookings.push({ id: docSnap.id, ...data });
      }
    });
    render();
    updateCharts();
  });
}

/* RENDER */
function render() {
  updateStats();
  let filtered = [...bookings];

  const search = document.getElementById("search").value.toLowerCase();
  if (search) {
    filtered = filtered.filter(b =>
      (propertiesMap[b.propertyId] || "").toLowerCase().includes(search) ||
      (b.userId || "").toLowerCase().includes(search)
    );
  }

  if (currentFilter !== 'all') {
    filtered = filtered.filter(b => b.status === currentFilter);
  }

  const sort = document.getElementById("sort").value;
  if (sort === "earnings") filtered.sort((a, b) => b.total - a.total);
  else if (sort === "checkin") filtered.sort((a, b) => (a.checkin || "").localeCompare(b.checkin || ""));
  else filtered.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));

  document.getElementById("bookingCountLabel").textContent =
    `Bookings (${filtered.length})`;

  const container = document.getElementById("bookingList");
  container.innerHTML = "";

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🔍</div>
        <div style="font-family:var(--font-display);font-size:16px;font-weight:700;color:var(--text-primary)">No bookings found</div>
        <div style="font-size:13px">Try changing your filters or search query</div>
      </div>`;
    return;
  }

  filtered.forEach((b, i) => {
    const card = document.createElement("div");
    card.className = `booking-card ${b.status || 'pending'}`;
    card.style.animationDelay = `${i * 60}ms`;

    const nights = calcNights(b.checkin, b.checkout);

    card.innerHTML = `
      <div class="card-top">
        <div class="property-name">${propertiesMap[b.propertyId] || "Unknown Property"}</div>
        <span class="status-badge ${b.status || 'pending'}">${b.status || 'pending'}</span>
      </div>
      <div class="card-detail">
        <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        ${b.userName || b.userId || 'Guest'}
      </div>
      <div class="card-detail">
        <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        ${b.checkin || '—'} → ${b.checkout || '—'}
        ${nights ? `<span style="color:var(--accent);margin-left:4px">${nights}n</span>` : ''}
      </div>
      <div class="card-divider"></div>
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <div>
          <div class="card-amount">₹${Number(b.total || 0).toLocaleString('en-IN')}</div>
          ${nights ? `<div style="font-size:11px;color:var(--text-secondary);margin-top:2px">₹${Math.round(b.total/nights).toLocaleString('en-IN')}/night</div>` : ''}
        </div>
        ${b.createdAt ? `<div style="font-size:10px;color:var(--text-secondary);text-align:right">${formatDate(b.createdAt)}</div>` : ''}
      </div>
      ${b.status === "pending" ? `
        <div class="card-actions">
          <button class="btn-accept" onclick="window.updateBooking('${b.id}','confirmed')">
            <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
            Accept
          </button>
          <button class="btn-reject" onclick="window.updateBooking('${b.id}','cancelled')">
            <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            Reject
          </button>
        </div>
      ` : ''}
    `;
    container.appendChild(card);
  });
}

/* STATS */
function updateStats() {
  const confirmed = bookings.filter(b => b.status === "confirmed");
  const pending = bookings.filter(b => b.status === "pending");
  const earnings = confirmed.reduce((s, b) => s + Number(b.total || 0), 0);

  animateNumber("totalBookings", bookings.length);
  animateNumber("totalEarnings", earnings, "₹", true);
  animateNumber("pendingBookings", pending.length);
  animateNumber("confirmedBookings", confirmed.length);
}

function animateNumber(id, target, prefix = "", rupee = false) {
  const el = document.getElementById(id);
  const start = 0;
  const duration = 600;
  const startTime = performance.now();
  function step(now) {
    const t = Math.min((now - startTime) / duration, 1);
    const val = Math.floor(t * target);
    el.textContent = rupee ? `${prefix}${val.toLocaleString('en-IN')}` : `${prefix}${val}`;
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

/* CHARTS */
function updateCharts() {
  const confirmed = bookings.filter(b => b.status === "confirmed").length;
  const pending = bookings.filter(b => b.status === "pending").length;
  const cancelled = bookings.filter(b => b.status === "cancelled").length;
  const total = confirmed + pending + cancelled;

  document.getElementById("lg-confirmed").textContent = confirmed;
  document.getElementById("lg-pending").textContent = pending;
  document.getElementById("lg-cancelled").textContent = cancelled;

  // Donut
  const canvas = document.getElementById("donutCanvas");
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0, 0, 100, 100);
  const cx = 50, cy = 50, r = 38, lw = 12;
  const segments = [
    { value: confirmed, color: "#00e5a0" },
    { value: pending, color: "#ffc940" },
    { value: cancelled, color: "#ff4d6d" },
  ].filter(s => s.value > 0);

  if (total === 0) {
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = "rgba(255,255,255,0.08)";
    ctx.lineWidth = lw;
    ctx.stroke();
  } else {
    let angle = -Math.PI / 2;
    segments.forEach(seg => {
      const sweep = (seg.value / total) * Math.PI * 2;
      ctx.beginPath();
      ctx.arc(cx, cy, r, angle, angle + sweep - 0.04);
      ctx.strokeStyle = seg.color;
      ctx.lineWidth = lw;
      ctx.lineCap = "round";
      ctx.stroke();
      angle += sweep;
    });
  }

  // Bar chart (mock monthly data)
  const barContainer = document.getElementById("earningsBar");
  const months = ["Nov", "Dec", "Jan", "Feb", "Mar", "Apr"];
  const mock = [0, 0, 0, 0, 0, confirmed * (Number(bookings[0]?.total || 12000))];
  const maxVal = Math.max(...mock, 1);
  barContainer.innerHTML = months.map((m, i) => {
    const pct = Math.round((mock[i] / maxVal) * 100);
    const isLast = i === months.length - 1;
    return `<div class="bar-wrap">
      <div class="bar" style="height:${Math.max(pct, 4)}%;background:${isLast ? 'linear-gradient(180deg,var(--accent),var(--cyan))' : 'rgba(255,255,255,0.1)'}"></div>
      <div class="bar-label">${m}</div>
    </div>`;
  }).join("");
}

/* HELPERS */
function calcNights(checkin, checkout) {
  if (!checkin || !checkout) return 0;
  const d1 = new Date(checkin), d2 = new Date(checkout);
  return Math.max(0, Math.round((d2 - d1) / 86400000));
}

function formatDate(ts) {
  if (!ts) return "";
  const d = ts.toDate ? ts.toDate() : new Date(ts.seconds * 1000);
  return d.toLocaleDateString("en-IN", { day:"2-digit", month:"short", year:"2-digit" });
}

/* UPDATE BOOKING */
window.updateBooking = async function (id, status) {
  try {
    await updateDoc(doc(db, "bookings", id), { status });
    showToast(status === "confirmed" ? "✅ Booking confirmed!" : "❌ Booking rejected", status === "confirmed" ? "success" : "error");
  } catch (e) {
    showToast("Error updating booking", "error");
  }
};

/* ACCEPT ALL */
window.acceptAll = async function () {
  const pending = bookings.filter(b => b.status === "pending");
  if (!pending.length) { showToast("No pending bookings", "error"); return; }
  for (const b of pending) {
    await updateDoc(doc(db, "bookings", b.id), { status: "confirmed" });
  }
  showToast(`✅ ${pending.length} bookings confirmed!`, "success");
};

/* EXPORT CSV */
window.exportCSV = function () {
  if (!bookings.length) { showToast("No data to export", "error"); return; }
  const rows = [["Property","User","Check-in","Check-out","Total","Status"]];
  bookings.forEach(b => rows.push([
    propertiesMap[b.propertyId] || b.propertyId,
    b.userId, b.checkin, b.checkout, b.total, b.status
  ]));
  const csv = rows.map(r => r.join(",")).join("\n");
  const a = document.createElement("a");
  a.href = "data:text/csv;charset=utf-8," + encodeURIComponent(csv);
  a.download = `bookings-${Date.now()}.csv`;
  a.click();
  showToast("📥 CSV exported!", "success");
};

/* TOGGLE SUMMARY */
window.toggleDarkStats = function () {
  const grid = document.querySelector('.booking-grid');
  const isHidden = grid.style.display === 'none';
  grid.style.display = isHidden ? '' : 'none';
};

/* TOAST */
function showToast(msg, type = "success") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = `toast ${type}`;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2800);
}

/* FILTER TABS */
document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentFilter = btn.dataset.filter;
    render();
  });
});

document.getElementById("search").addEventListener("input", render);
document.getElementById("sort").addEventListener("change", render);
</script>
