<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PGs & Hostels | SmartRent</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
    color: white;
}

header {
    padding: 20px;
    text-align: center;
    font-size: 28px;
    font-weight: bold;
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: rgba(255,255,255,0.1);
    padding: 15px;
    border-radius: 15px;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
    background: rgba(255,255,255,0.2);
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.card h3 {
    margin: 10px 0 5px;
}

.btn {
    display: inline-block;
    margin-top: 10px;
    padding: 8px 12px;
    background: #00c6ff;
    color: black;
    border-radius: 8px;
    text-decoration: none;
}
</style>
</head>

<body>

<header>PGs & Hostels</header>

<div class="container">

    <div class="card">
        <img src="https://via.placeholder.com/300" alt="">
        <h3>Boys PG</h3>
        <p>₹5000/month • WiFi • Food Included</p>
        <a href="#" class="btn">View Details</a>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/300" alt="">
        <h3>Girls Hostel</h3>
        <p>₹6000/month • Security • AC Rooms</p>
        <a href="#" class="btn">View Details</a>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/300" alt="">
        <h3>Co-Living Space</h3>
        <p>₹7000/month • Gym • Modern Rooms</p>
        <a href="#" class="btn">View Details</a>
    </div>

</div>

</body>
</html>
