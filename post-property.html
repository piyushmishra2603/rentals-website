<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Post Property | SmartRent</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
font-family:'Inter',sans-serif;
color:white;
}

.glass{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
border-radius:20px;
}

.drop-zone{
border:2px dashed rgba(255,255,255,0.4);
padding:30px;
text-align:center;
cursor:pointer;
transition:0.3s;
}

.drop-zone:hover{
background:rgba(255,255,255,0.1);
}
</style>

</head>

<body class="p-6">

<!-- 🔥 NAVBAR -->
<header class="flex justify-between items-center mb-6">
  <h1 class="text-2xl font-bold">🏠 SmartRent</h1>

  <div class="flex gap-4">
    <a href="index.html">Home</a>
    <a href="dashboard.html">Dashboard</a>
  </div>
</header>

<!-- 🔥 FORM -->
<div class="max-w-3xl mx-auto glass p-8 shadow-2xl">

<h2 class="text-2xl font-bold mb-6">Post New Property 🚀</h2>

<form id="propertyForm" class="space-y-4">

<input id="title" placeholder="Property Title" class="w-full p-3 rounded text-black">

<input id="price" type="number" placeholder="Price" class="w-full p-3 rounded text-black">

<input id="city" placeholder="City" class="w-full p-3 rounded text-black">

<select id="bhk" class="w-full p-3 rounded text-black">
<option>1 BHK</option>
<option>2 BHK</option>
<option>3 BHK</option>
<option>4 BHK</option>
<option>Villa</option>
</select>

<input id="area" placeholder="Area (sq.ft)" class="w-full p-3 rounded text-black">

<textarea id="description" placeholder="Description" class="w-full p-3 rounded text-black"></textarea>

<!-- 📸 DROP ZONE -->
<div id="dropZone" class="drop-zone rounded">
  Drag & Drop Images or Click to Upload
  <input type="file" id="imageInput" multiple hidden>
</div>

<!-- PREVIEW -->
<div id="previewContainer" class="grid grid-cols-3 gap-2 mt-4"></div>

<button id="submitBtn"
class="w-full bg-gradient-to-r from-blue-500 to-cyan-500 py-3 rounded font-bold hover:scale-105 transition">
Post Property
</button>

<div id="loading" class="hidden text-center mt-3">Uploading...</div>

</form>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { getFirestore, addDoc, collection }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* 🔥 CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCExyC1UlqWl-tTJWVtoQx6E-rppaYQgcU",
  authDomain: "smart-property-portal.firebaseapp.com",
  projectId: "smart-property-portal"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

let currentUser = null;

onAuthStateChanged(auth, (user)=>{
  if(!user){
    window.location.href = "login.html";
  }
  currentUser = user;
});

/* 📸 DRAG DROP */
const dropZone = document.getElementById("dropZone");
const input = document.getElementById("imageInput");
const previewContainer = document.getElementById("previewContainer");

dropZone.onclick = ()=> input.click();

input.addEventListener("change", handleFiles);

dropZone.addEventListener("dragover",(e)=>{
  e.preventDefault();
});

dropZone.addEventListener("drop",(e)=>{
  e.preventDefault();
  input.files = e.dataTransfer.files;
  handleFiles();
});

function handleFiles(){
  previewContainer.innerHTML = "";

  [...input.files].forEach(file=>{
    const img = document.createElement("img");
    img.src = URL.createObjectURL(file);
    img.className = "h-24 w-full object-cover rounded";
    previewContainer.appendChild(img);
  });
}

/* 🚀 SUBMIT */
document.getElementById("propertyForm").addEventListener("submit", async(e)=>{
  e.preventDefault();

  const title = titleEl.value;
  const price = priceEl.value;
  const city = cityEl.value;
  const bhk = bhkEl.value;
  const area = areaEl.value;
  const description = descEl.value;

  const files = input.files;

  if(files.length === 0){
    alert("Upload at least 1 image");
    return;
  }

  const loading = document.getElementById("loading");
  const btn = document.getElementById("submitBtn");

  loading.classList.remove("hidden");
  btn.disabled = true;

  try{

    let imageUrls = [];

    for(let file of files){

      const formData = new FormData();
      formData.append("file", file);
      formData.append("upload_preset","dl6dnzau");

      const res = await fetch(
        "https://api.cloudinary.com/v1_1/dq3hko9hn/image/upload",
        { method:"POST", body:formData }
      );

      const data = await res.json();
      imageUrls.push(data.secure_url);
    }

    await addDoc(collection(db,"properties"),{
      title,
      price,
      city,
      bhk,
      area,
      description,
      images: imageUrls,
      ownerId: currentUser.uid,
      createdAt: Date.now()
    });

    alert("🎉 Property Posted");

    window.location.href="dashboard.html";

  }catch(err){
    alert(err.message);
  }

  loading.classList.add("hidden");
  btn.disabled = false;

});

</script>

</body>
</html>
