<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Post Property</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
}

.container{
display:flex;
justify-content:center;
padding:60px;
}

.form{
background:white;
padding:40px;
width:420px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input,textarea{
width:100%;
padding:10px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:6px;
}

button{
width:100%;
padding:12px;
background:#1976d2;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<div class="form">

<h2>Post Property</h2>

<input id="title" placeholder="Title">

<input id="price" placeholder="Price">

<input id="city" placeholder="City">

<input id="bhk" placeholder="BHK">

<input id="image" placeholder="Image URL">

<textarea id="description" placeholder="Description"></textarea>

<button onclick="postProperty()">Post Property</button>

<p id="msg"></p>

</div>

</div>


<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"

import {
getFirestore,
collection,
addDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"


const firebaseConfig={
apiKey:"AIzaSyCExyC1UlqWl-tTJWVtoQx6E-rppaYQgcU",
authDomain:"smart-property-portal.firebaseapp.com",
projectId:"smart-property-portal",
storageBucket:"smart-property-portal.firebasestorage.app",
messagingSenderId:"407241446660",
appId:"1:407241446660:web:1259fa8c93bce5fd8aec51"
}

const app=initializeApp(firebaseConfig)
const db=getFirestore(app)
const auth=getAuth(app)

let userEmail=""

/* LOGIN PROTECTION */

onAuthStateChanged(auth,(user)=>{

if(!user){

window.location.href="login.html"
return

}

userEmail=user.email

})


window.postProperty=async function(){

const title=document.getElementById("title").value
const price=document.getElementById("price").value
const city=document.getElementById("city").value
const bhk=document.getElementById("bhk").value
const image=document.getElementById("image").value
const description=document.getElementById("description").value

await addDoc(collection(db,"properties"),{

title:title,
price:price,
city:city,
bhk:bhk,
image:image,
description:description,
owner:userEmail

})

document.getElementById("msg").innerText="Property Posted Successfully"

}

</script>

</body>
</html>
