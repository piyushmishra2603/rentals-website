<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Post Property - SmartRent AI</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
font-family:'Inter',sans-serif;
background:linear-gradient(to right,#0f2027,#203a43,#2c5364);
color:white;
}

.glass{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
border-radius:20px;
}
</style>

</head>

<body class="p-6">

<!-- 🔥 NAVBAR -->
<header class="flex justify-between items-center mb-6">
  <h1 class="text-2xl font-bold">🏠 SmartRent</h1>

  <div class="flex gap-4">
    <a href="index.html" class="hover:text-cyan-400">Home</a>
    <a href="dashboard.html" class="hover:text-cyan-400">Dashboard</a>
  </div>
</header>

<!-- 🔥 FORM -->
<div class="max-w-2xl mx-auto glass p-8 shadow-2xl">

<h2 class="text-2xl mb-6 font-bold">Post New Property 🚀</h2>

<form id="propertyForm" class="space-y-4">

<input id="title" placeholder="Property Title"
class="w-full p-3 rounded text-black">

<input id="price" type="number" placeholder="Rent Price"
class="w-full p-3 rounded text-black">

<input id="city" placeholder="City"
class="w-full p-3 rounded text-black">

<select id="bhk" class="w-full p-3 rounded text-black">
<option>1 BHK</option>
<option>2 BHK</option>
<option>3 BHK</option>
<option>4 BHK</option>
<option>Villa</option>
</select>

<input id="area" placeholder="Area (sq.ft)"
class="w-full p-3 rounded text-black">

<textarea id="description" placeholder="Description"
class="w-full p-3 rounded text-black"></textarea>

<!-- IMAGE -->
<input type="file" id="imageInput" accept="image/*"
class="w-full text-sm">

<img id="preview"
class="w-full h-48 object-cover rounded mt-2 hidden">

<button id="submitBtn"
class="w-full bg-gradient-to-r from-blue-500 to-cyan-500 py-3 rounded font-bold hover:scale-105 transition">
Post Property
</button>

<div id="loading" class="hidden text-center mt-3">
Uploading property...
</div>

</form>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  addDoc,
  collection
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* 🔥 CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCExyC1UlqWl-tTJWVtoQx6E-rppaYQgcU",
  authDomain: "smart-property-portal.firebaseapp.com",
  projectId: "smart-property-portal"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

let currentUser = null;

/* 🔐 AUTH */
onAuthStateChanged(auth, (user) => {

  if(!user){
    window.location.href = "login.html";
    return;
  }

  currentUser = user;
});

/* 🖼 IMAGE PREVIEW */
const imageInput = document.getElementById("imageInput");
const preview = document.getElementById("preview");

imageInput.addEventListener("change", ()=>{
  const file = imageInput.files[0];
  if(file){
    preview.src = URL.createObjectURL(file);
    preview.classList.remove("hidden");
  }
});

/* 🚀 SUBMIT */
const form = document.getElementById("propertyForm");

form.addEventListener("submit", async (e)=>{
  e.preventDefault();

  if(!currentUser){
    alert("Login first");
    return;
  }

  const title = document.getElementById("title").value;
  const price = document.getElementById("price").value;
  const city = document.getElementById("city").value;
  const bhk = document.getElementById("bhk").value;
  const area = document.getElementById("area").value;
  const description = document.getElementById("description").value;

  const file = imageInput.files[0];

  if(!file){
    alert("Please upload image");
    return;
  }

  const loading = document.getElementById("loading");
  const btn = document.getElementById("submitBtn");

  loading.classList.remove("hidden");
  btn.disabled = true;
  btn.innerText = "Posting...";

  try{

    /* 🔥 UPLOAD TO CLOUDINARY */
    const formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", "dl6dnzau");

    const res = await fetch(
      "https://api.cloudinary.com/v1_1/dq3hko9hn/image/upload",
      {
        method: "POST",
        body: formData
      }
    );

    const data = await res.json();
    const imageUrl = data.secure_url;

    /* 🔥 SAVE TO FIRESTORE */
    await addDoc(collection(db,"properties"),{
      title,
      price,
      city,
      bhk,
      area,
      description,
      image: imageUrl,
      ownerId: currentUser.uid,
      createdAt: Date.now(),
      boosted: false
    });

    alert("🎉 Property posted successfully");

    window.location.href = "dashboard.html";

  }catch(err){
    alert("Error: " + err.message);
  }

  loading.classList.add("hidden");
  btn.disabled = false;
  btn.innerText = "Post Property";

});

</script>

</body>
</html>
