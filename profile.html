<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profile - SmartRent AI</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
font-family:'Inter',sans-serif;
background:linear-gradient(to right,#0f2027,#203a43,#2c5364);
color:white;
}

.glass{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
border-radius:20px;
}

.fade{
animation:fade 0.6s ease-in-out;
}

@keyframes fade{
from{opacity:0; transform:translateY(15px);}
to{opacity:1; transform:translateY(0);}
}
</style>

</head>

<body class="p-4 fade">

<div class="max-w-4xl mx-auto">

<!-- 🔥 HEADER -->
<div class="relative glass p-6 text-center shadow-2xl">

<!-- COVER -->
<div class="h-40 rounded-xl bg-gradient-to-r from-blue-500 to-cyan-500"></div>

<!-- PROFILE IMAGE -->
<img id="profileImg"
class="w-28 h-28 rounded-full border-4 border-white absolute left-1/2 -translate-x-1/2 top-24 object-cover">

<h2 id="name" class="text-2xl font-bold mt-16"></h2>
<p id="email" class="text-gray-300"></p>
<p id="bio" class="text-gray-400 mt-2"></p>
<p id="phone" class="text-gray-400"></p>

<div class="flex justify-center gap-3 mt-4">
<button onclick="toggleEdit()" 
class="bg-blue-500 px-4 py-2 rounded hover:scale-105 transition">
Edit Profile
</button>

<button onclick="logout()" 
class="bg-red-500 px-4 py-2 rounded hover:scale-105 transition">
Logout
</button>
</div>

</div>

<!-- 🔥 EDIT SECTION -->
<div id="editBox" class="hidden glass p-6 mt-6 shadow-xl">

<h3 class="text-xl mb-4">Edit Profile</h3>

<input id="newName" placeholder="Name"
class="w-full p-2 mb-3 rounded text-black">

<input id="newBio" placeholder="Bio"
class="w-full p-2 mb-3 rounded text-black">

<input id="newPhone" placeholder="Phone"
class="w-full p-2 mb-3 rounded text-black">

<input id="file" type="file" accept="image/*"
class="mb-3">

<img id="preview"
class="w-20 h-20 rounded-full hidden mb-3">

<button onclick="saveProfile()"
class="w-full bg-green-500 py-2 rounded hover:scale-105 transition">
Save Changes
</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
getAuth, 
onAuthStateChanged,
signOut 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { 
getFirestore, 
doc, 
getDoc, 
updateDoc 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCExyC1UlqWl-tTJWVtoQx6E-rppaYQgcU",
  authDomain: "smart-property-portal.firebaseapp.com",
  projectId: "smart-property-portal"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* LOAD USER */
onAuthStateChanged(auth, async (user)=>{

  if(!user){
    window.location.href = "login.html";
    return;
  }

  const ref = doc(db,"users",user.uid);
  const snap = await getDoc(ref);

  if(snap.exists()){
    const d = snap.data();

    document.getElementById("name").innerText = d.name || "User";
    document.getElementById("email").innerText = d.email;
    document.getElementById("bio").innerText = d.bio || "";
    document.getElementById("phone").innerText = d.phone || "";
    document.getElementById("profileImg").src = d.photo || "https://i.pravatar.cc/150";
  }

});

/* TOGGLE EDIT */
window.toggleEdit = ()=>{
  document.getElementById("editBox").classList.toggle("hidden");
}

/* IMAGE PREVIEW */
const fileInput = document.getElementById("file");
const preview = document.getElementById("preview");

fileInput.addEventListener("change", ()=>{
  const file = fileInput.files[0];
  if(file){
    preview.src = URL.createObjectURL(file);
    preview.classList.remove("hidden");
  }
});

/* SAVE PROFILE */
window.saveProfile = async ()=>{

  const user = auth.currentUser;

  const name = document.getElementById("newName").value;
  const bio = document.getElementById("newBio").value;
  const phone = document.getElementById("newPhone").value;

  let photo = document.getElementById("profileImg").src;

  if(preview.src){
    photo = preview.src;
  }

  try{
    await updateDoc(doc(db,"users",user.uid),{
      name,
      bio,
      phone,
      photo
    });

    alert("Profile updated 🎉");
    location.reload();

  }catch(e){
    alert("Error updating profile");
  }

}

/* LOGOUT */
window.logout = async ()=>{
  await signOut(auth);
  window.location.href = "login.html";
}

</script>

</body>
</html>
