<!DOCTYPE html>
<html>

<head>

<title>Property Details</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:20px;
}

img{
width:100%;
border-radius:8px;
}

.price{
color:green;
font-size:22px;
font-weight:bold;
}

.btn{
display:inline-block;
background:#0f4c81;
color:white;
padding:10px 15px;
text-decoration:none;
border-radius:6px;
margin-top:10px;
}

footer{
text-align:center;
padding:20px;
background:#eee;
margin-top:30px;
}

</style>

</head>

<body>

<div class="container">

<h2 id="title">Loading...</h2>

<img id="image">

<p id="city"></p>

<p class="price" id="price"></p>

<p id="description"></p>

<a id="contactBtn" class="btn">Contact Owner</a>

</div>

<footer>

<p>© 2026 Rental Property Finder</p>

</footer>


<script>

const sheetURL =
"https://docs.google.com/spreadsheets/d/1BiyshMuZ8ex2zDtpIttlGgxnRrvBqV9oBq7-jyz0S0M/gviz/tq?tqx=out:json"

const params = new URLSearchParams(window.location.search)
const id = params.get("id")

fetch(sheetURL)
.then(res => res.text())
.then(data => {

let json = JSON.parse(data.substring(47).slice(0,-2))

let rows = json.table.rows

if(!id || !rows[id]){

document.getElementById("title").innerText="Property not found"
return

}

let row = rows[id]

let title = row.c[0]?.v || ""
let city = row.c[1]?.v || ""
let price = row.c[2]?.v || ""
let image = row.c[3]?.v || ""
let description = row.c[4]?.v || ""
let email = row.c[5]?.v || ""

document.getElementById("title").innerText = title
document.getElementById("city").innerText = "Location: " + city
document.getElementById("price").innerText = "₹" + price + "/month"
document.getElementById("image").src = image
document.getElementById("description").innerText = description

document.getElementById("contactBtn").href =
"mailto:"+email

})

</script>

</body>

</html>
