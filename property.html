<!DOCTYPE html>
<html>

<head>

<title>Property Details</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:40px;
}

.card{
background:white;
padding:30px;
border-radius:10px;
max-width:700px;
margin:auto;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

img{
width:100%;
border-radius:8px;
}

.price{
color:#1976d2;
font-size:22px;
font-weight:bold;
margin-top:10px;
}

.contact-btn{
margin-top:20px;
padding:12px;
background:#1976d2;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<img id="img">

<h2 id="title"></h2>

<div id="city"></div>

<div id="bhk"></div>

<div id="desc"></div>

<div class="price" id="price"></div>

<button class="contact-btn" onclick="contactOwner()">Contact Owner</button>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getFirestore, doc, getDoc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {
apiKey: "AIzaSyCExyC1UlqWl-tTJWVtoQx6E-rppaYQgcU",
authDomain: "smart-property-portal.firebaseapp.com",
projectId: "smart-property-portal",
storageBucket: "smart-property-portal.firebasestorage.app",
messagingSenderId: "407241446660",
appId: "1:407241446660:web:1259fa8c93bce5fd8aec51"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app)


const params=new URLSearchParams(window.location.search)

const id=params.get("id")


async function load(){

const ref=doc(db,"properties",id)

const snap=await getDoc(ref)

const p=snap.data()

document.getElementById("img").src=p.image
document.getElementById("title").innerText=p.title
document.getElementById("city").innerText="City: "+p.city
document.getElementById("bhk").innerText="BHK: "+p.bhk
document.getElementById("desc").innerText=p.description
document.getElementById("price").innerText="₹"+p.price

}

load()

window.contactOwner=function(){

alert("Owner contact feature coming soon")

}

</script>

</body>

</html>
