<!DOCTYPE html>
<html>

<head>

<title>Property Details</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:20px;
margin-top:20px;
border-radius:8px;
}

h2{
margin-top:0;
}

/* IMAGE GALLERY */

.gallery{
text-align:center;
}

.gallery img{
width:100%;
max-height:400px;
object-fit:cover;
border-radius:8px;
}

.thumbnails{
display:flex;
gap:10px;
margin-top:10px;
justify-content:center;
flex-wrap:wrap;
}

.thumbnails img{
width:120px;
height:80px;
object-fit:cover;
cursor:pointer;
border-radius:6px;
border:2px solid transparent;
}

.thumbnails img:hover{
border-color:#0f4c81;
}

/* DETAILS */

.price{
color:green;
font-size:22px;
font-weight:bold;
}

.btn{
display:inline-block;
margin-top:15px;
background:#0f4c81;
color:white;
padding:10px 15px;
text-decoration:none;
border-radius:6px;
}

.map-btn{
background:#2d9c5b;
margin-left:10px;
}

</style>

</head>

<body>

<div class="container">

<h2 id="title"></h2>

<div class="gallery">

<img id="mainImage">

<div class="thumbnails">

<img id="thumb1" onclick="changeImage(this)">
<img id="thumb2" onclick="changeImage(this)">
<img id="thumb3" onclick="changeImage(this)">

</div>

</div>

<h3 id="price"></h3>

<p id="description"></p>

<a class="btn" id="emailBtn">Email Owner</a>

<a class="btn map-btn" id="mapBtn" target="_blank">View Map</a>

</div>

<script>

const sheetURL =
"https://docs.google.com/spreadsheets/d/1BiyshMuZ8ex2zDtpIttlGgxnRrvBqV9oBq7-jyz0S0M/gviz/tq?tqx=out:csv"


function changeImage(img){

document.getElementById("mainImage").src = img.src

}


function loadProperty(){

const params = new URLSearchParams(window.location.search)

const id = params.get("id")

fetch(sheetURL)

.then(res=>res.text())

.then(data=>{

let rows = data.split("\n").slice(1)

let cols = rows[id].split(",")

let title = cols[0]

let city = cols[1]

let bhk = cols[2]

let price = cols[3]

let image = cols[4]

let description = cols[5]

let email = cols[6]

document.getElementById("title").innerText = title + " - " + city

document.getElementById("price").innerText = "₹" + price + "/month"

document.getElementById("description").innerText = description

document.getElementById("mainImage").src = image

document.getElementById("thumb1").src = image

document.getElementById("thumb2").src = image

document.getElementById("thumb3").src = image

document.getElementById("emailBtn").href = "mailto:"+email

document.getElementById("mapBtn").href =
"https://www.google.com/maps/search/?api=1&query="+city

})

}

loadProperty()

</script>

</body>

</html>
