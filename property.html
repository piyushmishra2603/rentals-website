<!DOCTYPE html>
<html>
<head>

<title>Property Details</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:20px;
}

img{
width:100%;
border-radius:8px;
}

.btn{
display:inline-block;
background:green;
color:white;
padding:10px 15px;
text-decoration:none;
border-radius:6px;
}

</style>

</head>

<body>

<div class="container">

<h2 id="title"></h2>

<img id="image">

<h3 id="price"></h3>

<p id="description"></p>

<a class="btn" href="mailto:piyushmishra1903@gmail.com">Email Owner</a>

</div>

<script>

const properties={

1:{
title:"1BHK Hyderabad",
image:"https://via.placeholder.com/800x400",
price:"₹12,000/month",
description:"Nice 1BHK apartment near metro."
},

2:{
title:"PG Kota",
image:"https://via.placeholder.com/800x400",
price:"₹8,000/month",
description:"PG accommodation for students."
}

}

const params=new URLSearchParams(window.location.search)

const id=params.get("id")

const property=properties[id]

document.getElementById("title").innerText=property.title
document.getElementById("image").src=property.image
document.getElementById("price").innerText=property.price
document.getElementById("description").innerText=property.description

</script>

</body>
</html>
