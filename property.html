<!DOCTYPE html>
<html>

<head>

<title>Property Details</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
}

/* MAIN CONTAINER */

.container{
max-width:900px;
margin:auto;
background:white;
padding:20px;
margin-top:20px;
border-radius:10px;
}

/* GALLERY */

.gallery{
text-align:center;
}

#mainImage{
width:100%;
max-height:420px;
object-fit:cover;
border-radius:10px;
}

.thumbnails{
display:flex;
gap:10px;
margin-top:10px;
flex-wrap:wrap;
justify-content:center;
}

.thumbnails img{
width:120px;
height:80px;
object-fit:cover;
cursor:pointer;
border-radius:6px;
border:2px solid transparent;
}

.thumbnails img:hover{
border-color:#0f4c81;
}

/* DETAILS */

.price{
color:green;
font-size:22px;
font-weight:bold;
}

/* BUTTONS */

.btn{
display:inline-block;
margin-top:15px;
background:#0f4c81;
color:white;
padding:10px 15px;
text-decoration:none;
border-radius:6px;
}

.map-btn{
background:#2d9c5b;
margin-left:10px;
}

/* SIMILAR PROPERTIES */

.similar-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:20px;
}

.similar-card{
background:white;
border-radius:8px;
overflow:hidden;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.similar-card img{
width:100%;
height:150px;
object-fit:cover;
}

.similar-card-content{
padding:10px;
}

.similar-price{
color:green;
font-weight:bold;
}

.similar-btn{
display:inline-block;
margin-top:5px;
background:#0f4c81;
color:white;
padding:6px 10px;
border-radius:5px;
text-decoration:none;
font-size:13px;
}

</style>

</head>

<body>

<div class="container">

<h2 id="title"></h2>

<!-- IMAGE GALLERY -->

<div class="gallery">

<img id="mainImage">

<div class="thumbnails" id="thumbnailContainer"></div>

</div>

<h3 id="price"></h3>

<p id="description"></p>

<a class="btn" id="emailBtn">Email Owner</a>

<a class="btn map-btn" id="mapBtn" target="_blank">View Map</a>

<h3>Similar Properties</h3>

<div id="similarProperties" class="similar-grid"></div>

</div>

<script>

const sheetURL =
"https://docs.google.com/spreadsheets/d/1BiyshMuZ8ex2zDtpIttlGgxnRrvBqV9oBq7-jyz0S0M/gviz/tq?tqx=out:csv"



function changeImage(src){

document.getElementById("mainImage").src = src

}



function loadProperty(){

const params = new URLSearchParams(window.location.search)

const id = params.get("id")

fetch(sheetURL)

.then(res=>res.text())

.then(data=>{

let rows=data.split("\n").slice(1)

let cols=rows[id].split(",")

let title=cols[0]
let city=cols[1]
let bhk=cols[2]
let price=cols[3]
let images=cols[4]
let description=cols[5]
let email=cols[6]

document.getElementById("title").innerText = title + " - " + city
document.getElementById("price").innerText = "₹"+price+"/month"
document.getElementById("description").innerText = description
document.getElementById("emailBtn").href="mailto:"+email
document.getElementById("mapBtn").href =
"https://www.google.com/maps/search/?api=1&query="+city

let imageArray = images.split("|")

document.getElementById("mainImage").src = imageArray[0]

let thumbContainer=document.getElementById("thumbnailContainer")

thumbContainer.innerHTML=""

imageArray.forEach(img=>{

let thumb=document.createElement("img")

thumb.src=img

thumb.onclick=function(){
changeImage(img)
}

thumbContainer.appendChild(thumb)

})

loadSimilar(city,id)

})

}



/* SIMILAR PROPERTIES */

function loadSimilar(city,currentId){

fetch(sheetURL)

.then(res=>res.text())

.then(data=>{

let rows=data.split("\n").slice(1)

let container=document.getElementById("similarProperties")

container.innerHTML=""

rows.forEach((row,index)=>{

if(index==currentId) return

let cols=row.split(",")

let title=cols[0]
let rowCity=cols[1]
let price=cols[3]
let image=cols[4]

if(rowCity.toLowerCase()==city.toLowerCase()){

let card=document.createElement("div")

card.className="similar-card"

card.innerHTML=`

<img src="${image.split("|")[0]}">

<div class="similar-card-content">

<h4>${title}</h4>

<p class="similar-price">₹${price}/month</p>

<a class="similar-btn" href="property.html?id=${index}">
View
</a>

</div>
`

container.appendChild(card)

}

})

})

}



loadProperty()

</script>

</body>

</html>
