<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Services</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
background:linear-gradient(135deg,#0f172a,#1e293b,#020617);
color:white;
font-family:Inter;
}

.glass{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
border-radius:16px;
border:1px solid rgba(255,255,255,0.1);
}

.card{
transition: all 0.3s ease;
}
.card:hover{
transform: translateY(-8px) scale(1.03);
box-shadow: 0 0 20px rgba(0,255,255,0.2),
            0 0 40px rgba(0,255,255,0.1);
}

.badge{
font-size:10px;
padding:2px 6px;
border-radius:6px;
}

button{
transition:0.3s;
}

</style>

</head>

<body>

<div class="max-w-6xl mx-auto p-6">

<!-- HEADER -->
<div class="flex justify-between items-center mb-6">
<h1 class="text-3xl font-bold">Services</h1>
<a href="index.html" class="bg-gray-700 px-4 py-2 rounded">← Back</a>
</div>

<!-- HERO -->
<div class="glass p-6 mb-6 text-center">
<h2 class="text-3xl font-bold mb-2">Find Trusted Services ⚡</h2>
<p class="text-gray-300 mb-4">Plumbing • Electrician • Cleaning • Furniture • Repairs</p>
</div>

<!-- SEARCH -->
<div class="glass p-4 flex gap-3 flex-wrap mb-6">

<input id="search" placeholder="🔍 Search services..." 
class="flex-1 px-3 py-2 rounded text-black">

<select id="priceFilter" class="px-3 py-2 rounded text-black">
<option value="">All Prices</option>
<option value="low">Below ₹500</option>
<option value="mid">₹500 - ₹1500</option>
<option value="high">Above ₹1500</option>
</select>

<button onclick="applyFilter()" 
class="bg-blue-600 px-4 py-2 rounded">
Apply
</button>

</div>

<!-- QUICK FILTER -->
<div class="flex gap-3 overflow-x-auto mb-6">
<button onclick="quickFilter('Plumbing')" class="glass px-4 py-2 rounded">🚰 Plumbing</button>
<button onclick="quickFilter('Electrician')" class="glass px-4 py-2 rounded">⚡ Electric</button>
<button onclick="quickFilter('Cleaning')" class="glass px-4 py-2 rounded">🧹 Cleaning</button>
<button onclick="quickFilter('Furniture')" class="glass px-4 py-2 rounded">🛋️ Furniture</button>
</div>

<!-- GRID -->
<div id="grid" class="grid md:grid-cols-3 gap-6"></div>

</div>

<!-- FLOAT BUTTON -->
<button onclick="openServiceModal()" 
class="fixed bottom-6 right-6 bg-gradient-to-r from-purple-600 to-pink-500 
px-5 py-3 rounded-full font-bold shadow-xl">
➕ Post Service
</button>

<!-- BOOK MODAL -->
<div id="modal" class="fixed inset-0 bg-black/70 hidden flex items-center justify-center">

<div class="bg-gray-900 p-6 rounded-xl w-80">

<h2 class="mb-3 font-bold">Book Service</h2>

<input id="name" placeholder="Name" class="w-full p-2 rounded text-black mb-2">
<input id="phone" placeholder="Phone" class="w-full p-2 rounded text-black mb-2">
<input id="address" placeholder="Address" class="w-full p-2 rounded text-black mb-2">
<input id="upi" placeholder="UPI" class="w-full p-2 rounded text-black mb-3">

<button onclick="payNow(event)" class="bg-green-600 w-full p-2 rounded">
Pay & Book
</button>

<button onclick="closeModal()" class="mt-2 w-full text-gray-400">
Cancel
</button>

</div>
</div>

<!-- POST SERVICE -->
<div id="serviceModal" class="fixed inset-0 bg-black/70 hidden flex items-center justify-center">

<div class="bg-gray-900 p-6 rounded-xl w-96">

<h2 class="mb-4 font-bold text-xl">Post Service</h2>

<input id="s_name" placeholder="Name" class="w-full p-2 rounded text-black mb-2">
<input id="s_phone" placeholder="Phone" class="w-full p-2 rounded text-black mb-2">
<input id="s_city" placeholder="City" class="w-full p-2 rounded text-black mb-2">

<select id="s_category" class="w-full p-2 rounded text-black mb-2">
<option>Plumbing</option>
<option>Electrician</option>
<option>Cleaning</option>
<option>Furniture</option>
</select>

<input id="s_price" type="number" placeholder="Price" class="w-full p-2 rounded text-black mb-2">
<input id="s_image" type="file" class="mb-2">

<button onclick="submitService()" class="bg-green-600 w-full p-2 rounded">
Post
</button>

<button onclick="closeServiceModal()" class="mt-2 w-full text-gray-400">
Cancel
</button>

</div>
</div>

<!-- TOAST -->
<div id="toast" class="fixed bottom-5 right-5 hidden bg-green-600 px-4 py-2 rounded"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"
import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"
import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"

const firebaseConfig = { apiKey:"AIzaSyCExyC1UlqWl-tTJWVtoQx6E-rppaYQgcU", authDomain:"smart-property-portal.firebaseapp.com", projectId:"smart-property-portal" }

const app = initializeApp(firebaseConfig)
const db = getFirestore(app)
const auth = getAuth(app)

const grid = document.getElementById("grid")

let providers=[]
let selectedProvider=null

let favs = JSON.parse(localStorage.getItem("favs")||"[]")

function showToast(msg){
let t=document.getElementById("toast")
t.innerText=msg
t.classList.remove("hidden")
setTimeout(()=>t.classList.add("hidden"),2000)
}

/* LOAD */
async function loadProviders(){

grid.innerHTML="Loading..."

const snap=await getDocs(collection(db,"providers"))

providers=[]
snap.forEach(d=>providers.push({id:d.id,...d.data()}))

render(providers)
}

loadProviders()

/* RENDER */
function render(list){

if(list.length===0){
grid.innerHTML="No services 😔"
return
}

grid.innerHTML=""

list.forEach(p=>{

grid.innerHTML+=`
<div class="glass card p-4 relative">

<div onclick="toggleFav('${p.id}')" class="absolute top-2 left-2 cursor-pointer">
${favs.includes(p.id)?"❤️":"🤍"}
</div>

<img src="${p.image||'https://via.placeholder.com/300'}" class="w-full h-40 object-cover rounded mb-2">

<h3 class="font-bold">${p.name}</h3>
<p>${p.type||""}</p>
<p class="text-green-400">₹${p.price}</p>

<button onclick="openModal('${p.id}')" class="bg-blue-600 w-full mt-2 p-2 rounded">
Book
</button>

</div>
`
})

}

/* SEARCH */
document.getElementById("search").addEventListener("input",e=>{
let v=e.target.value.toLowerCase()
render(providers.filter(p=>p.name.toLowerCase().includes(v)))
})

/* FILTER */
window.applyFilter=function(){
let price=priceFilter.value
render(providers.filter(p=>
!price ||
(price==="low"&&p.price<500)||
(price==="mid"&&p.price<=1500)||
(price==="high"&&p.price>1500)
))
}

/* QUICK */
window.quickFilter=function(type){
render(providers.filter(p=>(p.type||"").includes(type)))
}

/* FAVORITE */
window.toggleFav=function(id){
if(favs.includes(id)) favs=favs.filter(f=>f!==id)
else favs.push(id)
localStorage.setItem("favs",JSON.stringify(favs))
render(providers)
}

/* MODAL */
window.openModal=id=>{
selectedProvider=providers.find(p=>p.id===id)
modal.classList.remove("hidden")
}
window.closeModal=()=>modal.classList.add("hidden")

/* BOOK */
window.payNow=async function(e){

if(!auth.currentUser){
showToast("Login required")
return
}

let btn=e.target
btn.innerText="Processing..."

await addDoc(collection(db,"bookings"),{
userId:auth.currentUser.uid,
serviceName:selectedProvider.name,
price:selectedProvider.price,
status:"pending"
})

btn.innerText="Pay & Book"
showToast("Booked 🎉")
closeModal()

}

/* POST */
window.openServiceModal=()=>serviceModal.classList.remove("hidden")
window.closeServiceModal=()=>serviceModal.classList.add("hidden")

window.submitService=async function(){

if(!auth.currentUser){
showToast("Login required")
return
}

await addDoc(collection(db,"providers"),{
name:s_name.value,
type:s_category.value,
price:Number(s_price.value),
ownerId:auth.currentUser.uid
})

showToast("Posted 🎉")
closeServiceModal()
loadProviders()

}

</script>

<script>
document.body.style.opacity=0
window.onload=()=>{document.body.style.opacity=1}
</script>

</body>
</html>
