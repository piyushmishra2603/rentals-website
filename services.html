<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Services</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
background:linear-gradient(135deg,#0f172a,#1e293b,#020617);
color:white;
font-family:Inter;
}
.glass{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
border-radius:16px;
border:1px solid rgba(255,255,255,0.1);
}
.card{
transition: all 0.3s ease;
}

.card:hover{
transform: translateY(-8px) scale(1.03);
box-shadow: 0 0 20px rgba(0,255,255,0.2),
            0 0 40px rgba(0,255,255,0.1);
}

*{
scroll-behavior:smooth;
}
.badge{
font-size:10px;
padding:2px 6px;
border-radius:6px;
}
</style>

</head>

<body>

<div class="max-w-6xl mx-auto p-6">

<!-- HEADER -->
<div class="flex justify-between items-center mb-6">
<h1 id="title" class="text-3xl font-bold">Services</h1>
<a href="index.html" class="bg-gray-700 px-4 py-2 rounded">← Back</a>
</div>

<div class="glass p-6 mb-6 text-center">
<h2 class="text-3xl font-bold mb-2">Find Trusted Services ⚡</h2>
<p class="text-gray-300 mb-4">Plumbing • Electrician • Cleaning • Furniture • Repairs</p>
<div class="flex justify-center gap-3 flex-wrap">
<button class="bg-blue-600 px-4 py-2 rounded-full">⚡ Fast Booking</button>
<button class="bg-purple-600 px-4 py-2 rounded-full">⭐ Top Rated</button>
<button class="bg-green-600 px-4 py-2 rounded-full">💰 Best Price</button>
</div>
</div>
  
<!-- SEARCH -->
<div class="glass p-4 flex gap-3 flex-wrap mb-6">

<input id="search" placeholder="🔍 Search services..." 
class="flex-1 px-3 py-2 rounded text-black">

<select id="priceFilter" class="px-3 py-2 rounded text-black">
<option value="">All Prices</option>
<option value="low">Below ₹500</option>
<option value="mid">₹500 - ₹1500</option>
<option value="high">Above ₹1500</option>
</select>

<button onclick="applyFilter()" 
class="bg-blue-600 px-4 py-2 rounded hover:scale-105">
Apply
</button>

</div>

<div class="flex gap-3 overflow-x-auto mb-6">

<button onclick="quickFilter('Plumbing')" class="glass px-4 py-2 rounded">🚰 Plumbing</button>
<button onclick="quickFilter('Electrician')" class="glass px-4 py-2 rounded">⚡ Electric</button>
<button onclick="quickFilter('Cleaning')" class="glass px-4 py-2 rounded">🧹 Cleaning</button>
<button onclick="quickFilter('Furniture')" class="glass px-4 py-2 rounded">🛋️ Furniture</button>

</div>
  
<!-- GRID -->
<div id="grid" class="grid md:grid-cols-3 gap-6"></div>

</div>

<!-- 🚀 FLOAT BUTTON -->
<button onclick="openServiceModal()" 
class="fixed bottom-6 right-6 bg-gradient-to-r from-purple-600 to-pink-500 
px-5 py-3 rounded-full text-white font-bold shadow-xl hover:scale-110 transition z-50">
➕ Post Service
</button>

<!-- BOOKING MODAL -->
<div id="modal" class="fixed inset-0 bg-black/70 hidden flex items-center justify-center z-50">

<div class="bg-gradient-to-br from-gray-800 to-gray-900 p-6 rounded-2xl w-11/12 max-w-md">

<h2 class="text-xl mb-3 font-bold">📅 Book Service</h2>

<input id="name" placeholder="Your Name" class="w-full p-2 rounded text-black mb-2">
<input id="phone" placeholder="Phone" class="w-full p-2 rounded text-black mb-2">
<input id="address" placeholder="Address" class="w-full p-2 rounded text-black mb-2">
<input id="upi" placeholder="Enter UPI ID" class="w-full p-2 rounded text-black mb-3">

<button onclick="payNow()" 
class="bg-green-600 w-full p-3 rounded font-bold hover:scale-105">
Pay & Book 🚀
</button>

<button onclick="closeModal()" class="mt-2 text-gray-400 w-full">
Cancel
</button>

</div>
</div>

<!-- 💎 POST SERVICE MODAL -->
<div id="serviceModal" class="fixed inset-0 bg-black/70 hidden flex items-center justify-center z-50">

<div class="bg-gradient-to-r from-gray-900 to-gray-800 p-6 rounded-2xl w-11/12 max-w-lg">

<h2 class="text-2xl font-bold mb-4">🚀 List Your Service</h2>

<input id="s_name" placeholder="Your Name" class="w-full p-2 rounded text-black mb-2">
<input id="s_phone" placeholder="Phone" class="w-full p-2 rounded text-black mb-2">
<input id="s_city" placeholder="City" class="w-full p-2 rounded text-black mb-2">

<select id="s_category" class="w-full p-2 rounded text-black mb-2">
<option>Plumbing</option>
<option>Electrician</option>
<option>Cleaning</option>
<option>Furniture</option>
<option>Painting</option>
<option>AC Repair</option>
</select>

<input id="s_price" type="number" placeholder="Price ₹" class="w-full p-2 rounded text-black mb-2">

<input id="s_image" type="file" class="w-full mb-3">

<div class="flex gap-3">
<button onclick="submitService()" class="flex-1 bg-green-600 py-2 rounded">Post</button>
<button onclick="closeServiceModal()" class="flex-1 bg-red-500 py-2 rounded">Cancel</button>
</div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"
import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"
import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js"

/* CONFIG */
const firebaseConfig = {
apiKey:"AIzaSyCExyC1UlqWl-tTJWVtoQx6E-rppaYQgcU",
authDomain:"smart-property-portal.firebaseapp.com",
projectId:"smart-property-portal"
}

const app = initializeApp(firebaseConfig)
const db = getFirestore(app)
const auth = getAuth(app)
const storage = getStorage(app)

const grid = document.getElementById("grid")

let providers = []
let filtered = []
let selectedProvider = null

/* LOAD PROVIDERS */
grid.innerHTML = `
<div class="animate-pulse space-y-4">
<div class="h-24 bg-gray-700 rounded"></div>
<div class="h-24 bg-gray-700 rounded"></div>
<div class="h-24 bg-gray-700 rounded"></div>
</div>
`  
async function loadProviders(){

const snapshot = await getDocs(collection(db,"providers"))

providers = []
snapshot.forEach(doc=>{
providers.push({id:doc.id,...doc.data()})
})

filtered = providers
render(filtered)

}

loadProviders()

/* RENDER */
function render(list){

grid.innerHTML=""

list.forEach(p=>{

let icon = "🛠️"

if(p.type?.includes("Plumb")) icon = "🚰"
if(p.type?.includes("Electric")) icon = "⚡"
if(p.type?.includes("Clean")) icon = "🧹"
if(p.type?.includes("Furniture")) icon = "🛋️"  

let badge = p.rating>4.6 
? '<span class="badge bg-yellow-400 text-black">Top Rated</span>'
: '<span class="badge bg-blue-500">Popular</span>'

grid.innerHTML+=`
<div class="glass card p-4 relative">

<div class="absolute top-2 right-2">${badge}</div>

<h3 class="text-xl font-bold">${icon} ${p.name}</h3>
<p class="text-gray-300 text-sm">${p.type || "Service"}</p>
<p class="text-green-400 font-bold text-lg">₹${p.price}</p>

<button onclick="openModal('${p.id}')" 
class="bg-gradient-to-r from-blue-500 to-cyan-500 
w-full py-2 rounded mt-3 
hover:scale-105 active:scale-95 
transition duration-200 shadow-lg"
Book Instantly ⚡
</button>

</div>
`
})

}

/* FILTER */
window.applyFilter = function(){

let search = search.value.toLowerCase()
let price = priceFilter.value

let f = providers.filter(p=>
p.name.toLowerCase().includes(search) &&
(!price ||
(price==="low" && p.price<500) ||
(price==="mid" && p.price<=1500 && p.price>=500) ||
(price==="high" && p.price>1500))
)

render(f)

}

/* MODAL */
window.openModal = function(id){
selectedProvider = providers.find(p=>p.id===id)
modal.classList.remove("hidden")
}

window.closeModal = function(){
modal.classList.add("hidden")
}

/* PAYMENT */
window.payNow = async function(){

if(!auth.currentUser){
alert("Login required")
return
}

await addDoc(collection(db,"bookings"),{
type:"service",
userId:auth.currentUser.uid,
ownerId:selectedProvider.ownerId || "unknown",
serviceName:selectedProvider.name,
price:selectedProvider.price,
status:"pending",
paymentStatus:"paid",
time:Date.now()
})

alert("✅ Booking Confirmed")
closeModal()

}

/* SERVICE MODAL */
window.openServiceModal = ()=> serviceModal.classList.remove("hidden")
window.closeServiceModal = ()=> serviceModal.classList.add("hidden")

/* IMAGE UPLOAD */
async function uploadServiceImage(file){
const storageRef = ref(storage,"services/"+Date.now())
await uploadBytes(storageRef,file)
return await getDownloadURL(storageRef)
}

/* SUBMIT SERVICE */
window.submitService = async function(){

if(!auth.currentUser){
alert("Login required")
return
}

let file = document.getElementById("s_image").files[0]
let imageURL = file ? await uploadServiceImage(file) : ""

await addDoc(collection(db,"providers"),{
name:s_name.value,
phone:s_phone.value,
city:s_city.value,
type:s_category.value,
price:Number(s_price.value),
image:imageURL,
ownerId:auth.currentUser.uid,
rating:5,
jobs:0,
createdAt:Date.now()
})

alert("🎉 Service Posted!")
closeServiceModal()
loadProviders()

}

</script>

<button 
onclick="alert('AI Assistant Coming Soon 🤖')" 
class="fixed bottom-6 left-6 bg-gradient-to-r from-cyan-500 to-blue-600 
p-4 rounded-full shadow-xl hover:scale-110 transition z-50">
🤖
</button>
  
</body>
</html>
