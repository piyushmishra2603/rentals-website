<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Signup - SmartRent AI</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
font-family:'Inter',sans-serif;
background:linear-gradient(to right,#0f2027,#203a43,#2c5364);
color:white;
}

.glass{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
border-radius:15px;
}

input{
color:black;
}

.strength{
height:5px;
border-radius:5px;
margin-top:5px;
}
</style>

</head>

<body class="flex items-center justify-center min-h-screen">

<div class="glass p-8 w-96 shadow-lg">

<h2 class="text-2xl font-bold text-center mb-6">🚀 Create Account</h2>

<input id="name" placeholder="Full Name"
class="w-full p-3 mb-3 rounded">

<input id="email" type="email" placeholder="Email"
class="w-full p-3 mb-3 rounded">

<!-- PASSWORD -->
<div class="relative">
<input id="password" type="password" placeholder="Password"
class="w-full p-3 mb-1 rounded">
<button onclick="togglePass('password')" 
class="absolute right-2 top-2 text-black">👁</button>
</div>

<div id="strengthBar" class="strength bg-red-500"></div>

<!-- CONFIRM PASSWORD -->
<div class="relative mt-3">
<input id="confirm" type="password" placeholder="Confirm Password"
class="w-full p-3 mb-3 rounded">
<button onclick="togglePass('confirm')" 
class="absolute right-2 top-2 text-black">👁</button>
</div>

<button onclick="signup()" 
class="w-full bg-green-600 p-3 rounded mb-3">
Create Account
</button>

<button onclick="googleSignup()" 
class="w-full bg-red-600 p-3 rounded mb-3">
Signup with Google
</button>

<p class="text-center">
Already have an account?
<a href="login.html" class="text-blue-400">Login</a>
</p>

<p id="msg" class="text-center mt-3 text-red-400"></p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"
import { 
getAuth, 
createUserWithEmailAndPassword, 
updateProfile,
GoogleAuthProvider,
signInWithPopup,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"

import { 
getFirestore, 
doc, 
setDoc 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"

/* 🔐 CONFIG */
const firebaseConfig = {
apiKey:"YOUR_API_KEY",
authDomain:"smart-property-portal.firebaseapp.com",
projectId:"smart-property-portal",
storageBucket:"smart-property-portal.firebasestorage.app",
messagingSenderId:"407241446660",
appId:"1:407241446660:web:1259fa8c93bce5fd8aec51"
}

const app = initializeApp(firebaseConfig)
const auth = getAuth(app)
const db = getFirestore(app)
const provider = new GoogleAuthProvider()

/* AUTO REDIRECT */
onAuthStateChanged(auth,(user)=>{
if(user){
window.location.href="index.html"
}
})

/* PASSWORD STRENGTH */
const passwordInput = document.getElementById("password")
const strengthBar = document.getElementById("strengthBar")

passwordInput.addEventListener("input",()=>{
let val = passwordInput.value
let strength = 0

if(val.length > 5) strength++
if(/[A-Z]/.test(val)) strength++
if(/[0-9]/.test(val)) strength++
if(/[^A-Za-z0-9]/.test(val)) strength++

const colors = ["red","orange","yellow","green"]
strengthBar.style.background = colors[strength-1] || "red"
})

/* SIGNUP */
window.signup = async function(){

const name = document.getElementById("name").value
const email = document.getElementById("email").value
const password = document.getElementById("password").value
const confirm = document.getElementById("confirm").value
const msg = document.getElementById("msg")

msg.innerText=""

/* VALIDATION */
if(!name || !email || !password){
msg.innerText="Fill all fields"
return
}

if(password !== confirm){
msg.innerText="Passwords do not match"
return
}

try{

const userCred = await createUserWithEmailAndPassword(auth,email,password)

await updateProfile(userCred.user,{
displayName:name
})

/* SAVE USER DATA */
await setDoc(doc(db,"users",userCred.user.uid),{
name:name,
email:email,
createdAt:Date.now()
})

window.location.href="index.html"

}catch(err){
msg.innerText=err.message
}

}

/* GOOGLE SIGNUP */
window.googleSignup = async function(){

try{

const result = await signInWithPopup(auth,provider)
const user = result.user

await setDoc(doc(db,"users",user.uid),{
name:user.displayName,
email:user.email,
createdAt:Date.now()
},{merge:true})

window.location.href="index.html"

}catch(err){
document.getElementById("msg").innerText=err.message
}

}

/* TOGGLE PASSWORD */
window.togglePass = function(id){
const input = document.getElementById(id)
input.type = input.type === "password" ? "text" : "password"
}

</script>

</body>
</html>
