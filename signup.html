<!DOCTYPE html>
<html>
<head>
  <title>Owner Signup</title>
  <style>
    body { font-family: Arial; margin:50px; }
    input, button { display:block; margin:10px 0; padding:10px; width:300px; }
    button { cursor:pointer; background-color:#4CAF50; color:white; border:none; font-weight:bold; }
    button:hover { background-color:#45a049; }
  </style>
</head>
<body>

<h2>Owner Signup</h2>

<input type="text" id="name" placeholder="Full Name" required>
<input type="email" id="email" placeholder="Email" required>
<input type="text" id="phone" placeholder="Phone" required>
<input type="password" id="password" placeholder="Password" required>
<button onclick="signup()">Sign Up</button>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwh-9c-O1jC7RAQrpcdXzFJZO7Yyf28CIdAmAjRVUywGYPMOszLPbYbQxP24f0PPTF80Q/exec";

function signup() {
  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const password = document.getElementById("password").value.trim();

  if(!name || !email || !phone || !password) {
    alert("Please fill all fields!");
    return;
  }

  fetch(WEB_APP_URL, {
    method:"POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({action:"signupOwner", name, email, phone, password})
  })
  .then(res=>res.json())
  .then(resp=>{
    if(resp.status==="success") {
      alert(resp.message);
      window.location.href="login.html";
    } else {
      alert("Signup failed: "+resp.message);
    }
  })
  .catch(err=>{
    console.error(err);
    alert("An error occurred during signup.");
  });
}
</script>
</body>
</html>
