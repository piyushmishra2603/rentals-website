<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Signup - SmartRent AI</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
font-family:'Inter',sans-serif;
background:linear-gradient(to right,#0f2027,#203a43,#2c5364);
color:white;
}

/* Glass UI */
.glass{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
border-radius:20px;
}

/* Animation */
.fade-in{
animation:fade 0.8s ease-in-out;
}

@keyframes fade{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}
</style>

</head>

<body class="flex items-center justify-center min-h-screen">

<div class="glass p-8 w-[90%] max-w-md text-center fade-in shadow-2xl">

<h1 class="text-3xl font-bold mb-2">Create Account 🚀</h1>
<p class="text-gray-300 mb-6">Join SmartRent AI</p>

<!-- EMAIL -->
<input id="email" type="email" placeholder="Email"
class="w-full p-3 mb-3 rounded text-black">

<!-- PASSWORD -->
<input id="password" type="password" placeholder="Password"
class="w-full p-3 mb-3 rounded text-black">

<!-- PROFILE IMAGE -->
<input id="photoURL" type="text" placeholder="Profile Image URL"
class="w-full p-3 mb-3 rounded text-black">

<!-- PREVIEW -->
<img id="preview" 
class="w-20 h-20 rounded-full mx-auto mb-4 hidden border-2 border-white">

<!-- SIGNUP BUTTON -->
<button id="signupBtn"
class="w-full bg-gradient-to-r from-blue-500 to-cyan-500 py-3 rounded font-bold hover:scale-105 transition">
Signup
</button>

<p class="mt-4 text-sm">
Already have an account? 
<a href="login.html" class="text-cyan-400">Login</a>
</p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, setDoc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* 🔥 YOUR FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCExyC1UlqWl-tTJWVtoQx6E-rppaYQgcU",
  authDomain: "smart-property-portal.firebaseapp.com",
  projectId: "smart-property-portal"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* 🔥 IMAGE PREVIEW */
const photoInput = document.getElementById("photoURL");
const preview = document.getElementById("preview");

photoInput.addEventListener("input", ()=>{
  if(photoInput.value){
    preview.src = photoInput.value;
    preview.classList.remove("hidden");
  }else{
    preview.classList.add("hidden");
  }
});

/* 🔥 SIGNUP LOGIC */
const signupBtn = document.getElementById("signupBtn");

signupBtn.addEventListener("click", async ()=>{

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const photoURL = document.getElementById("photoURL").value;

  if(!email || !password){
    alert("Please fill all fields");
    return;
  }

  try{
    signupBtn.innerText = "Creating...";
    signupBtn.disabled = true;

    const userCred = await createUserWithEmailAndPassword(auth, email, password);
    const user = userCred.user;

    /* SAVE USER */
    await setDoc(doc(db,"users",user.uid),{
      email: user.email,
      photo: photoURL || "https://i.pravatar.cc/100"
    });

    alert("Account created successfully 🎉");

    window.location.href = "index.html";

  }catch(err){
    alert(err.message);
  }

  signupBtn.innerText = "Signup";
  signupBtn.disabled = false;

});

</script>

</body>
</html>
