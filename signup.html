<!DOCTYPE html>
<html>
<head>

<title>Create Account</title>

<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#1976d2,#42a5f5);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:white;
padding:40px;
border-radius:10px;
width:320px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
margin-top:15px;
padding:12px;
border:none;
background:#1976d2;
color:white;
border-radius:5px;
cursor:pointer;
}

p{
text-align:center;
margin-top:10px;
}

</style>

</head>

<body>

<div class="box">

<h2>Create Account</h2>

<input id="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button onclick="signup()">Sign Up</button>

<p id="msg"></p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getAuth, createUserWithEmailAndPassword }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


const firebaseConfig = {
  apiKey: "AIzaSyCExyC1UlqWl-tTJWVtoQx6E-rppaYQgcU",
  authDomain: "smart-property-portal.firebaseapp.com",
  projectId: "smart-property-portal",
  storageBucket: "smart-property-portal.firebasestorage.app",
  messagingSenderId: "407241446660",
  appId: "1:407241446660:web:1259fa8c93bce5fd8aec51"
};


const app = initializeApp(firebaseConfig);

const auth = getAuth(app);


window.signup = function(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

createUserWithEmailAndPassword(auth,email,password)

.then((userCredential)=>{

document.getElementById("msg").innerHTML="Account created successfully"

})

.catch((error)=>{

document.getElementById("msg").innerHTML=error.message

})

}

</script>

</body>

</html>
