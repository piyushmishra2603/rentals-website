<!DOCTYPE html>
<html>
<head>
  <title>Owner Signup</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #f4f4f4; }
    input, button { display: block; margin: 10px 0; padding: 10px; width: 300px; }
    button { cursor: pointer; background: #4CAF50; color: white; border: none; }
  </style>
</head>
<body>
  <h2>Owner Signup</h2>
  <input type="text" id="name" placeholder="Full Name">
  <input type="email" id="email" placeholder="Email">
  <input type="text" id="phone" placeholder="Phone">
  <input type="password" id="password" placeholder="Password">
  <button onclick="signup()">Sign Up</button>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzRvyjppF8C-MWeOOEPuqxBpfxo_QA3_OXs-lp7JpK1DEzOQQ2kIHB6rnAoTS-5FL2liQ/exec";

    function signup() {
      const name = document.getElementById("name").value;
      const email = document.getElementById("email").value;
      const phone = document.getElementById("phone").value;
      const password = document.getElementById("password").value;

      fetch(`${WEB_APP_URL}?action=signupOwner&name=${encodeURIComponent(name)}&email=${encodeURIComponent(email)}&phone=${encodeURIComponent(phone)}&password=${encodeURIComponent(password)}`)
        .then(res => res.text())
        .then(res => {
          alert(res);
          if(res === "Success") window.location.href = "login.html";
        })
        .catch(err => console.error(err));
    }
  </script>
</body>
</html>
