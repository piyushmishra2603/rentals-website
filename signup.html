<!DOCTYPE html>
<html>
<head>
  <title>Owner Signup</title>
  <style>
    body { font-family: Arial; margin: 50px; }
    input { display: block; margin: 10px 0; padding: 8px; width: 250px; }
    button { padding: 10px 20px; cursor: pointer; }
  </style>
</head>
<body>

<h2>Owner Signup</h2>

<input type="text" id="name" placeholder="Full Name" required>
<input type="email" id="email" placeholder="Email" required>
<input type="text" id="phone" placeholder="Phone" required>
<input type="password" id="password" placeholder="Password" required>
<button onclick="signup()">Sign Up</button>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbznG-GmZj4sHzqd4XLQzXmAhzAXvqLHJDr5IcpnofWmuexOYsncz7DhfkKL0c5dNcjqOw/exec"; // <-- your Apps Script URL

function signup() {
  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const password = document.getElementById("password").value.trim();

  if(!name || !email || !phone || !password) {
    alert("Please fill all fields!");
    return;
  }

  fetch(WEB_APP_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      action: "signupOwner",
      name: name,
      email: email,
      phone: phone,
      password: password
    })
  })
  .then(res => res.text())
  .then(response => {
    if(response === "Success") {
      alert("Signup successful!");
      window.location.href = "login.html"; // redirect to login page
    } else {
      alert("Signup failed: " + response);
    }
  })
  .catch(err => console.error(err));
}
</script>

</body>
</html>
