<!DOCTYPE html>
<html>

<head>

<title>Owner Signup</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f4f6fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.signupBox{

background:white;
padding:30px;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.15);
width:320px;
text-align:center;

}

.signupBox h2{
margin-bottom:20px;
}

.signupBox input{

width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:6px;

}

.signupBox button{

width:100%;
padding:12px;
background:#2563eb;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
font-size:16px;

}

.signupBox button:hover{
background:#1d4ed8;
}

#msg{
margin-top:10px;
color:green;
}

.whatsappFloat{

position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50px;
text-decoration:none;
font-weight:bold;
box-shadow:0 3px 10px rgba(0,0,0,0.3);

}

</style>

</head>

<body>


<div class="signupBox">

<h2>Owner Signup</h2>

<input id="name" placeholder="Full Name">

<input id="email" placeholder="Email">

<input id="phone" placeholder="Phone">

<input id="password" type="password" placeholder="Password">

<button onclick="signupOwner()">Create Account</button>

<p id="msg"></p>

</div>


<!-- FLOATING WHATSAPP -->

<a href="https://wa.me/91YOURNUMBER" class="whatsappFloat">
WhatsApp
</a>


<script>

const scriptURL="https://script.google.com/macros/s/AKfycbyPRbaCUVnHnEVVcE-Zf25XeOHTJs53kKMMu9h0lLk3e5MTvj8sxypPsD8Jo8oCmFARew/exec"



function signupOwner(){

let name=document.getElementById("name").value
let email=document.getElementById("email").value
let phone=document.getElementById("phone").value
let password=document.getElementById("password").value


fetch(scriptURL,{

method:"POST",

body:JSON.stringify({

action:"signupOwner",

name:name,
email:email,
phone:phone,
password:password

})

})

.then(res=>res.text())

.then(data=>{

document.getElementById("msg").innerText="Signup Successful!"

})

.catch(err=>{

document.getElementById("msg").innerText="Signup Failed"

})

}

</script>


</body>
</html>
