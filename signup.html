<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Signup - SmartRent AI</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
font-family:'Inter',sans-serif;
background:linear-gradient(to right,#0f2027,#203a43,#2c5364);
color:white;
}

.glass{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
border-radius:20px;
}

.fade-in{
animation:fade 0.8s ease-in-out;
}

@keyframes fade{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}
</style>

</head>

<body class="flex items-center justify-center min-h-screen">

<div class="glass p-8 w-[90%] max-w-md text-center fade-in shadow-2xl">

<h1 class="text-3xl font-bold mb-2">Create Account 🚀</h1>
<p class="text-gray-300 mb-6">Join SmartRent AI</p>

<!-- USERNAME -->
<input id="name" type="text" placeholder="Full Name"
class="w-full p-3 mb-3 rounded text-black">

<!-- EMAIL -->
<input id="email" type="email" placeholder="Email"
class="w-full p-3 mb-3 rounded text-black">

<!-- PASSWORD -->
<input id="password" type="password" placeholder="Password"
class="w-full p-3 mb-2 rounded text-black">

<p id="strength" class="text-sm text-gray-300 mb-3"></p>

<!-- IMAGE UPLOAD -->
<input id="file" type="file" accept="image/*"
class="w-full mb-3 text-sm">

<img id="preview" 
class="w-20 h-20 rounded-full mx-auto mb-4 hidden border-2 border-white">

<!-- SIGNUP BUTTON -->
<button id="signupBtn"
class="w-full bg-gradient-to-r from-blue-500 to-cyan-500 py-3 rounded font-bold hover:scale-105 transition">
Signup
</button>

<!-- GOOGLE -->
<button id="googleBtn"
class="w-full mt-3 bg-white text-black py-2 rounded font-bold hover:scale-105 transition">
Continue with Google
</button>

<p class="mt-4 text-sm">
Already have an account? 
<a href="login.html" class="text-cyan-400">Login</a>
</p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
getAuth, 
createUserWithEmailAndPassword, 
GoogleAuthProvider, 
signInWithPopup 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { getFirestore, doc, setDoc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCExyC1UlqWl-tTJWVtoQx6E-rppaYQgcU",
  authDomain: "smart-property-portal.firebaseapp.com",
  projectId: "smart-property-portal"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* PASSWORD STRENGTH */
const password = document.getElementById("password");
const strength = document.getElementById("strength");

password.addEventListener("input", ()=>{
  let val = password.value;

  if(val.length < 6){
    strength.innerText = "Weak password ❌";
    strength.style.color = "red";
  }else if(val.length < 10){
    strength.innerText = "Medium password ⚠️";
    strength.style.color = "orange";
  }else{
    strength.innerText = "Strong password ✅";
    strength.style.color = "green";
  }
});

/* IMAGE PREVIEW */
const fileInput = document.getElementById("file");
const preview = document.getElementById("preview");

fileInput.addEventListener("change", ()=>{
  const file = fileInput.files[0];
  if(file){
    preview.src = URL.createObjectURL(file);
    preview.classList.remove("hidden");
  }
});

/* SIGNUP */
const signupBtn = document.getElementById("signupBtn");

signupBtn.addEventListener("click", async ()=>{

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  if(!name || !email || !pass){
    alert("Fill all fields");
    return;
  }

  try{
    signupBtn.innerText = "Creating...";
    signupBtn.disabled = true;

    const userCred = await createUserWithEmailAndPassword(auth, email, pass);
    const user = userCred.user;

    /* SAVE USER */
    await setDoc(doc(db,"users",user.uid),{
      name,
      email,
      photo: preview.src || "https://i.pravatar.cc/100"
    });

    alert("Account created 🎉");
    window.location.href = "index.html";

  }catch(e){
    alert(e.message);
  }

  signupBtn.innerText = "Signup";
  signupBtn.disabled = false;
});

/* GOOGLE LOGIN */
const googleBtn = document.getElementById("googleBtn");

googleBtn.addEventListener("click", async ()=>{

  const provider = new GoogleAuthProvider();

  try{
    const result = await signInWithPopup(auth, provider);
    const user = result.user;

    await setDoc(doc(db,"users",user.uid),{
      name: user.displayName,
      email: user.email,
      photo: user.photoURL
    });

    window.location.href = "index.html";

  }catch(e){
    alert(e.message);
  }

});

</script>

</body>
</html>
