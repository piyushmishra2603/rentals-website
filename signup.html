<!DOCTYPE html>
<html>

<head>

<title>Owner Signup</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
}

.container{
max-width:400px;
margin:auto;
background:white;
padding:25px;
margin-top:60px;
border-radius:8px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
margin-top:15px;
background:#0f4c81;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0c3b63;
}

.success{
color:green;
text-align:center;
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<h2>Owner Signup</h2>

<form id="signupForm">

<input id="name" placeholder="Full Name" required>

<input id="email" placeholder="Email" required>

<input id="phone" placeholder="Phone Number" required>

<input id="password" type="password" placeholder="Password" required>

<button type="submit">Create Account</button>

</form>

<p id="message" class="success"></p>

</div>

<script>

/* ===============================
PASTE YOUR APPS SCRIPT URL
=============================== */

const scriptURL="https://script.google.com/macros/s/AKfycby-V9MY8SiaoMRAvY2FpZBtoi9TM-xbkodu7bvJZbDftUvbykRGoGQxw3AXn0bTrGzEow/exec"



document.getElementById("signupForm").addEventListener("submit",function(e){

e.preventDefault()

let data={

name:document.getElementById("name").value,
email:document.getElementById("email").value,
phone:document.getElementById("phone").value,
password:document.getElementById("password").value,
type:"signup"

}

fetch(scriptURL,{
method:"POST",
body:JSON.stringify(data)
})
.then(res=>res.text())
.then(response=>{

document.getElementById("message").innerText="Signup successful!"

document.getElementById("signupForm").reset()

})

})

</script>

</body>

</html>
