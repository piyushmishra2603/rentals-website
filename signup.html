<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Create Account</title>

<style>

*{
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#1976d2,#42a5f5);
}

.container{
background:white;
padding:40px;
width:360px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
text-align:center;
}

h2{
margin-bottom:25px;
color:#1976d2;
}

input{
width:100%;
padding:12px;
margin-top:12px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
}

input:focus{
outline:none;
border-color:#1976d2;
}

button{
width:100%;
margin-top:18px;
padding:12px;
border:none;
border-radius:30px;
background:linear-gradient(135deg,#1976d2,#42a5f5);
color:white;
font-size:15px;
font-weight:600;
cursor:pointer;
transition:0.3s;
box-shadow:0 3px 8px rgba(0,0,0,0.15);
}

button:hover{
transform:translateY(-2px);
}

#msg{
margin-top:15px;
font-size:14px;
color:#e53935;
}

.login-link{
margin-top:18px;
font-size:14px;
}

.login-link a{
color:#1976d2;
text-decoration:none;
font-weight:500;
}

</style>

</head>

<body>

<div class="container">

<h2>Create Account</h2>

<input id="email" type="email" placeholder="Enter Email">

<input id="password" type="password" placeholder="Enter Password">

<button onclick="signup()">Sign Up</button>

<div id="msg"></div>

<div class="login-link">
Already have an account? <a href="login.html">Login</a>
</div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getAuth, createUserWithEmailAndPassword }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


const firebaseConfig = {
  apiKey: "AIzaSyCExyC1UlqWl-tTJWVtoQx6E-rppaYQgcU",
  authDomain: "smart-property-portal.firebaseapp.com",
  projectId: "smart-property-portal",
  storageBucket: "smart-property-portal.firebasestorage.app",
  messagingSenderId: "407241446660",
  appId: "1:407241446660:web:1259fa8c93bce5fd8aec51"
};


const app = initializeApp(firebaseConfig);
const auth = getAuth(app);


window.signup = function(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value
const msg=document.getElementById("msg")

msg.innerHTML="Creating account..."

createUserWithEmailAndPassword(auth,email,password)

.then((userCredential)=>{

msg.style.color="green"
msg.innerHTML="Account created successfully"

setTimeout(()=>{

window.location.href="index.html"

},1500)

})

.catch((error)=>{

msg.style.color="red"
msg.innerHTML=error.message

})

}

</script>

</body>

</html>
