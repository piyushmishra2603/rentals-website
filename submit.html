<!DOCTYPE html>
<html>
<head>
  <title>Submit Property</title>
  <style>
    body { font-family: Arial; margin: 30px; }
    input, textarea { display: block; margin: 10px 0; padding: 8px; width: 300px; }
    button { padding: 10px 20px; cursor: pointer; }
  </style>
</head>
<body>

<h2>Submit New Property</h2>

<input type="text" id="title" placeholder="Title">
<input type="text" id="city" placeholder="City">
<input type="text" id="bhk" placeholder="BHK">
<input type="number" id="price" placeholder="Price">
<input type="text" id="image1" placeholder="Image URL 1">
<input type="text" id="image2" placeholder="Image URL 2">
<input type="text" id="image3" placeholder="Image URL 3">
<input type="text" id="image4" placeholder="Image URL 4">
<textarea id="description" placeholder="Description"></textarea>
<input type="text" id="lat" placeholder="Latitude">
<input type="text" id="lng" placeholder="Longitude">

<button onclick="submitProperty()">Submit Property</button>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbznG-GmZj4sHzqd4XLQzXmAhzAXvqLHJDr5IcpnofWmuexOYsncz7DhfkKL0c5dNcjqOw/exec";

function submitProperty() {
  const data = {
    action: "submitProperty",
    title: document.getElementById("title").value.trim(),
    city: document.getElementById("city").value.trim(),
    bhk: document.getElementById("bhk").value.trim(),
    price: document.getElementById("price").value.trim(),
    image1: document.getElementById("image1").value.trim(),
    image2: document.getElementById("image2").value.trim(),
    image3: document.getElementById("image3").value.trim(),
    image4: document.getElementById("image4").value.trim(),
    description: document.getElementById("description").value.trim(),
    lat: document.getElementById("lat").value.trim(),
    lng: document.getElementById("lng").value.trim(),
    email: localStorage.getItem("ownerEmail"),
    phone: "" // optional
  };

  fetch(WEB_APP_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  })
  .then(res => res.text())
  .then(resp => alert(resp))
  .catch(err => console.error(err));
}
</script>

</body>
</html>
