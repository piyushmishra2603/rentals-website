<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submit Property | SmartRent</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
    color: white;
}

/* Header */
header {
    text-align: center;
    padding: 20px;
    font-size: 28px;
    font-weight: bold;
}

/* Form Container */
.form-container {
    max-width: 500px;
    margin: auto;
    background: rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
}

/* Inputs */
input, select, textarea {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
    outline: none;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    background: #00c6ff;
    color: black;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #00a2d3;
}
</style>
</head>

<body>

<header>Post Your Property</header>

<div class="form-container">

<form action="#" method="POST">

    <input type="text" placeholder="Property Title" required>

    <select required>
        <option value="">Select Type</option>
        <option>PG</option>
        <option>Hostel</option>
        <option>Apartment</option>
    </select>

    <input type="text" placeholder="Location" required>

    <input type="number" placeholder="Price per month (₹)" required>

    <textarea rows="4" placeholder="Description"></textarea>

    <input type="file">

    <button type="submit">Submit Property</button>

</form>

</div>

</body>
</html>
