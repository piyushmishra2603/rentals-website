<!DOCTYPE html>
<html>
<head>
  <title>Submit Property</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #f4f4f4; }
    input, textarea, button { display: block; margin: 10px 0; padding: 10px; width: 300px; }
    button { background: #ff5722; color: white; border: none; cursor: pointer; }
  </style>
</head>
<body>
  <h2>Submit Property</h2>
  <input type="text" id="title" placeholder="Title">
  <input type="text" id="city" placeholder="City">
  <input type="text" id="bhk" placeholder="BHK">
  <input type="number" id="price" placeholder="Price">
  <input type="text" id="image1" placeholder="Image URL 1">
  <input type="text" id="image2" placeholder="Image URL 2">
  <input type="text" id="image3" placeholder="Image URL 3">
  <input type="text" id="image4" placeholder="Image URL 4">
  <textarea id="description" placeholder="Description"></textarea>
  <input type="text" id="lat" placeholder="Latitude">
  <input type="text" id="lng" placeholder="Longitude">
  <button onclick="submitProperty()">Submit Property</button>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzRvyjppF8C-MWeOOEPuqxBpfxo_QA3_OXs-lp7JpK1DEzOQQ2kIHB6rnAoTS-5FL2liQ/exec";
    const ownerEmail = localStorage.getItem("ownerEmail");
    const ownerPhone = ""; // optional, can store in localStorage if needed

    function submitProperty() {
      const data = {
        action: "submitProperty",
        title: document.getElementById("title").value,
        city: document.getElementById("city").value,
        bhk: document.getElementById("bhk").value,
        price: document.getElementById("price").value,
        image1: document.getElementById("image1").value,
        image2: document.getElementById("image2").value,
        image3: document.getElementById("image3").value,
        image4: document.getElementById("image4").value,
        description: document.getElementById("description").value,
        lat: document.getElementById("lat").value,
        lng: document.getElementById("lng").value,
        email: ownerEmail,
        phone: ownerPhone
      };

      fetch(WEB_APP_URL, {
        method: "POST",
        body: JSON.stringify(data)
      })
      .then(res => res.text())
      .then(res => alert(res))
      .catch(err => console.error(err));
    }
  </script>
</body>
</html>
