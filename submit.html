<!DOCTYPE html>
<html>

<head>

<title>Submit Property</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
}

.container{
max-width:600px;
margin:auto;
background:white;
padding:20px;
margin-top:30px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

input,textarea{
width:100%;
padding:10px;
margin-top:10px;
font-size:15px;
border:1px solid #ccc;
border-radius:5px;
}

button{
margin-top:10px;
padding:10px;
background:#0f4c81;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0c3b63;
}

.success{
color:green;
margin-top:10px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>Submit Your Property</h2>

<form id="propertyForm">

<input id="title" placeholder="Property Title" required>

<input id="city" placeholder="City" required>

<input id="bhk" placeholder="BHK (1,2,3)" required>

<input id="price" placeholder="Price per month" required>

<input id="email" placeholder="Owner Email" required>

<label>Upload Property Image</label>
<input type="file" id="imageFile" accept="image/*">

<textarea id="description" placeholder="Property Description"></textarea>

<button type="button" onclick="generateDescription()">
Generate AI Description
</button>

<button type="submit">
Submit Property
</button>

</form>

<p id="successMsg" class="success"></p>

</div>

<script>

/* ===========================
PASTE YOUR APPS SCRIPT URL
=========================== */

const scriptURL="https://script.google.com/macros/s/AKfycbyPRbaCUVnHnEVVcE-Zf25XeOHTJs53kKMMu9h0lLk3e5MTvj8sxypPsD8Jo8oCmFARew/exec"



/* ===========================
AI DESCRIPTION GENERATOR
=========================== */

function generateDescription(){

let title=document.getElementById("title").value
let city=document.getElementById("city").value
let bhk=document.getElementById("bhk").value
let price=document.getElementById("price").value

if(!title || !city || !bhk || !price){

alert("Please fill title, city, BHK and price first")

return

}

let text=
"A spacious "+bhk+" BHK property located in "+city+
" available for rent at ₹"+price+
" per month. This "+title+
" offers comfortable living with good ventilation and easy access to nearby markets, transport and daily amenities. Ideal for families, students and working professionals."

document.getElementById("description").value=text

}



/* ===========================
FORM SUBMISSION
=========================== */

document.getElementById("propertyForm").addEventListener("submit",async function(e){

e.preventDefault()

let file=document.getElementById("imageFile").files[0]

let reader=new FileReader()

reader.onload=async function(){

let base64Image=""

if(file){
base64Image=reader.result.split(",")[1]
}

let data={

title:document.getElementById("title").value,
city:document.getElementById("city").value,
bhk:document.getElementById("bhk").value,
price:document.getElementById("price").value,
description:document.getElementById("description").value,
email:document.getElementById("email").value,
image:base64Image

}

fetch(scriptURL,{
method:"POST",
body:JSON.stringify(data)
})
.then(res=>res.json())
.then(response=>{

document.getElementById("successMsg").innerText=
"Property submitted successfully!"

document.getElementById("propertyForm").reset()

})
.catch(error=>{

alert("Submission failed. Please try again.")

})

}

if(file){
reader.readAsDataURL(file)
}else{
reader.onload()
}

})

</script>

</body>

</html>
