<!DOCTYPE html>
<html>
<head>
  <title>Submit Property</title>
  <style>
    body { font-family: Arial; margin:50px; }
    input, textarea, button { display:block; margin:10px 0; padding:10px; width:300px; }
    button { cursor:pointer; background-color:#FF5722; color:white; border:none; font-weight:bold; }
    button:hover { background-color:#E64A19; }
  </style>
</head>
<body>

<h2>Submit Property</h2>

<input type="text" id="title" placeholder="Property Title">
<input type="text" id="city" placeholder="City">
<input type="text" id="bhk" placeholder="BHK">
<input type="text" id="price" placeholder="Price">
<input type="text" id="image1" placeholder="Image URL 1">
<input type="text" id="image2" placeholder="Image URL 2">
<input type="text" id="image3" placeholder="Image URL 3">
<input type="text" id="image4" placeholder="Image URL 4">
<textarea id="description" placeholder="Description"></textarea>
<input type="text" id="lat" placeholder="Latitude">
<input type="text" id="lng" placeholder="Longitude">
<button onclick="submitProperty()">Submit</button>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwh-9c-O1jC7RAQrpcdXzFJZO7Yyf28CIdAmAjRVUywGYPMOszLPbYbQxP24f0PPTF80Q/exec";

function submitProperty() {
  const data = {
    action:"submitProperty",
    title: document.getElementById("title").value.trim(),
    city: document.getElementById("city").value.trim(),
    bhk: document.getElementById("bhk").value.trim(),
    price: document.getElementById("price").value.trim(),
    image1: document.getElementById("image1").value.trim(),
    image2: document.getElementById("image2").value.trim(),
    image3: document.getElementById("image3").value.trim(),
    image4: document.getElementById("image4").value.trim(),
    description: document.getElementById("description").value.trim(),
    email: localStorage.getItem("ownerEmail")||"",
    phone: "",
    lat: document.getElementById("lat").value.trim(),
    lng: document.getElementById("lng").value.trim()
  };

  fetch(WEB_APP_URL,{
    method:"POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(data)
  })
  .then(res=>res.json())
  .then(resp=>{
    if(resp.status==="success"){
      alert(resp.message);
      window.location.href="dashboard.html";
    } else alert("Failed: "+resp.message);
  })
  .catch(err=>{console.error(err); alert("Error submitting property");});
}
</script>

</body>
</html>
